244手周减1,517手，短线看涨情绪持续降温，但绝对水平仍高于此前低点</li>\n  <li><strong>工业需求景气：</strong>光伏装机+AI数据中心建设对白银工业需求维持高位，中长期需求故事未被证伪</li>\n  <li><strong>波动率系统性放大：</strong>5月中旬日跌超9%后市场波动率提升，价格呈现急涨急跌特征，操作难度加大</li>\n</ul>\n<blockquote>💡 白银72-80美元宽幅震荡区间，短线支撑看72美元（前低），压力看80美元整数关口及5月高点89美元。瑞银预计2026年全球白银供应缺口从3亿盎司扩大，中长期供需格局向好。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（上周五5/29收盘回顾）</h2>\n<p>A股三大指数上周五高开低走，全线收跌，<strong>科创50暴跌5.04%领跌全场</strong>：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span> <span class=\"tag-gray\">周线微跌</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n  <div class=\"info-item\"><div class=\"il\">主力净流出</div><div class=\"iv\"><strong>-831.55亿元</strong>（连续多日）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。北向资金成交4734亿元（占两市14.26%）。</p>\n\n<p><strong>盘面特征（极致分化）：</strong>食品饮料（+3.02%）、煤炭（+2.13%）、公用事业（+2%+）等防御板块领涨；综合（-5.39%）、电子（-4%+）、国防军工（-4.23%）领跌。科技股全面获利回吐，\\\"高切低\\\"调仓行为非常清晰。申万一级仅12个行业上涨，19个行业下跌。</p>\n\n<p><strong>本周（5/25-5/29）回顾：</strong>本周A股整体震荡调整，前期大涨的科技股出现明显回落。科创综指终结此前连续7周上涨，跌逾3%。但A股融资余额历史首次突破2.9万亿元（+423亿），杠杆资金交易热情不减。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p><strong>A股方面：</strong>上周五AI板块全面回调，人工智能指数收跌3.06%，成交额5398亿元。半导体/算力/CPO等前期强势板块集体杀跌，电子行业主力净流出372亿元居全行业第一。</p>\n\n<p><strong>但隔夜美股AI全线大涨，强势确认产业景气度：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），标普500指数7580点新高，道指51032点新高</li>\n  <li><strong>戴尔科技财报AI服务器营收161亿美元 +757%</strong>，盘后飙升35%创历史新高，上调全年AI营收指引至600亿美元</li>\n  <li><strong>Cerebras</strong>在美上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、<strong>美光+3.5%</strong>续篇新高、<strong>博通+3.2%</strong>逼近新高</li>\n  <li><strong>微软+3%</strong>、<strong>谷歌-2%</strong>分化，但整体AI交易热潮持续升温</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。A股与美股对AI的定价出现阶段性背离——这通常是<strong>逢低布局的信号</strong>而非逃离信号。下周Computex大会和戴尔财报传导效应有望带动A股AI板块情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">A股回调</span> <span class=\"pill pill-up\">美股强势+戴尔+35%</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿元居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨，高通+6%、ARM+5%创新高、博通+3.2%、英伟达+1.5%、美光+3.5%创新高。市场对AI算力的需求定价持续强化。</p>\n<p class=\"sn\"><strong>基本面（全球最强验证）：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年AI营收预期至600亿美元——这是全球AI基建投资加速的最强确认信号。Cerebras纳斯达克上市首日+89%市值750亿美元。四大云厂商2026年资本支出合计7250亿美元（+77%+）。华为推出星河AI数据中心网络方案，NPU与存储直通带宽提升8倍。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\\\"AI Together\\\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构细节。发改委\\\"人工智能+\\\"从拓展升级为全面实施。五部门联合发布《关于促进人工智能产业创新发展的若干意见》，聚焦算力基础设施、数据要素流通、AI+应用三大方向。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎（获利回吐），但美股情绪持续升温。关注戴尔财报情绪向下周一A股算力/服务器供应链传导的可能性。国产AI芯片9款获得安全可靠I级认证，国产替代逻辑持续强化。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品，性能提升超20%。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺将持续至2026年后。闪迪CTO：AI竞赛正变成\\\"拼内存\\\"，HBF产品明年推出。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期，获利资金兑现。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高，回调即是布局窗口。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会最强催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面（产业趋势加速）：</strong>2026年是<strong>规模化验证关键期</strong>。<strong>宇树科技科创板IPO将于6月1日（下周一）上会</strong>，冲刺A股\\\"人形机器人第一股\\\"，拟募资42.02亿元。海关数据显示4月工业机器人出口量2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产。Figure 03机器人已开启全天候包裹分拣直播。中国2025年整机出货量占全球84.71%。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块的<strong>标志性催化剂</strong>，带动板块情绪企稳回升。Computex大会上也预计有机器人相关展示。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头中际旭创昨日成交225亿A股第一后高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。CPO产业链正在向通信线缆方向延伸。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台以上。台积电将光子互连列为未来最重要架构层级，200Gbps微环调制器启动量产。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。LightCounting预测2030年CPO市场达100亿美元。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO产业链\\\"新面孔\\\"——通信线缆方向获集中配置（亨通光电/长飞光纤/中天科技）。但斌转发CPO视频引发产业关注。光模块龙头短期调整属获利回吐，产业逻辑不变。下周Computex大会上CPO相关技术预计将成为重要议题。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（上周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"tag-gray\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"tag-gray\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地</td><td><span class=\"tag-gray\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期</td><td><span class=\"tag-gray\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"tag-gray\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"tag-gray\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>10</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"tag-gray\">防御配置</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一），机械设备(111亿)和电力设备(102亿)也净流出超百亿</li>\n  <li><strong>电力+公用事业+火电</strong>合计净流入约110亿，从科技全面撤退至防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向，亨通光电全市场主力净流入第一(39.76亿)</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>对比：</strong>周五AI板块是全市场最大的失血方向，但隔夜美股反之——AI是全市场最大的吸金方向。A股和美股对AI定价出现阶段性背离，往往是<strong>逢低布局信号</strong>。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>2027财年Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证，美股AI交易热潮再升温。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，主力资金集中配置，逆势走强</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创历史新高后今日大幅回调，拖累AI板块</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器业务为核心增长引擎，验证AI硬件景气度</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（上周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块归属</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>关键观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通光电、长芯博创、剑桥科技、长飞光纤），CPO产业链延伸方向是上周五全市场唯一获得集中配置的AI相关方向。说明主力资金在AI科技板块中正在结构性调仓——<strong>从\\\"光模块\\\"向\\\"通信线缆\\\"</strong>延伸。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2启动正式量产，首代目标年产能100万台。中国凭借供应链优势在量产环节主导全球（2025年出货量占全球84.71%）。</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新催化：</strong>宇树科技IPO于<strong>6月1日（下周一）上会</strong>，冲刺A股\\\"人形机器人第一股\\\"，拟募资42.02亿元。若顺利过会，将成为机器人板块里程碑事件。2026年是人形机器人从0到1的<strong>量产兑现阶段</strong>。板块适合<strong>逢低布局</strong>，核心以三花+绿的行为主。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（上周五高切低全面回调，科创50-5.04%）。但隔夜美股AI全线大涨纳指七连涨创新高，AI产业热度持续升温。A股与美股定价出现阶段性背离。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件⏰</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一 6/1：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五 6/2-6/5：</strong>Computex 2026台北电脑展<br>— 英伟达黄仁勋主题演讲（预计发布Vera Rubin架构）<br>— 微软Copilot+ PC升级 / AMD Zen6 / 英特尔新品<br>— 戴尔AI服务器财报情绪传导</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面大涨带动，A股AI板块大概率<strong>高开</strong>。关键看成交量：若高开后量能有效放大（2.5万亿+）则有望企稳反弹；若缩量则需警惕\\\"高开低走\\\"。通信线缆方向可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱和地缘不确定性提供支撑，但非农数据和美联储表态将影响方向选择。5月+2.1%月涨幅显示白银强于黄金。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力资金连续多日大额净流出。若下周一高开但成交量不足，需警惕\\\"高开低走\\\"走势。A股与美股阶段性背离的收敛需要时间。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导效应（周一早盘）<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO产业链通信线缆新方向（亨通光电/长飞光纤/剑桥科技）<br><strong>4)</strong> 宇树上会结果决定机器人板块下周走势，可提前埋伏核心标的</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1307", "date": "2026-05-30 13:07", "title": "AI板块周末午间复盘 · 周末休市 聚焦下周Computex/宇树IPO双重催化", "tags": ["周末复盘", "休市", "Computex", "宇树IPO", "白银", "COMEX白银"], "summary": "周六A股休市。本周科技高切低，科创50周跌超5%。COMEX白银周末震荡。下周Computex大会和宇树IPO是AI板块双重催化。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">休市</div><div class=\"lbs\">A股状态</div></div>\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证周收</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50周跌</div></div>\n  <div class=\"metric-box\"><div class=\"num\">$75.58</div><div class=\"lbs\">COMEX白银</div></div>\n</div>\n\n<h1>AI板块周末午间复盘</h1>\n<p><strong>时间：</strong>2026-05-30 13:07（A股今日休市 — 周六）</p>\n\n<div class=\"tagline\">📌 <strong>周末核心看点：</strong>A股本周经历了\"高切低\"的剧烈切换——周五科技全面退潮、科创50暴跌5.04%，而电力/公用事业等防御板块逆势吸金。周末消息面整体平静，市场目光聚焦下周两件大事：<strong>① 6/1 宇树科技IPO上会</strong>（人形机器人第一股）；<strong>② 6/2-6/5 Computex大会</strong>（全球AI年度催化窗口）。COMEX白银本周收报75.58美元/盎司，较前一交易日微跌。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">周跌 -0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>75.47 美元/盎司</strong> <span class=\"pill pill-mid\">5月累涨 +2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.90 美元/盎司</strong> <span class=\"pill pill-up\">周涨 +0.28%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>约99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>17,790元/千克</strong> <span class=\"pill pill-down\">沪银 -4.31%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">白银月线</div><div class=\"iv\"><strong>5月累涨 +2.1%</strong></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>白银经历了极为剧烈的5月行情——5月上旬从70美元快速拉升至89.3美元（5月13日年内高点），随后因美国CPI数据超预期引发恐慌性抛售，单日暴跌超9%，一路回撤至73美元附近。近期在74-78美元区间震荡筑底。周末报75.58美元，处于<strong>宽幅震荡下的低位整固</strong>阶段。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元弱势提供支撑：</strong>美元指数持续走弱至99.33附近，对贵金属整体形成支撑</li>\n  <li><strong>美联储降息预期反复：</strong>美国4月PCE物价指数同比+3.8%创三年新高，通胀粘性超预期，市场对降息节奏的预期出现明显摇摆</li>\n  <li><strong>工业需求持续定价：</strong>光伏+AI数据中心+新能源汽车对白银工业需求维持高位，为银价提供中长期底部支撑</li>\n  <li><strong>美伊和谈进展：</strong>周末美伊谈判接近达成的消息主导市场情绪，地缘风险溢价有所下降</li>\n  <li><strong>机构观点分化：</strong>美银看多（预测Q4触及100美元），瑞银偏谨慎（下调目标至85美元），两机构分歧反映市场对后市研判的不确定性</li>\n  <li><strong>CFTC持仓：</strong>截至5月26日一周，COMEX白银投机净多头减少1517手至10244手，投机热情降温</li>\n</ul>\n\n<blockquote>💡 白银当前处于72-80美元震荡区间，短线关键支撑72-75美元，上方压力80美元。5月振幅达18.81%，波动极为剧烈。操作上建议控制仓位，避免追涨杀跌。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（本周五收盘数据）</h2>\n<p>本周五（5月29日）A股三大指数高开低走，全线收跌：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">约4038 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量+3500亿）</div></div>\n</div>\n\n<p>全市场仅1565只上涨，3867只下跌，涨跌比约3:7。主力资金净流出<strong>831.55亿元</strong>，其中电子行业净流出<strong>372.05亿元</strong>居全行业第一。</p>\n\n<p><strong>5月整体回顾：</strong></p>\n<ul>\n  <li>沪指先扬后抑，<strong>月线收阴</strong>；但科创50本月累计涨超<strong>11%</strong>，突破2020年7月以来高点</li>\n  <li>创业板指涨近<strong>10%</strong>站稳4000点</li>\n  <li>芯片产业链为5月绝对主线——中芯国际、寒武纪、北方华创等多只龙头股价迭创历史新高</li>\n  <li>AI算力硬件（\"易中天\"光模块、PCB等）持续走出趋势行情</li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>本周AI板块经历<strong>先扬后抑、高切低剧烈切换</strong>：</p>\n<ul>\n  <li><strong>周初：</strong>\"易中天\"齐创历史新高，半导体全面爆发，创业板首超沪指</li>\n  <li><strong>周中：</strong>半导体制裁传闻催化国产替代，算力链延续强势</li>\n  <li><strong>周五：</strong>科技全线退潮，科创50暴跌5.04%，电子行业主力净流出372亿元</li>\n</ul>\n<p>核心判断：<strong>这轮调整是交易层面的\"高切低\"，而非产业逻辑破坏</strong>。AI算力/半导体的基本面——资本开支高增长、HBM供不应求、光模块订单饱满——均未改变。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">周五净流出显著</span></div>\n<p class=\"sn\"><strong>资金面：</strong>电子行业周五主力净流出372亿元居首。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex大会</strong>以\"AI Together\"为主题，英伟达CEO黄仁勋将发布最新Vera Rubin架构AI芯片，是全球AI算力最强催化窗口。市场监管总局&发改委联合发布《人工智能计量体系建设指引》。</p>\n<p class=\"sn\"><strong>基本面：</strong>Cerebras在美上市首日暴涨89%市值达750亿美元，验证AI算力赛道高景气。戴尔AI服务器营收161亿美元同比+757%。四大云厂商2026年资本支出7250亿美元（+77%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股算力板块高位回调明显，但美股AI板块仍在创新高（纳指六连涨）。A股调整本质是<strong>内部筹码博弈和\"高切低\"</strong>的体现。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪中性</span></div>\n<p class=\"sn\"><strong>资金面：</strong>周五跟随半导体整体回调。北向资金在存储龙头交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿）。佰维存储逆势上涨0.94%成为存储中少有的红盘。</p>\n<p class=\"sn\"><strong>基本面：</strong>HBM景气度持续超预期——HBM3E现货价半年暴涨超300%。三星率先交付首批12层48GB HBM4E样品，全球领先。美光警告内存短缺将持续至2026年后。全球DRAM营收Q1逼近970亿美元（+260%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲但股价已充分反映涨价预期。中长期看HBM仍是AI产业链中<strong>供需格局最紧张</strong>的环节之一。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待催化剂</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续周初的抛压态势。人形机器人板块5月虽整体反弹，但年内行情分化明显。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>宇树科技科创板IPO于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。海关数据4月工业机器人出口量突破2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场短期聚焦宇树科技上会结果。如果顺利过会将为板块注入强心剂。当前属于<strong>等待催化剂真空期</strong>的调整。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化明显。光模块龙头高位震荡，但<strong>通信线缆及配套</strong>板块周五逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年机构定义为<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台以上。LightCounting预测2030年CPO市场规模达100亿美元。中际旭创Q1营收194.96亿元（+192%），净利润57.35亿元（+262%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO产业链的\"新面孔\"——通信线缆方向获得集中配置。下周Computex大会可能发布CPO新标准/应用方案，有望进一步提振板块情绪。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五数据）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>资金从科技向防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>消费板块资金集中涌入</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心结论：</strong></p>\n<ul>\n  <li>周五全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li>电子行业净流出<strong>372.05亿</strong>居全行业第一</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿——资金从科技全面撤退至防御方向</li>\n  <li>通信线缆是AI板块中<strong>唯一逆势吸金方向</strong>——亨通光电全市场净流入第一</li>\n  <li><strong>AI板块相对热度降至冰点</strong>，但产业逻辑未变，调整后是逢低布局的机会</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸受益</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿</span></td><td>半导体龙头获利回吐，昨日创新高后周五大幅回调</td></tr>\n  <tr><td><strong>博杰股份</strong></td><td>002975</td><td><span class=\"pill pill-up\">涨停</span></td><td>切入英伟达供应链，液冷测试设备小批量发货，业绩爆发</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>HK.0992</td><td><span class=\"pill pill-up\">港股暴涨22.46%</span></td><td>AI服务器财报超预期，验证全球AI硬件景气度</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus V3于2026年Q2启动量产，核心受益标的如下：</p>\n\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器（线性）</strong></td><td>拓普集团</td><td>601689</td><td>Optimus V3线性执行器独家供应商（腿/腰大关节），单机价值约1.5万元，已签40亿+订单</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>执行器（旋转）</strong></td><td>三花智控</td><td>002050</td><td>旋转关节总成独家（14个上肢关节）+全套液冷，单机约3万元，锁定54亿订单</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，V3单台用14-20个，唯一规模化进入特斯拉供应链</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>滚柱丝杠</strong></td><td>五洲新春</td><td>603667</td><td>行星滚柱丝杠核心供应商，V3单机34根，腿部关键传动</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机（灵巧手）</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机独家供应商，用于V3灵巧手，高功率密度</td><td>⭐⭐</td></tr>\n  <tr><td><strong>伺服系统</strong></td><td>汇川技术</td><td>300124</td><td>伺服系统+运动控制方案，工业自动化延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>滚柱丝杠</strong></td><td>恒立液压</td><td>601100</td><td>滚柱丝杠供应商，V3线性关节核心部件</td><td>⭐⭐</td></tr>\n</table>\n\n<p><strong>量产进展：</strong>特斯拉加州弗里蒙特工厂已将原Model S/X生产线全面改造为Optimus专属产线，计划4个月内完成产线切换与调试，设计年产能达100万台。德州超级工厂第二代机器人产线也在规划中，预计2027年投产，长期目标年产能高达1000万台。</p>\n\n<p><strong>操作思路：</strong>机器人板块目前处于\"产业趋势确定但业绩尚未大规模兑现\"的阶段。核心仓位建议配置<strong>执行器（拓普/三花）+减速器（绿的谐波）</strong>，卫星仓位关注传感器/电机等方向。<strong>宇树科技6/1上会</strong>若顺利过会，将为板块注入强心剂。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 本周回顾</div><div class=\"iv\" style=\"font-size:14px\">A股先扬后抑，\"高切低\"剧烈切换。科技板块周五全面退潮，但5月全月看科创50+11%、创业板+10%，AI仍是核心主线。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周一关键催化</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1 宇树科技上会</strong>（\"人形机器人第一股\"）<br><strong>2) 6/2-6/5 Computex大会</strong>（英伟达Vera Rubin发布、CPO/液冷等前沿方案展示）</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">美股三大指数齐创新高，纳指六连涨。费城半导体+1%。Snowflake暴涨36%，英伟达/微软/亚马逊上涨。A股调整更多是<strong>内部资金博弈</strong>问题。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银周末报75.58美元，5月累涨2.1%。短线在72-78美元区间震荡。下周关注非农数据和美联储官员讲话。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金连续多日净流出，若Computex大会催化效果不及预期，AI板块调整时间可能延长。仓位管理是第一要务。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头。关注Computex大会英伟达Vera Rubin架构及CPO最新进展。通信线缆方向（亨通光电等）值得重点跟踪新机会。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1407", "date": "2026-05-30 14:07", "title": "AI板块周末复盘 · 科技高切低休整 戴尔AI营收爆表+35% 聚焦下周Computex+宇树IPO", "tags": ["周末复盘", "高切低", "戴尔财报", "白银震荡", "Computex", "宇树科技", "CPO通信线缆"], "summary": "A股周末休市。周五科技高切低全线回调科创50-5.04%。隔夜美股AI全线大涨，戴尔AI营收+757%盘后飙升35%，Cerebras上市+89%。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">--</div><div class=\"lbs\">A股周末休市</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔财报飙</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技高切低休整 戴尔AI营收爆表+35% 聚焦下周最强催化</h1>\n<p><strong>时间：</strong>2026-05-30 14:07（北京时间·周六下午·非交易时段）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>当前A股处于周末休市状态（周五5/29已收盘）。上周五上演典型的\"高切低\"全线切换——AI科技板块全面退潮（科创50暴跌5.04%），电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨，<strong>戴尔财报AI服务器营收+757%盘后暴涨35%</strong>，Cerebras上市首日+89%，纳指七连涨创新高。下周<strong>三重重磅催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔美股传导效应</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.9 美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>~75.34 美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力(上周五夜盘)</div><div class=\"iv\"><strong>18,035 元/千克</strong> <span class=\"pill pill-up\">+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>本周COMEX白银期货（5/26-5/30）走势剧烈震荡——周一77.27美元（-1.44%），周三下探至73.29美元低点，周四强力反弹+3.81%至76.08美元，周五回落至75.58美元（-0.43%）。周跌约0.81%，5月整体仍录得+2.1%月涨幅。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空在75美元一线激烈博弈，筑底特征明显。</p>\n\n<p><strong>驱动因素分析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供底部支撑：</strong>美元指数回落至99附近，对贵金属整体形成底部支撑</li>\n  <li><strong>通胀数据居高不下：</strong>美国4月PCE物价同比+3.8%创三年新高，强化抗通胀资产需求</li>\n  <li><strong>美伊地缘不确定性：</strong>特朗普称即将对伊朗战事做出\"最终决定\"，中东局势扰动市场</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示截至5月26日COMEX白银投机净多头减少至10,244手，短线看涨情绪降温</li>\n  <li><strong>工业需求端：</strong>光伏+AI数据中心对白银工业需求维持高位，中长期基本面偏多</li>\n</ul>\n<blockquote>💡 白银自1月29日121美元历史高点已回落约38%，当前在72-80美元区间筑底震荡。短线支撑72美元（前低），上方压力80美元整数关口。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（回顾周五5/29收盘）</h2>\n<p>A股上周五高开低走全线收跌，科创50暴跌5.04%领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n  <div class=\"info-item\"><div class=\"il\">涨跌家数</div><div class=\"iv\"><strong>1565涨</strong> / 3867跌</div></div>\n</div>\n\n<p><strong>盘面特征（极致分化）：</strong></p>\n<ul>\n  <li><strong>领涨方向：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)——资金全面转向防御</li>\n  <li><strong>领跌方向：</strong>综合(-5.39%)、国防军工(-4.23%)、电子/半导体(-4%+)——AI科技方向全面失血</li>\n  <li><strong>主力资金：</strong>净流出831.55亿元，其中<strong>电子行业</strong>净流出<strong>372.05亿元</strong>居全行业第一，连续多日大额净流出</li>\n  <li><strong>北向资金：</strong>总成交4734亿元(占两市14.26%)，宁德时代/中际旭创/天孚通信为深股通成交前三</li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n\n<p><strong>但外盘信号截然相反——积极信号密集：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n  <li><strong>戴尔财报：</strong>AI服务器营收161亿美元 <strong>+757%</strong>，全年AI预期上调至600亿美元，盘后暴涨35%</li>\n  <li><strong>Cerebras</strong>在美上市首日大涨<strong>89%</strong>市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、ARM+5%再创历史新高、美光+3.5%续创新高、微软+3%</li>\n  <li><strong>戴尔+35%</strong>、迈威尔科技+4.5%——AI算力硬件全线爆发</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>——前期（5月）科技板块涨幅过大（52只翻倍股、7只涨幅超500%），获利回吐是正常的。AI产业基本面（资本开支高增长、HBM供不应求、光模块出货量超预期）<strong>未发生逆转</strong>。下周一Computex大会和戴尔财报传导效应有望带动情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股戴尔+35%最亮眼</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿元居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（海外）：</strong>隔夜美股AI全面大涨——戴尔+35%（盘后）、高通+6%、ARM+5%创新高、博通+3.2%、美光+3.5%续创新高。全球AI算力需求不减。</p>\n<p class=\"sn\ >板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿元</strong>居全市场第一（A股当日主力净流入第一），剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电启动全球首款200Gbps微环调制器量产。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿（+192%），净利57亿（+262%）。Lumentum光通信组件产能已售罄至2028年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置（亨通光电、长飞光纤、剑桥科技）。但斌转发CPO视频引发产业关注。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技←防御资金大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套 ★</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向（全市场唯一AI吸金方向）</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+防御配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿元</strong>居全行业第一——AI科技方向全面失血</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿元，资金全面转向防御</li>\n  <li><strong>通信线缆</strong>是AI板块中<strong>唯一逆势吸金方向</strong>——亨通光电全市场主力净流入第一</li>\n  <li>AI相关板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度在全市场中垫底</li>\n  <li><strong>对比美股：</strong>周五A股AI垫底 VS 隔夜美股AI全线领涨——阶段性背离，均值回归可期</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，全年AI预期上调至600亿美元。全球最强AI硬件业绩验证信号</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股(600487)</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念新方向，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股(688981)</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，周初创新高后大幅回调拖累板块</td></tr>\n  <tr><td><strong>Cerebras</strong></td><td>NASDAQ</td><td><span class=\"pill pill-up\">上市首日+89%<br>市值750亿美元</span></td><td>史上最大AI芯片IPO，晶圆级芯片验证AI算力赛道高景气</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五5/29）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块归属</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n\n<p><strong>核心观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通光电+长芯博创+剑桥科技+长飞光纤），CPO产业链延伸方向是周五全市场唯一获得主力集中配置的AI相关板块。这是值得重点关注的<strong>新增资金方向</strong>。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2正式启动量产，首代目标年产能100万台。中国供应链优势企业核心受益梳理：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th><th>估值水位</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证</td><td>⭐⭐⭐</td><td>中位</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td><td>中位</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td><td>偏低</td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>工业自动化龙头，延伸至机器人关节驱动</td><td>⭐⭐</td><td>偏低</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td><td>中位</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td><td>偏低</td></tr>\n</table>\n\n<p><strong>最新催化剂：</strong>宇树科技6月1日（下周一）IPO上会将是行业标志性事件。若顺利过会，机器人板块有望迎来情绪拐点。<strong>操作思路：</strong>板块适合<strong>逢低布局</strong>，核心仓位以三花+绿的谐波为主，传感器/电机/灵巧手作为卫星仓位。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（周五5/29已收盘）。上周五\"高切低\"全线切换——科技退潮科创50暴跌5%，防御板块逆势吸金。但隔夜美股AI全线大涨信号积极。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件日历（最强催化窗口）</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一 6/1：</strong>宇树科技科创板IPO上会（人形机器人第一股，拟募资42.02亿）<br><strong>周二-周五 6/2-6/5：</strong>Computex 2026台北电脑展（全球AI年度最强催化）<br>— 英伟达黄仁勋主题演讲（预计发布Vera Rubin架构细节）<br>— AMD/英特尔/微软AI新品发布<br>— 戴尔AI服务器财报传导效应发酵<br><strong>本周：</strong>美国非农数据（影响美联储降息预期）</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一预判</div><div class=\"iv\" style=\"font-size:14px\">AI板块有望受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动<strong>高开</strong>。关键看成交量：若高开后量能放大（>3.5万亿）则有望企稳反弹；若缩量需警惕\"高开低走\"。通信线缆方向（亨通光电/长飞光纤）可能延续强势。宇树上会结果决定机器人板块方向。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供底部支撑，沪银夜盘+0.64%。上方突破80美元需更强催化剂。地缘+工业需求双驱动中期偏多。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">①主力资金连续多日大额净流出（周五831亿），筹码消化需要时间 ②若周一高开但量能不济，警惕高开低走 ③美伊地缘局势不确定性 ④科技股估值处于阶段高位需消化</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导效应（周一早盘核心观察）<br><strong>2)</strong> 逢低分批布局算力/光模块/PCB龙头，等待Computex大会催化<br><strong>3)</strong> 重点关注CPO产业链通信线缆新方向（亨通光电、长飞光纤、剑桥科技）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向——关注6/1上会动态</div></div>\n</div>\n\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1507", "date": "2026-05-30 15:07", "title": "AI板块周末复盘 · 科技高切低延续 白银75美元震荡 聚焦Computex+宇树", "tags": ["周末复盘", "AI板块", "白银", "资金流向", "Computex", "宇树IPO", "下周展望"], "summary": "本周A股科技退潮防守崛起，CPO光模块逆势吸金100亿，白银75美元震荡，下周聚焦Computex+宇树双催化。", "html": "<h1>AI板块周末复盘 · 科技高切低延续 白银75美元区间震荡 聚焦下周Computex</h1>\n<p><strong>【2026-05-30 15:07】</strong> | 标签：周末复盘、AI板块、白银、资金流向、下周展望</p>\n\n<p><em>⚠ A股本周五（5月29日）已收盘，今日为周六，A股休市。本报告聚焦盘后消息、本周回顾及下周（Computex大会+宇树IPO）前瞻。</em></p>\n\n<hr>\n\n<h2>零、COMEX白银期货播报</h2>\n<ul>\n<li><strong>最新收盘价：</strong>COMEX白银期货报<strong>75.58美元/盎司</strong>（5月29日收盘），日内跌0.43%</li>\n<li><strong>周度表现：</strong>周跌0.81%；<strong>月度表现：</strong>5月累计涨2.1%</li>\n<li><strong>近期走势：</strong>白银本周经历急跌后低位修复，5月28日一度跌至73.29美元（日内跌2.84%），随后反弹修复至75美元上方。整体呈现\"急跌-弱反弹-区间震荡\"格局，反弹力度温和，未扭转5月以来的弱势形态。</li>\n<li><strong>驱动因素简析：</strong>\n<ul>\n<li><strong>美元指数：</strong>美元指数目前在99.15附近低位运行，对贵金属构成一定支撑，但支撑力度边际减弱</li>\n<li><strong>美联储政策：</strong>美国4月核心PCE数据低于预期，一度推动金银短线拉升，但市场对降息节奏仍存分歧</li>\n<li><strong>地缘风险：</strong>中东局势（美伊对峙）提供避险支撑，但未引发大规模避险资金涌入白银</li>\n<li><strong>工业需求：</strong>太阳能光伏等关键领域正在减少用银量，尝试替代材料，工业需求支撑力减弱</li>\n<li><strong>机构观点：</strong>美银预计银价Q4可能触及100美元但\"昙花一现\"；瑞银将Q2目标从100下调至85美元，年底目标80美元。2026年供应缺口预计大幅收窄90%</li>\n<li><strong>上金所动态：</strong>上金所宣布自6月1日起下调白银延期合约保证金和涨跌幅限制，释放波动率回落信号</li>\n</ul>\n</li>\n</ul>\n\n<hr>\n\n<h2>一、AI板块整体市场概览</h2>\n<p>A股本周五（5月29日）整体震荡回调，前期领涨的<strong>AI科技主线全面退潮</strong>，科创综指跌逾3%，高位板块（计算机、电子、半导体）遭遇大面积主力资金净流出。但盘后数据显示出<strong>结构性分化</strong>：光模块\"易中天\"（新易盛、中际旭创、天孚通信）本周合计获主力净流入近100亿元，成为AI产业链中最亮眼的细分方向。市场正从\"全面炒作\"切换至\"业绩兑现\"阶段，下周<strong>Computex 2026大会</strong>（6月2-5日）与<strong>宇树科技IPO上会</strong>（6月1日）有望成为最强催化。</p>\n\n<hr>\n\n<h2>二、细分领域动态</h2>\n\n<h3>🔥 算力板块</h3>\n<ul>\n<li><strong>资金面：</strong>本周AI算力芯片板块主力资金净流出但规模收窄（5月28日净流出20.95亿元）。光模块等算力硬件端获资金逆势加仓，中际旭创主力净流入18.01亿元领跑。但整体科技板块（电子行业）全周主力净流出<strong>756亿元</strong>，资金呈\"高切低\"特征。</li>\n<li><strong>政策面：</strong>发改委5月22日明确\"指导国产大模型加大力度适配国产算力芯片\"。5月25日半导体\"韬定律\"发布，提出逻辑折叠等创新技术，为国产AI算力芯片提供不依赖EUV的新路径。</li>\n<li><strong>基本面：</strong>Cerebras 5月14日纳斯达克上市，首日暴涨89%，市值750亿美元。海外云厂商2026年资本开支超预期——谷歌/微软/Meta/亚马逊合计7250亿美元，同比+77%。戴尔AI服务器营收暴增，股价单日飙升35%。</li>\n<li><strong>情绪面：</strong>市场对算力板块情绪分化——高位获利了结情绪浓厚，但对下周Computex大会（6月2-5日\"AI Together\"主题）抱有强烈预期，预计将发布AI芯片、液冷散热等新产品。</li>\n</ul>\n\n<h3>💾 存储板块</h3>\n<ul>\n<li><strong>资金面：</strong>电子行业本周融资净买入逾359亿元（超其他行业总和），但主力资金净流出规模巨大。存储个股中，<strong>深科技</strong>遭主力净流出10.18亿元，<strong>兆易创新</strong>遭净流出73.64亿元，资金分歧明显。</li>\n<li><strong>政策面：</strong>摩根大通最新报告指出存储行业已步入多年上行周期，2026-2027财年市场规模预期上调42%-48%。工信部与国家数据局联合启动\"模数共振\"行动，推动数据-模型-场景循环。</li>\n<li><strong>基本面：</strong>2026年Q1全球DRAM营收达970亿美元（环比+80%，同比+260%），创历史新高。HBM消耗预计2026年增长70%+。存储合约价持续攀升：Q2预估DRAM季增58-63%，NAND季增70-75%。</li>\n<li><strong>情绪面：</strong>存储涨价逻辑仍在持续，但短期涨幅过大带来获利回吐压力。机构普遍看好2026-2027年存储超级上行周期，AI相关存储价值占比预计从2025年30%升至2027年45%。</li>\n</ul>\n\n<h3>🤖 机器人板块</h3>\n<ul>\n<li><strong>资金面：</strong>5月29日人形机器人板块逆势获主力资金净流入，成为资金避风港方向之一。但本周整体呈\"先跌后稳\"——5月27日曾单日暴跌超7%，主力净流出超27亿元。5月28日主力净流出扩大至<strong>97.76亿元</strong>。</li>\n<li><strong>政策面：</strong>国家工业信息安全发展研究中心启动《人形机器人安全分级技术规范》行业标准编制。上海\"十五五\"规划推动10万台机器人进工厂。宇树科技科创板IPO将于6月1日上会，冲刺A股\"人形机器人第一股\"。</li>\n<li><strong>基本面：</strong>2026年4月我国工业机器人出口量突破2.5万台，同比+90%。特斯拉弗里蒙特产线切换为年产百万台人形机器人产线。波士顿动力Atlas备战2026世界杯，现代计划2028年量产3万台。</li>\n<li><strong>情绪面：</strong>板块经历\"黑色星期二\"暴跌后情绪修复，但宇树Q1扣非净利润腰斩引发\"增收不增利\"担忧。整体市场对机器人商业化节奏由\"狂热\"转为\"理性期待\"，下周宇树上会成关键催化剂。</li>\n</ul>\n\n<h3>🔌 CPO板块</h3>\n<ul>\n<li><strong>资金面：</strong>CPO概念本周获超百亿元主力净流入。光模块\"易中天\"（新易盛+47亿、中际旭创+20亿、天孚通信+35亿）合计吸金近100亿元，成为全市场最受主力青睐的细分领域。但华工科技遭净流出超49亿元。</li>\n<li><strong>政策面：</strong>LightCounting预测2030年CPO市场规模达100亿美元。台积电硅光整合平台COUPE预计2026年量产，国金证券认为这是CPO技术从0到1的关键里程碑。</li>\n<li><strong>基本面：</strong>中际旭创2026年Q1营收194.96亿元（同比+192%），归母净利润57.35亿元（同比+262%），业绩持续超预期。美股迈威尔科技上调光互连营收预期至+70%（此前+50%）。</li>\n<li><strong>情绪面：</strong>CPO/光模块成为AI产业链中业绩兑现确定性最高的方向，被多家券商评为\"2026最强主线\"。国盛证券建议\"重回大光主线\"，认为随着时间进入6月，2027年需求预期明朗，龙头业绩有望加速释放。</li>\n</ul>\n\n<hr>\n\n<h2>三、主流净流入板块监控</h2>\n<p><strong>本周（5月25日-5月29日）主力资金净流入排行TOP10：</strong></p>\n<ol>\n<li><strong>公用事业（电力）</strong> —— 净流入325亿元（周涨8.65%）🔥 遥遥领先</li>\n<li><strong>通信（含光模块）</strong> —— 净流入206亿元</li>\n<li><strong>电子（含光模块/CPO）</strong> —— 净流入超100亿元</li>\n<li><strong>电力设备</strong> —— 净流入超100亿元</li>\n<li><strong>商贸零售</strong> —— 净流入55亿元</li>\n<li><strong>食品饮料（白酒）</strong> —— 净流入45亿元</li>\n<li><strong>医药生物</strong> —— 净流入33亿元</li>\n<li><strong>煤炭</strong> —— 净流入9.65亿元</li>\n<li><strong>房地产</strong> —— 小幅净流入</li>\n<li><strong>钢铁</strong> —— 小幅净流入</li>\n</ol>\n\n<p><strong>净流出排行（部分）：</strong>电子（-756亿）、计算机（-310亿）、机械设备（-293亿）</p>\n\n<p><strong>驱动分析：</strong></p>\n<ul>\n<li><strong>公用事业（电力）</strong>受\"迎峰度夏+AI算电协同\"双驱动，南方电网用电负荷提前攀升，绿电ETF连续17个交易日净流入。粤电力A三连板、大唐发电6连板。</li>\n<li><strong>通信/电子板块</strong>中，光模块/CPO方向逆势吸金，但半导体/消费电子等子方向资金大幅流出，呈现板块内剧烈分化。</li>\n<li><strong>AI板块热度评价：</strong>AI板块（尤其是算力光模块侧）在板块内部呈现高度分化——CPO/光模块仍是全市场最强主线之一，但半导体、计算机等子领域资金出逃严重。整体AI板块相对热度排全市场中游偏上，逊于电力板块但强于纯防御品种。资金偏好从\"概念炒作\"转向\"业绩兑现\"。</li>\n</ul>\n\n<hr>\n\n<h2>四、关键异动个股</h2>\n\n<ol>\n<li><p><strong>中际旭创（300308）</strong> —— CPO/光模块龙头</p>\n<ul>\n<li>5月28日股价大涨6.77%，成交额225亿元居A股第一</li>\n<li>Q1营收195亿同比+192%，净利润57亿同比+262%，业绩持续超预期</li>\n<li>驱动：CPO量产元年+1.6T光模块放量+美股迈威尔光互连预期上调</li>\n</ul>\n</li>\n<li><p><strong>博杰股份（002975）</strong> —— AI算力测试设备</p>\n<ul>\n<li>5月28日、29日连续涨停，股价134.28元</li>\n<li>2025年净利润增557%，切入英伟达AI服务器测试供应链</li>\n<li>AI算力+光通信+人形机器人多赛道布局，市场给予高估值溢价</li>\n</ul>\n</li>\n<li><p><strong>新易盛（300502）</strong> —— 光模块三杰之一</p>\n<ul>\n<li>本周获主力净流入47亿元，居全市场个股净流入第一</li>\n<li>受益CPO需求爆发与海外算力基建持续投入</li>\n<li>北向资金重仓加仓标的，深股通成交活跃（5月29日深股通成交第三）</li>\n</ul>\n</li>\n</ol>\n\n<hr>\n\n<h2>五、总结与展望</h2>\n\n<p><strong>本周回顾：</strong> A股呈现典型的\"科技退潮、防守崛起\"格局——电力板块周涨8.65%领跑，而前期热炒的科技股大幅回调。但结构性亮点在于CPO/光模块方向强势突围，\"易中天\"合计近100亿元主力净流入证明AI算力链业绩兑现逻辑仍被资金认可。</p>\n\n<p><strong>周末/下周展望：</strong></p>\n<ul>\n<li><strong>6月1日（周一）：</strong>宇树科技科创板IPO上会，若通过将成为A股\"人形机器人第一股\"，对机器人板块形成重大催化</li>\n<li><strong>6月2日-5日：</strong>Computex 2026台北电脑展，主题\"AI Together\"，英伟达/AMD/英特尔等巨头将发布最新AI芯片、服务器、液冷方案等，是全球AI产业链最强催化剂</li>\n<li><strong>白银：</strong>预计继续在73-78美元区间震荡。短期关注美PCE数据后续影响及中东局势变化。美银Q4看100美元但提示\"昙花一现\"风险</li>\n<li><strong>板块判断：</strong>下周科技板块（尤其AI算力、CPO、机器人）有望在Computex+宇树双重催化下迎来反弹修复。建议重点关注光模块（中际旭创/新易盛/天孚通信）和机器人（宇树产业链受益标的）两大方向。</li>\n</ul>"}, {"id": "mon-20260530-1607", "date": "2026-05-30 16:07", "title": "AI板块周末复盘 · A股休市 白银75美元震荡 聚焦下周Computex/戴尔财报催化", "tags": ["周末复盘", "白银震荡", "戴尔财报", "Computex", "宇树科技", "高切低", "CPO通信线缆"], "summary": "A股周末休市。周五科技高切低科创50暴跌5%。隔夜美股AI全线大涨，戴尔AI营收+757%暴升35%。白银75美元区间震荡。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.27$</div><div class=\"lbs\">COMEX白银</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.43%</div><div class=\"lbs\">白银日内</div></div>\n  <div class=\"metric-box\"><div class=\"num\">4,569.9$</div><div class=\"lbs\">COMEX黄金</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+0.83%</div><div class=\"lbs\">黄金日内</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 白银75美元震荡 聚焦下周Computex/Dell催化</h1>\n<p><strong>时间：</strong>2026-05-30 16:07（北京时间·A股已收盘·周六）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>A股周末休市中（上周五5/29高切低全线回调，科创50暴跌5.04%）。隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔AI服务器营收+757%盘后飙升35%创历史新高</strong>，全球AI资本开支上修势头不减。COMEX白银期货报75.27美元区间震荡。下周<strong>三重催化：戴尔财报传导+宇树IPO上会(6/1)+Computex大会(6/2-6/5)</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.27美元/盎司</strong> <span class=\"pill pill-down\">日内-0.43%（5/29）</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">周涨跌</div><div class=\"iv\"><span class=\"pill pill-mid\">周跌-0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月涨跌</div><div class=\"iv\"><span class=\"pill pill-up\">月涨+2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.90美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>75.246美元/盎司</strong> <span class=\"pill pill-down\">-0.44%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,284元/千克</strong><span class=\"pill pill-mid\">约+0.64%夜盘</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.93</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <diev class=\"info-item\"><div class=\"il\">国内白银零售</div><div class=\"iv\"><strong>17.3-20.5元/克</strong>（批发-零售）</div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银本周（5/26-5/30）走势剧烈震荡——周一77.27美元→周三73.29美元（-2.84%，三周新低）→周四强力反弹至76.08美元（+3.81%）→周五回落至75.27美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空在75美元一线激烈博弈。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供底部支撑：</strong>美元指数跌至98.93创近期新低，离岸人民币升值至6.7648，对贵金属整体形成支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求上升</li>\n  <li><strong>美伊局势不确定性：</strong>美伊谈判接近达成但仍有反复，霍尔木兹海峡航运仍存风险</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机净多头减少至10,244手（周减1,517手）</li>\n  <li><strong>工业需求长逻辑：</strong>光伏+AI数据中心建设对白银工业需求维持高位，瑞银预计2026年全球白银供应缺口扩大至3亿盎司</li>\n  <li><strong>波动率放大：</strong>白银5月中旬单日曾跌超9%，沪银涨跌停板调整至17%，市场进入高波动模式</li>\n</ul>\n<blockquote>💡 白银自1月29日创下121美元历史高点后已回落约38%，当前在72-80美元区间震荡筑底。短线支撑72美元（前低），上方压力80美元整数关口。市场波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（A股周五5/29收盘回顾）</h2>\n<p>A股三大指数周五<strong>高开低走，全线收跌</strong>，科创50暴跌5.04%领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1541只上涨</strong>，3884只下跌。主力资金净流出<strong>831.55亿元</strong>（连续多日净流出）。北向资金成交4734亿元（占两市14.26%）。</p>\n\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。资金从科技全面撤退至防御方向，<strong>\"高切低\"特征非常清晰</strong>。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。昨日\"易中天\"齐创新高的盛况今日彻底逆转。</p>\n\n<p><strong>但关键信号在外盘——AI热度并未退潮：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n  <li><strong>戴尔AI服务器营收161亿美元+757%</strong>，盘后飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、美光+3.5%续创新高</li>\n  <li><strong>微软涨超5%</strong>（AI助手Copilot企业客户翻倍），Snowflake暴涨36%</li>\n  <li>中概股<strong>霸王茶姬+25%</strong>、百度+2%</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的\"高切低\"</strong>——前期科技涨幅过大后获利回吐，而非产业逻辑破坏。美股AI全线大涨+戴尔财报爆表+Computex下周开幕，AI产业基本面强劲不改。调整后有望迎来修复窗口。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">A股回撤</span> <span class=\"pill pill-up\">美股强势</span> <span class=\"pill pill-up\">戴尔财报最亮眼</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出<strong>372亿元</strong>居全行业第一。中芯国际主力净流出31.4亿居全市场第一。工业富联/兆易创新/长电科技等成交额均超220亿元。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创历史新高、博通+3.2%逼近新高、美光+3.5%续创新高、英伟达小幅波动。AI交易热潮升温中。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1业绩爆表</strong>——AI优化服务器营收<strong>161亿美元同比+757%</strong>，上调全年AI营收预期至600亿美元。这是全球AI基建投资加速的最强确认信号。Cerebras上市首日+89%。微软涨超5%因企业客户AI采用率翻倍。华为推出星河AI数据中心网络（NPU直通存储+带宽提升8倍）。比亚迪发布中国首款4nm智驾芯片。\n<p class=\"sn\"><strong>政策面：</strong>发改委\"人工智能+\"从\"深化拓展\"升级为\"全面实施\"。五部门发布《关于促进人工智能产业创新发展的若干意见》，聚焦算力基础设施、数据要素流通、AI+应用场景。国家能源局召开AI+能源现场推进会。下周<strong>Computex 2026(6/2-6/5)</strong>是最强催化——英伟达黄仁勋主题演讲预计发布Vera Rubin架构更新。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎（获利回吐），但美股情绪持续升温。戴尔财报+35%和Cerebras+89%说明全球资本对AI算力的追逐仍在加速。关注周一A股AI板块高开修复的可能性。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品，性能提升超20%，规划8层32GB和16层64GB版本。美光HBM4产能提升速度达到HBM3两倍。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业信号极为强劲但股价已充分反映。中长期来看HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，回调即布局机会。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。5月27日机器人板块主力净流出143亿元，5月28日净流出98亿元，抛压逐步减弱。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>宇树科技科创板IPO将于6月1日(周一)上会</strong>，冲刺A股\"人形机器人第一股\"拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3已下线投入内部测试，Q2启动量产首代目标100万台/年。现代波士顿动力Atlas备战2026世界杯。Figure 03全天候包裹分拣直播展现成熟度。湘财证券：特斯拉已开启百万台产能人形机器人产线切换，国内相关企业有望获订单。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成机器人板块的标志性催化剂，显著提振板块情绪。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块剧烈分化——光模块龙头高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年被机构定义为<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产。鸿海CPO全光交换机出货目标从此前1万台上调至2026-2027年超过5万台。台积电COUPE封装加速推进，已启动全球首款200Gbps微环调制器量产。LightCounting预测2030年CPO市场规模达100亿美元。中际旭创Q1营收195亿(+192%)净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向成集中配置新方向。但斌转发CPO视频引发业界关注。光模块龙头的短期调整属获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五5/29 TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸（新方向）</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期+防御</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>消费板块资金集中涌入</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一）——AI科技方向全面失血</li>\n  <li><strong>电力+公用事业+火电</strong>合计净流入约110亿，资金全面转向防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块中<strong>唯一逆势吸金方向</strong>——全市场主力净流入第一的亨通光电</li>\n  <li>AI相关板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>对比美股：</strong>美股AI板块周五全线大涨（纳指+0.91%创新高），A股的调整更多是<strong>内部资金博弈</strong>——\"高切低\"阶段性调仓，而非产业端问题</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证信号。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向获资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器成核心增长引擎，验证AI硬件景气</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（5/29）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒/消费</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中<strong>4席</strong>（亨通光电/长芯博创/剑桥科技/长飞光纤），CPO产业链延伸方向是全市场唯一获得集中配置的AI相关方向。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市中（上周五高切低科创50-5.04%）。但隔夜美股AI全线大涨纳指七连涨创新高，AI产业热度持续升温，戴尔财报暴升35%验证算力高景气。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026<br>— 英伟达黄仁勋主题演讲<br>— Vera Rubin架构/下一代AI芯片<br>— 戴尔AI服务器财报传导效应</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动，A股AI板块有望<strong>高开修复</strong>。需关注成交量：若高开后量能放大(维持3万亿+)则有望企稳反弹；若缩量需警惕\"高开低走\"。通信线缆方向（亨通光电/长飞光纤）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡，75美元为核心博弈位。美元走弱提供支撑，沪银夜盘+0.64%。上方突破80美元需更强催化剂（美联储鸽派信号或地缘升级）。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力持续大额净流出，若下周一高开后量能不济需警惕。美伊局势和美国非农数据可能影响全球风险偏好。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力的传导（周一最需关注）<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO产业链通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1700", "date": "2026-05-30 17:00", "title": "AI板块周末复盘 · 本周科技高切低 COMEX白银75.58美元震荡 聚焦Computex/宇树IPO", "tags": ["周末复盘", "高切低", "科技回调", "白银震荡", "CPO通信线缆", "Computex", "宇树IPO"], "summary": "本周A股先扬后抑，周五科技全面退潮（科创50-5.04%）。电力逆势涨8.65%。白银75.58美元5月涨2.1%。下周Computex和宇树IPO是核心催化。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX白银$/oz</div></div>\n  <div class=\"metric-box\"><div class=\"num\">98.93</div><div class=\"lbs\">美元指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">3.32万亿</div><div class=\"lbs\">周成交额</div></div>\n  <div class=\"metric-box\"><div class=\"num\">423亿</div><div class=\"lbs\">周融资净买</div></div>\n</div>\n\n<h1>AI板块周末复盘</h1>\n<p><strong>时间：</strong>2026-05-30 17:00（A股今日已收盘，周末休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>本周A股\"先扬后抑\"——前半周科技强势冲高（易中天齐创新高），周五（5/29）全面退潮（科创50暴跌5.04%）。电力逆势涨8.65%，高切低格局明确。COMEX白银75.58美元震荡，5月整体仍涨2.1%。下周Computex大会（6/2-6/5）和宇树科技IPO（6/1上会）是AI板块最关键的催化窗口。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">日内-0.43%</span> <span class=\"pill pill-mid\">周-0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银（伦敦银）</div><div class=\"iv\"><strong>75.25美元/盎司</strong> <span class=\"pill pill-down\">日内-0.44%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,284元/千克</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.93</strong> <span class=\"pill pill-down\">-0.08%</span> 创近期新低</div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.90美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>白银5月经历剧烈波动——月初70美元启动冲高至近90美元（5/13高点），因美国CPI超预期回撤至73美元（5/18低点），5/25拉升至78美元上方后回落。当前处于<strong>72-80美元宽幅震荡区间</strong>。5月整体仍涨2.1%，年内自1月121美元历史高点腰斩后正在筑底。</p>\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li>✅ <strong>美元持续走弱：</strong>美元指数报98.93创近期新低，对贵金属构成底部支撑</li>\n  <li>✅ <strong>通胀粘性：</strong>美4月PCE同比+3.8%创三年新高，抗通胀需求升温</li>\n  <li>✅ <strong>工业需求故事：</strong>光伏+AI数据中心对白银需求持续增长，瑞银预计2026年供需缺口达3亿盎司</li>\n  <li>⚠️ <strong>美伊谈判：</strong>地缘溢价回落，避险情绪边际降温</li>\n  <li>⚠️ <strong>技术承压：</strong>80美元整数关口形成明显压制，需突破确认上行趋势</li>\n</ul>\n\n<hr>\n\n<h2>一、大盘回顾（本周5.25-5.29综述）</h2>\n<p>本周A股<strong>震荡调整，大幅分化</strong>：</p>\n<ul>\n  <li>科创综指终结连续7周上涨，<strong>跌逾3%</strong></li>\n  <li>北证50周跌幅超6%，连续3周收阴</li>\n  <li>上证指数、深证成指周线小幅下挫</li>\n  <li>周成交放大至<strong>逾16万亿元</strong></li>\n</ul>\n<p><strong>核心特征：</strong>上半周科技强势延续（周四创业板首超沪指），但<strong>周五（5月29日）科技全线退潮</strong>——科创50暴跌5.04%，电子行业净流出372亿。电力板块逆势涨8.65%领跑全场。</p>\n<p><strong>资金面关键数据：</strong></p>\n<ul>\n  <li>融资余额历史首次突破<strong>2.9万亿元</strong>，全周净买入<strong>423亿元</strong>（连续第8周加仓）</li>\n  <li>申万电子行业获<strong>359亿元</strong>融资净买入（超过其他行业总和）</li>\n  <li>公用事业本周主力净流入<strong>325亿元</strong>居首，通信<strong>206亿元</strong>紧随</li>\n  <li>计算机遭融资净卖出17亿元，人形机器人主力净流出221亿元</li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>本周AI板块经历<strong>先涨后跌</strong>的剧烈波动行情——上半周算力/光模块/半导体强势上攻，\"易中天\"齐创历史新高；<strong>周五全面退潮</strong>，人工智能指数(BK0800)跌3.06%，科创人工智能指数跌3.52%。</p>\n<p><strong>周末重要动态：</strong></p>\n<ul>\n  <li>阿里Qoder上线Cloud Agents全托管AI Agent运行平台</li>\n  <li>2026证券市场年会数字经济大会在北京举行</li>\n  <li>⭐ <strong>下周6/2-6/5 Computex 2026大会即将召开</strong>，是AI板块下一最重要催化窗口</li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-up\">本周吸金近100亿（光模块）</span> <span class=\"pill pill-mid\">情绪 中性</span></div>\n<p class=\"sn\"><strong>资金面：</strong>通信行业全周净流入206亿元。光模块\"三杰\"（新易盛/中际旭创/天孚通信）合计<strong>吸金近100亿元</strong>，工业富联净流入38.71亿元。但5/29电子行业单日净流出372亿元，获利盘兑现压力巨大。</p>\n<p class=\"sn\"><strong>政策面：</strong>国家发改委谋划出台加快\"人工智能+\"落地配套文件；工信部启动\"模数共振\"行动。⭐ <strong>Computex大会（6/2-6/5）</strong>即将召开，英伟达/AMD将发布最新AI芯片方案。</p>\n<p class=\"sn\"><strong>基本面：</strong>Cerebras在美上市首日大涨89%（市值750亿美元）。戴尔AI服务器营收161亿美元（+757%）。四大云厂商2026年资本支出合计达<strong>7250亿美元（+77%）</strong>。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期资金兑现获利情绪浓厚，但美股纳指创新高。中长期算力景气趋势确定，调整是<strong>筹码消化而非逻辑破坏</strong>。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">HBM基本面最强</span> <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>基本面：</strong>HBM基本面持续超强——<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品。2026Q1全球DRAM营收逼近<strong>970亿美元（+260%）</strong>。集邦预计2026年HBM需求再增70%+。美光警告内存短缺将持续至2026年后。</p>\n<p class=\"sn\"><strong>政策面：</strong>苹果被曝与三星、SK海力士洽谈为20周年iPhone引入HBM内存，终端应用场景进一步拓宽。</p>\n<p class=\"sn\"><strong>资金/情绪面：</strong>北向资金在存储龙头交投活跃（澜起科技沪股通成交42亿），但短期股价已充分反映涨价预期。中长期HBM是AI产业链中<strong>供需格局最紧张</strong>的环节。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">本周净流出221亿</span> <span class=\"pill pill-mid\">情绪 等待催化</span></div>\n<p class=\"sn\"><strong>基本面：</strong>⭐ <strong>宇树科技科创板IPO将于6月1日（下周一）上会</strong>，冲刺A股\"人形机器人第一股\"。2026年是人形机器人<strong>规模化验证关键期</strong>。海关数据显示4月工业机器人出口量破2.5万台（+90%）。中国2025年整机出货量占全球84.71%。</p>\n<p class=\"sn\"><strong>情绪面：</strong>板块处于<strong>等待宇树上会结果的真空期</strong>。若顺利过会将为板块注入强心剂，有望带动执行器/减速器/传感器等核心环节反弹。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span> <span class=\"pill pill-up\">情绪 结构性乐观</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块分化——光模块龙头高位震荡但<strong>通信线缆逆势强势</strong>。本周通信线缆及配套净流入<strong>39.83亿元</strong>，亨通光电主力净流入<strong>39.76亿</strong>（全市场第一）。本周CPO概念、AI手机均获超百亿元净流入。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台。LightCounting预测2030年CPO市场规模达100亿美元。中际旭创Q1营收195亿（+192%）、净利57亿（+262%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金在找CPO产业链\"新面孔\"，通信线缆方向获集中配置。产业从\"0到1\"的认知扩散阶段，中长期确定性高。</p>\n</div>\n\n<hr>\n\n<h2>四、本周主流净流入板块监控（TOP5）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>本周净流入</th><th>核心驱动</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>公用事业（电力）</td><td><span class=\"green\">+325亿元</span></td><td>防御+夏季用电高峰+AI算力拉动电力</td><td><span class=\"pill pill-mid\">防御/业绩</span></td></tr>\n  <tr><td><strong>2</strong></td><td>通信</td><td><span class=\"green\">+206亿元</span></td><td>光模块/CPO/通信线缆受益AI基建</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>3</strong></td><td>电子</td><td><span class=\"green\">+100亿+</span></td><td>半导体代工景气+AI芯片需求爆发</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>电力设备</td><td><span class=\"green\">+100亿+</span></td><td>电网升级+AI数据中心配套</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>商贸零售</td><td><span class=\"green\">+55亿元</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n</table>\n<p><strong>AI板块相对热度判断：</strong></p>\n<ul>\n  <li>本周AI方向（电子+通信）合计净流入超<strong>300亿元</strong>，在全市场位居前列</li>\n  <li>但5/29单日AI方向净流出<strong>372亿元</strong>，热度急剧下降</li>\n  <li><strong>资金整体呈现\"周初追科技、周末切防御\"</strong>的节奏，市场分歧加剧</li>\n  <li>核心结论：AI产业方向确定，但短期资金博弈白热化，下周Computex大会是<strong>方向选择关键催化剂</strong></li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">本周主力净流入39.76亿<br>全市场第一</span></td><td>CPO/算力互联延伸标的，通信线缆龙头获资金集中抢筹</td></tr>\n  <tr><td><strong>华天科技</strong></td><td>002185</td><td><span class=\"pill pill-up\">本周净流入140亿+</span></td><td>全周唯一净流入超百亿个股，半导体封装龙头受益AI芯片高景气</td></tr>\n  <tr><td><strong>中际旭创</strong></td><td>300308</td><td><span class=\"pill pill-up\">5/28成交225亿A股第一</span></td><td>5/28大涨6.77%后5/29回落。Q1营收195亿+192%，业绩确定性强</td></tr>\n</table>\n\n<hr>\n\n<h2>六、本周热点概念涨跌榜</h2>\n<p><strong>涨幅居前：</strong></p>\n<ul>\n  <li>🔥 <strong>火电：</strong>+200亿净流入，板块涨8.65%</li>\n  <li>🔥 <strong>光通信：</strong>+200亿净流入</li>\n  <li>🔥 <strong>CPO概念：</strong>+100亿净流入</li>\n  <li>🔥 <strong>培育钻石：</strong>连续8周上涨，创历史新高</li>\n</ul>\n<p><strong>跌幅居前：</strong></p>\n<ul>\n  <li>❄️ <strong>AI PC板块：</strong>-272亿元净流出</li>\n  <li>❄️ <strong>人形机器人：</strong>-221亿元净流出</li>\n  <li>❄️ <strong>新能源车/大数据：</strong>-100亿+净流出</li>\n</ul>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 本周定性</div><div class=\"iv\" style=\"font-size:14px\">周末休市。本周\"先扬后抑\"——科创50终结7连阳。电力涨8.65%、科技全线退潮。高切低格局明确。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⭐ 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1 宇树科技IPO上会</strong>（人形机器人第一股）<br><strong>2) 6/2-6/5 Computex 2026大会</strong>（全球AI年度最强催化窗口）</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股三大指数<strong>齐创新高</strong>（纳指六连涨）。Snowflake暴涨36%，英伟达/微软上涨。费城半导体+1%。AI产业热度仍在。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银75.58美元，5月涨2.1%。72-80美元区间宽幅震荡，短线关注美元走势和下周非农数据。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续大额净流出，若Computex无法提振情绪，调整时间可能延长。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头。关注CPO通信线缆方向新机会。若宇树科技顺利过会，机器人板块有望率先反弹。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260530-1809", "date": "2026-05-30 18:09", "title": "AI板块周末复盘 · 科技高切低 戴尔AI营收爆表 白银75美元震荡", "tags": ["周末复盘", "高切低", "戴尔财报", "白银震荡", "Computex", "宇树科技", "CPO通信线缆"], "summary": "上周五科技全线退潮科创50暴跌5.04%。隔夜美股AI全线大涨戴尔AI营收+757%盘后飙升35%。白银75美元震荡。聚焦下周Computex+宇树IPO催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔盘后</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技高切低 戴尔AI营收爆表 聚焦下周Computex催化</h1>\n<p><strong>时间：</strong>2026-05-30 18:09（A股上周五5/29已收盘，当前是周末非交易时段）</p>\n\n<div class=\"tagline\">📌 <strong>盘面回顾：</strong>上周五（5/29）A股上演\"高切低\"全面切换——科技全线退潮，科创50暴跌5.04%。电力/消费/通信线缆逆势吸金。但 <strong>隔夜美股AI全线大涨纳指七连涨创新高</strong>，戴尔财报AI服务器营收+757%盘后飙升35%。下周<strong>宇树IPO上会(6/1) + Computex大会(6/2-6/5)</strong>是AI板块最强催化窗口。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货(5/29收)</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">周涨跌幅</div><div class=\"iv\"><strong>-0.81%</strong> <span class=\"pill pill-mid\">周线微跌</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月月涨幅</div><div class=\"iv\"><strong>+2.1%</strong> <span class=\"pill pill-up\">月线收红</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金(5/29收)</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.15</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC银净多</div><div class=\"iv\">10,244手 <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>白银本周剧烈震荡——周初77.27美元→周三下探至73.29美元(-2.84%)→周四强力反弹+3.81%至76.08美元→周五回落至75.58美元(-0.43%)。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空在75美元一线激烈博弈。5月月线收涨约2.1%，但距1月历史高点121美元已回落约38%。</p>\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数维持99.15附近低位，对贵金属形成底部支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE同比+3.8%创三年新高，抗通胀资产需求升温</li>\n  <li><strong>美伊局势：</strong>特朗普称即将做出\"最终决定\"，中东地缘不确定性维持高位</li>\n  <li><strong>投机情绪降温：</strong>CFTC显示投机净多头减少至10,244手，看涨情绪降温</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心对白银需求维持高位，中长期基本面偏多</li>\n  <li><strong>波动率放大：</strong>5月中旬单日跌超9%后市场波动率系统性提升，价格呈现急涨急跌特征</li>\n</ul>\n<blockquote>💡 白银当前72-80美元区间震荡筑底，短线支撑72美元(前低)，压力80美元整数关口。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（周五5/29收盘回顾）</h2>\n<p>A股上周五高开低走全面收跌，科创50暴跌5.04%领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n<p>全市场仅<strong>1,565只上涨</strong>，3,867只下跌。主力资金单日净流出<strong>831.55亿元</strong>。申万一级中食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5,398亿元。前期强势的半导体、算力、CPO等集体杀跌。</p>\n<p><strong>核心特征：</strong>两日\"冰火两重天\"——周四创业板首超沪指、\"易中天\"齐创新高，周五全面退潮科创50暴跌5%。这是典型的<strong>\"高切低\"</strong>切换，而非产业逻辑破坏。</p>\n<p><strong>积极信号在外盘：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n  <li><strong>戴尔AI服务器营收161亿美元 +757%</strong>，盘后暴涨35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li>高通+6%、ARM+5%再创历史新高、美光+3.5%续创新高</li>\n</ul>\n<p><strong>核心判断：</strong>A股AI板块调整是交易层面的筹码消化（前期涨幅过大后的获利回吐），美股AI全线大涨印证产业逻辑并未破坏。下周Computex大会和戴尔财报传导效应有望带动情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出<strong>372.05亿</strong>居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创新高、博通+3.2%、英伟达+1.5%、美光+3.5%。市场对AI算力的需求定价仍在强化。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年预期至600亿美元——这是全球AI基建加速的最强确认。Cerebras上市首日+89%。四大云厂商2026年资本支出合计7250亿美元(+77%)。华为星河AI数据中心NPU与存储直通带宽提升8倍。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构细节。发改委\"人工智能+\"从拓展升级为\"全面实施\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎，但美股情绪持续升温。戴尔财报情绪有望向下周一A股传导，AI服务器/算力产业链有望高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品，性能提升超20%。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。闪迪CTO：AI竞赛正在变成\"拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>宇树科技科创板IPO 6月1日上会</strong>，冲刺A股\"人形机器人第一股\"拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产100万台。Figure 03机器人全天候包裹分拣直播。小鹏IRON机器人Q3亮相、年底量产。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块标志性催化剂，带动情绪企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头中际旭创高位震荡（成交225亿A股第一），但<strong>通信线缆及配套</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技11.73亿、长飞光纤10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台以上。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。Lumentum光通信产能已售罄至2028年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频引发关注。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿
