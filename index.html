——亨通光电全市场净流入第一</li>\n  <li>AI板块合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li>但值得注意的是：隔夜美股AI是全市场最大吸金方向——A股和美股对AI的定价出现<strong>阶段性背离</strong></li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后暴涨+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸，获主力资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创历史新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报AI服务器营收超预期，成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五5/29）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通光电、长芯博创、剑桥科技、长飞光纤），CPO产业链延伸方向是周五全市场唯一获得集中配置的AI相关方向。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3预计年中亮相，Q2启动正式量产，首代目标年产能100万台。A股核心受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p>2026年是人形机器人从0到1的<strong>量产兑现阶段</strong>。6月1日宇树科技IPO上会是行业标志性事件。板块适合<strong>逢低布局</strong>，核心仓位以三花+绿的为主。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。上周五科技高切低全线回调科创50-5.04%，但隔夜美股AI全线大涨纳指七连涨创新高。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人里程碑）<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026<br>— 英伟达黄仁勋主题演讲<br>— 可能发布Vera Rubin架构新细节<br>— 微软Copilot+ PC升级 / AMD Zen6<br>— 戴尔AI服务器财报传导效应</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量：放量则有望企稳反弹，缩量则警惕高开低走。通信线缆方向（亨通光电）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡筑底。美元走弱提供支撑，沪金夜盘+1.61%、沪银+0.64%。突破80美元需要更强催化剂（鸽派信号或地缘升级）。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力连续多日大额净流出。若下周一高开但成交量不足，需警惕\"高开低走\"。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力的传导效应<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1907", "date": "2026-05-30 19:07", "title": "AI板块周末复盘 · A股休市 聚焦戴尔/Computex/宇树三重催化 白银75.58美元震荡", "tags": ["周末复盘", "高切低", "白银震荡", "戴尔财报", "Computex", "宇树科技", "CPO通信线缆"], "summary": "A股周末休市。上周五科技高切低全线回调(科创50-5.04%)。隔夜戴尔AI营收+757%盘后暴涨35%。白银75.58美元震荡。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58$</div><div class=\"lbs\">COMEX银</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+2.1%</div><div class=\"lbs\">5月月线</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔盘后</div></div>\n  <div class=\"metric-box\"><div class=\"num\">休市中</div><div class=\"lbs\">A股状态</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 聚焦戴尔/Computex/宇树三重催化</h1>\n<p><strong>时间：</strong>2026-05-30 19:07（A股上周五已收盘，当前为周末非交易时段）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>A股周末休市中。上周五（5/29）A股上演\"高切低\"全线切换——科技板块全面退潮，科创50暴跌5.04%。电力/消费/通信线缆逆势吸金。但 <strong>隔夜美股AI全线大涨纳指七连涨创新高</strong>，戴尔财报AI服务器营收+757%盘后飙升35%创历史新高——<strong>下周一A股有望迎来情绪修复</strong>。下周<strong>宇树IPO上会（6/1）+ Computex大会（6/2-6/5）</strong>是AI板块最强催化窗口。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货（5/29收）</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">日内-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">周涨跌幅</div><div class=\"iv\"><strong>-0.81%</strong> <span class=\"pill pill-mid\">周线微跌</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月月涨幅</div><div class=\"iv\"><strong>+2.1%</strong> <span class=\"pill pill-up\">月线收红</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货（5/29收）</div><div class=\"iv\"><strong>4,569.90美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.93</strong> <span class=\"pill pill-down\">创近期新低</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">国内白银T+D</div><div class=\"iv\"><strong>18,284元/千克</strong> <span class=\"pill pill-mid\">夜盘+0.64%</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银本周剧烈震荡——周初77.27美元→周三下探73.29美元（周内低点）→周四强力反弹+3.81%至76.08美元→周五回落至75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空在75美元一线激烈博弈。5月月线收涨约+2.1%，但较1月121美元历史高点已回落约38%。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li>✅ <strong>美元持续走弱：</strong>美元指数报98.93创近期新低，离岸人民币升值至6.7648，对贵金属构成底部支撑</li>\n  <li>✅ <strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求升温</li>\n  <li>✅ <strong>工业需求长逻辑：</strong>光伏+AI数据中心对白银需求维持高位，瑞银预计2026年供需缺口达3亿盎司</li>\n  <li>⚠️ <strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机净多头降至10,244手（周减1,517手），看涨情绪降温</li>\n  <li>⚠️ <strong>技术承压：</strong>80美元整数关口形成明显压制，需有效突破方确认上行趋势</li>\n</ul>\n<blockquote>💡 白银当前处于72-80美元震荡筑底阶段。短线支撑看72美元（前低），上方压力80美元。5月银价波动率显著放大（曾单日跌超9%），注意仓位管理。中长期看，机构目标价仍有分歧——美银预计Q4触及100美元，瑞银已将Q2目标价从100下调至85美元。</blockquote>\n\n<hr>\n\n<h2>一、大盘回顾（上周五5/29收盘 + 本周综述）</h2>\n\n<p><strong>周五（5/29）收盘数据：</strong></p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04%</span> 💥</div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1,565只上涨</strong>，3,867只下跌。主力资金单日净流出<strong>831.55亿元</strong>。涨停仅40只，跌停75只。</p>\n\n<p><strong>本周（5.25-5.29）关键数据：</strong></p>\n<ul>\n  <li><strong>A股融资余额历史首破2.9万亿元</strong>，全周净买入<strong>423亿元</strong>（连续第8周加仓）</li>\n  <li>申万电子行业获<strong>359亿元</strong>融资净买入（超过其他行业总和）</li>\n  <li>公用事业全周主力净流入<strong>325亿元</strong>居首（电力板块逆势涨<strong>8.65%</strong>）</li>\n  <li>通信行业全周主力净流入<strong>206亿元</strong>（光模块/CPO/通信线缆）</li>\n  <li>计算机行业全周融资净卖出逾17亿元</li>\n  <li>北向资金成交4734亿元（5/29占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三</li>\n</ul>\n\n<p><strong>核心特征：</strong>本周\"先扬后抑\"——上半周科技强势冲高（易中天齐创新高），周五全线退潮。这是<strong>\"高切低\"</strong>阶段性切换，而非产业逻辑破坏。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n\n<p>上周五AI板块全面回调，人工智能指数(BK0800)收跌<strong>3.06%</strong>，成交额5,398亿元。前期强势的半导体、算力、CPO集体杀跌。</p>\n\n<p><strong>关键背离信号——外盘AI热度不减：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n  <li><strong>戴尔AI服务器营收161亿美元+757%</strong>，盘后飙升35%创历史新高——全球最强AI资本开支验证</li>\n  <li><strong>Cerebras</strong>纳斯达克上市首日暴涨89%，市值750亿美元——晶圆级AI芯片赛道引爆</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、博通+3.2%、美光+3.5%续创新高</li>\n  <li><strong>微软涨超5%</strong>（AI Copilot企业客户翻倍）、Snowflake暴涨36%</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），美股AI全线大涨印证产业基本面强势不改。A股与美股对AI的定价出现<strong>阶段性背离</strong>，下周一有望修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 美股强势</span> <span class=\"pill pill-up\">戴尔财报最亮眼</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业单日净流出<strong>372.05亿元</strong>居全行业第一。中芯国际主力净流出31.4亿居全市场第一。但光模块\"三杰\"全周合计吸金近100亿元，算力板块全周资金仍是净流入。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创历史新高、博通+3.2%逼近前高、美光+3.5%续创新高。戴尔盘后+35%创历史新高。AI交易热潮升温中。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年AI营收预期至600亿美元——这是全球AI基建加速的最强确认信号。Cerebras上市首日+89%。四大云厂商2026年资本支出合计<strong>7250亿美元（+77%）</strong>。华为星河AI数据中心网络NPU与存储直通带宽提升8倍。比亚迪发布中国首款4nm智驾芯片。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布新一代AI芯片与Vera Rubin架构细节。发改委\"人工智能+\"从深化拓展升级为全面实施。五部门联合发布《关于促进人工智能产业创新发展的若干意见》。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎（获利回吐），但美股情绪持续升温。戴尔财报情绪有望向下周一A股传导——AI服务器/算力产业链有望高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span> <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong><strong>HBM3E现货价半年暴涨超300%</strong>。全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。三星率先交付首批12层48GB HBM4E样品，性能提升超20%。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺将持续至2026年后。闪迪CTO直言：AI竞赛正在变成\"拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期。中长期来看，HBM是AI产业链中<strong>供需格局最紧张</strong>的环节——回调即布局机会。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>本周人形机器人板块全周主力净流出<strong>221亿元</strong>。但周四周五成交缩量，抛压在逐步消化中。天永智能前期涨停后回落，奥比中光在科创AI指数中抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>⭐ 宇树科技科创板IPO 6月1日（下周一）上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。海关4月工业机器人出口量突破2.5万台（同比+90%）。特斯拉Optimus Gen-3已下线投入内部测试，Q2启动正式量产，首代目标年产100万台。Figure 03全天候包裹分拣直播展现成熟度。湘财证券：特斯拉已开启百万台产能人形机器人产线切换，国内相关企业有望获批量订单。现代波士顿动力Atlas备战2026年世界杯。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块<strong>标志性催化剂</strong>，显著提振板块情绪，带动执行器/减速器/传感器等核心环节反弹。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span> <span class=\"pill pill-up\">情绪 结构性乐观</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块剧烈分化——光模块龙头中际旭创高位震荡（5/28成交额225亿A股第一），但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技11.73亿、长飞光纤10.39亿、中天科技9.35亿。全周CPO概念+AI手机合计获超100亿元净流入。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确2026年Q4启动CPO量产。鸿海集团CPO全光交换机出货目标从此前1万台上调至2026-2027年超过5万台。台积电COUPE封装加速推进，已启动全球首款200Gbps微环调制器量产。LightCounting预测2030年CPO市场规模达100亿美元。中际旭创Q1营收194.96亿（+192%），归母净利润57.35亿（+262%）。Lumentum光通信产能已售罄至2028年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频引发产业关注。中长期CPO产业确定性极高。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五5/29 TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰+AI算力拉动</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技向防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸，亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>10</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li><strong>全市场主力单日净流出831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>居全行业第一；机械设备/电力设备各超100亿</li>\n  <li><strong>电力+公用事业</strong>合计约85亿——资金全面撤退至防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块唯一逆势吸金方向——亨通光电全市场净流入第一（39.76亿）</li>\n  <li>AI方向（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>但AI并非全周输家：</strong>电子行业全周融资净买入359亿元（超过其他行业总和），光模块全周吸金近100亿</li>\n  <li>A股与美股出现<strong>阶段性背离</strong>——美股AI全线创新高，A股在\"高切低\"消化中</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后暴涨+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元(+757%)，上调全年AI营收预期至600亿美元。全球最强AI硬件业绩验证信号。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创历史新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报AI服务器营收超预期，成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线，Q2启动正式量产，首代目标年产能<strong>100万台</strong>。A股核心受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p>2026年是人形机器人从0到1的<strong>量产兑现阶段</strong>。6月1日宇树科技IPO上会是行业里程碑事件。板块前期深度调整后（5月27日暴跌7%+，本周净流出221亿），已进入高性价比配置窗口。核心仓位以三花+绿的谐波为主。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。上周五（5/29）科技高切低全线回调（科创50-5.04%），但隔夜美股AI全线创新高。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人里程碑）<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026<br>— 英伟达黄仁勋主题演讲<br>— Vera Rubin架构细节<br>— 戴尔财报传导效应<br>— 微软Copilot+ PC升级</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔+35%</strong>和美股AI全面上涨带动，A股AI板块有望<strong>高开修复</strong>（AI服务器/算力方向最先受益）。关键观察成交量——若高开放量(3万亿+)则有望站稳；若缩量需警惕高开低走。通信线缆方向（亨通/长飞/剑桥）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银75.58美元，72-80美元区间震荡筑底。美元走弱提供支撑。5月月线+2.1%。短期关注下周美国非农数据和美联储表态。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力连续大额净流出。若下周一高开但成交量不足，需警惕\"高开低走\"。宇树上会结果若不及预期可能拖累机器人板块。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力的传导效应<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-2007", "date": "2026-05-30 20:00", "title": "AI板块周末复盘 · 科技高切低 下周Computex大会与宇树IPO成焦点 白银75-76美元震荡", "tags": ["周末复盘", "高切低", "科技回调", "Computex", "白银", "CPO通信线缆"], "summary": "A股周五科技全线退潮科创50暴跌逾5%，周末休市。聚焦下周Computex大会和宇树IPO两大催化事件。白银75美元附近震荡。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.73%</div><div class=\"lbs\">上证涨跌</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">3.32万亿</div><div class=\"lbs\">成交额</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技高切低 聚焦下周两大催化事件</h1>\n<p><strong>时间：</strong>2026-05-30 20:00（A股今日已收盘，周末休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>周五A股上演\"高切低\"全面切换——科创板暴跌逾5%，科技板块全面退潮。电力、消费、通信线缆逆势吸金。COMEX白银75-76美元震荡。下周两大事件将决定AI板块走向：<strong>6/1 宇树科技IPO上会 + 6/2-6/5 Computex大会</strong>。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.27美元/盎司</strong> <span class=\"pill pill-down\">日内 -0.85%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>74.98-75.85美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>约18,350元/千克</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.01-99.32</strong> <span class=\"pill pill-down\">延续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货黄金</div><div class=\"iv\"><strong>约4,465美元/盎司</strong> <span class=\"pill pill-down\">-0.36%</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>COMEX白银自5月13日冲高至近90美元后快速回落至73美元附近，此后在72-78美元区间剧烈震荡。5月29日受美伊和谈进展及美元走弱提振，日内一度大涨3.81%至76.08美元；今日（5月30日）COMEX白银报75.27美元，日内微跌0.85%。整体处<strong>宽幅震荡筑底</strong>阶段，尚未有效突破80美元关口。</p>\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数运行在99-99.32区间，较前期高位明显回落，对贵金属形成底部支撑</li>\n  <li><strong>美伊和谈博弈：</strong>美伊延长60天停火协议有望达成，霍尔木兹海峡通航效率边际改善，地缘风险溢价阶段性下降</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE同比+3.8%创三年新高，降息预期反复，抗通胀资产仍有需求</li>\n  <li><strong>工业需求增长：</strong>全球光伏装机+AI数据中心对白银的工业需求维持高位，长期基本面强劲</li>\n  <li><strong>波动率放大：</strong>5月中旬单日暴跌超9%后市场波动率系统性提升，多空分歧加剧</li>\n  <li><strong>机构观点分化：</strong>美国银行看多年内冲击100美元，但瑞银下调目标价；多空分歧加剧</li>\n</ul>\n<blockquote>💡 白银当前处于<strong>72-80美元宽幅震荡区间</strong>。短线支撑72美元，上方压力80美元。市场波动剧烈（5月振幅超30%），操作上注意仓位管理。关注下周美国非农数据及美联储官员表态。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（回顾周五5/29行情）</h2>\n<p>A股三大指数周五高开低走全线收跌，科创50暴跌逾5%领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">约4038 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">中证500</div><div class=\"iv\"><span class=\"pill pill-down\">-2.07%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（+3500亿放量下跌）</div></div>\n</div>\n<p><strong>盘面特征：</strong>涨跌比约3:7（1565涨/3867跌），主力资金净流出<strong>831.55亿元</strong>。食品饮料(+3.02%)、煤炭、公用事业领涨；综合(-5.39%)、国防军工(-4%+)、电子(-4%+)领跌。北向资金总成交4734亿元（占两市14.26%）。</p>\n\n<p><strong>5月全月回顾：</strong>沪指月线收跌1.06%，走出\"先扬后抑\"态势（月初冲高4259，月末回落4069）。科创50月涨超11%，创业板指月涨近10%站稳4000点。但5月ETF合计净流出<strong>3571亿元</strong>资金借道离场，宽基指数ETF净流出2874亿元，机构\"越涨越卖\"特征明显。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n<ul>\n  <li>昨日（周四）\"易中天\"齐创新高、半导体爆发的盛况<strong>彻底反转</strong></li>\n  <li><strong>两日\"冰火两重天\"</strong>——主力资金系统性从高位科技抱团品种撤退，电子行业净流出372亿居全行业第一</li>\n  <li>但产业基本面未变——调整是<strong>交易层面的筹码消化</strong>，非产业逻辑破坏</li>\n  <li>5月ETF净流出3571亿元，机构整体高位兑现强烈</li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">净流出显著</span> <span class=\"pill pill-mid\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>电子行业主力净流出372亿元居首。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌，近5日有3日主力净流出。但本周光模块\"易中天\"（新易盛+47亿、天孚通信+34.85亿、中际旭创+20.18亿）合计获近100亿主力加仓，说明<strong>资金在算力链内部分化——从芯片转向光模块</strong>。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex大会</strong>以\"AI Together\"为主题，英伟达、AMD、高通等将发布最新AI芯片方案，是全年最重要的AI催化窗口。市场监管总局&发改委联合发布《人工智能计量体系和能力建设指引(2026版)》。国家发改委明确推进AI落地配套文件、加大要素保障。</p>\n<p class=\"sn\"><strong>基本面：</strong>Cerebras在美上市首日暴涨89%市值达750亿美元。戴尔AI服务器单季营收161亿美元同比+757%，上调全年AI服务器营收预期至600亿美元。四大云厂商2026年资本支出7250亿美元(+77%)。国产AI芯片华为昇腾生态加速——面壁智能开源基于昇腾的1.58-bit大模型，推理显存省5/6。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期资金从AI算力撤离明显，但美股AI持续走强（纳指六连涨创新高），A股调整是<strong>内部资金博弈</strong>。\"韬定律\"发布为国产芯片提供不依赖EUV的替代路径，长期提振信心。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>跟随半导体整体回调。北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但整体方向偏流出。佰维存储盘中逆势上涨0.94%，成为存储中少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面：</strong>HBM景气度持续超预期——<strong>HBM3E现货价半年暴涨超300%</strong>，单颗价格从数千美元飙升至数万美元，有价无货。三星率先交付首批12层48GB HBM4E样品。全球DRAM营收Q1逼近970亿美元(+260%)创历史新高。集邦预测2026年HBM需求再增70%+。国产HBM产业链加速——预计2026年底实现小批量供货，打破海外垄断。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲，但短期股价已充分反映涨价预期，获利资金兑现。中长期来看，HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，\"存力\"即算力，回调后性价比凸显。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">情绪 谨慎（等待催化）</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续抛压态势。5月27日机器人板块主力净流出143亿元，近几日整体持续承压。天永智能、奥比中光等前期强势股回调明显。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速！<strong>宇树科技科创板IPO 6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。2026年是人形机器人<strong>规模化验证关键期</strong>——特斯拉Optimus Gen-3产线改造中预计7-8月投产，Figure生产速度从每天一台跃升至每小时一台（120天产能扩张24倍）。中国整机出货量占全球84.71%。4月工业机器人出口量突破2.5万台(同比+90%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>周五人形机器人板块多家大跌——宇树科技Q1扣非净利润腰斩（\"增收不增利\"）爆雷拖累整个板块。5月27日板块指数暴跌超7%，27只成分股全线飘绿。短期利空已出尽，重点关注<strong>6月1日宇树上会结果</strong>——若顺利过会将为板块注入强心剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势吸金</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化显著——光模块龙头中际旭创（周四成交额225亿A股第一）周五随大盘回调，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>！亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技+11.73亿、长飞光纤+10.39亿、中天科技+9.35亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年被机构定义为<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产，鸿海CPO全光交换机出货目标从此前1万台上调至5万台以上。台积电COUPE封装技术加速推进。中际旭创Q1营收195亿(+192%)、净利57亿(+262%)。LightCounting预测2030年CPO市场规模达100亿美元。GlobalFoundries推出业界首款符合OCI MSA规范的SCALE CPO解决方案。</p>\n<p class=\"sn\"><strong>情绪面：</strong>CPO产业趋势确定性极高，但市场对CPO替代传统可插拔光模块的影响存在分歧。但斌转发CPO视频引发广泛关注。通信线缆方向的资金流入显示市场在寻找<strong>CPO产业链的\"新面孔\"</strong>——\"价值洼地\"获集中配置。国盛证券建议重回\"大光\"主线关注CPO机会。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五回顾）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+迎峰度夏+AI算电双驱动</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>资金从科技向防御方向大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸，亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促+防御配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>消费板块资金集中涌入</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心发现（周五5/29）：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日大额净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>居全行业第一；机械设备、电力设备均超100亿</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面撤向防御方向</li>\n  <li>通信线缆是AI板块中<strong>唯一逆势吸金方向</strong>——CPO产业链\"价值洼地效应\"</li>\n  <li>AI相关板块（电子+计算机+通信）合计净流出<strong>超400亿</strong>，相对热度降至冰点</li>\n  <li><strong>本周</strong>（5/25-5/29）公用事业(+33.89亿)、食品饮料(+12.26亿)、煤炭(+9.65亿)六大行业获主力净流入；电子(-756.31亿)、计算机(-310.19亿)、机械设备(-293.41亿)为净流出前三</li>\n</ul>\n<p><strong>AI板块对比全市场：</strong>AI+半导体板块本周合计净流出超千亿元，在全市场热度中排名倒数。\"越涨越卖\"的特征明显，但这是<strong>阶段性获利了结</strong>而非趋势逆转。</p>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联延伸受益，周五逆势获主力集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，周四创历史新高后周五大幅回调拖累板块</td></tr>\n  <tr><td><strong>博杰股份</strong></td><td>002975</td><td><span class=\"pill pill-up\">周四五涨停</span></td><td>AI算力布局+业绩爆发（2025年净利增557%），切入英伟达供应链，液冷测试设备小批量发货</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>HK.0992</td><td><span class=\"pill pill-up\">港股暴涨22.46%</span></td><td>财报全面超预期，AI服务器业务成核心增长引擎，验证全球AI硬件高景气</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析（更新）</h2>\n<p>特斯拉Optimus Gen-3计划2026年Q2启动量产，首代目标年产能100万台，A股核心受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证环节</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，工业自动化延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新动态：</strong>宇树科技Q1爆雷（营收+68%但扣非净利-52.55%，\"增收不增利\"）引发板块情绪冲击。但产业逻辑不变——Optimus Gen-3量产在即、Atlas备战2026世界杯、Figure产能24倍扩张。特斯拉完成Model S/X停产进行产线改造，为Optimus量产腾出产能。</p>\n<p><strong>操作思路：</strong>机器人板块短期利空出尽，当前为<strong>高性价比配置窗口</strong>。核心仓位以三花、绿的谐波为主。下周宇树上会结果是最重要的催化信号。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 今日定性</div><div class=\"iv\" style=\"font-size:14px\">A股已收盘。周五为<strong>\"高切低\"全面切换日</strong>——科技全面退潮，防御板块逆势吸金。科创50暴跌逾5%，两日\"冰火两重天\"说明市场情绪极度敏感。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1（周一）宇树科技IPO上会</strong>（人形机器人第一股，拟募资42亿）<br><strong>2) 6/2-6/5 Computex大会</strong>（\"AI Together\"主题，英伟达Vera Rubin/AMD/Intel最新发布）</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股三大指数<strong>齐创新高</strong>（纳指六连涨+0.91%）。英伟达/微软/亚马逊上涨。费城半导体+1%。AI产业热度持续，A股调整更多是<strong>内部资金博弈</strong>——\"高切低\"后机会大于风险。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银75.27美元，72-80美元宽幅震荡。关注下周美国非农数据及鲍威尔讲话。美银看多100美元但瑞银下调目标，多空分歧加剧。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续大额净流出（5月ETF净流出3571亿）。若下周Computex大会和宇树上会均不及预期，AI板块调整时间或延长至6月中旬。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头。CPO产业链通信线缆方向（亨通光电、长飞光纤、剑桥科技）值得重点关注新机会。等待两大催化事件落地后企稳加仓。核心仓位不动，利用波动降低成本。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260530-2107", "date": "2026-05-30 21:07", "title": "AI板块周末晚间复盘 · A股休市 白银75美元震荡 聚焦下周Computex+宇树IPO超级催化周", "tags": ["周末复盘", "高切低", "戴尔财报+35%", "白银震荡", "Computex", "宇树科技", "CPO通信线缆"], "summary": "A股周末休市中。周五科技高切低科创50-5.04%。隔夜戴尔AI营收+757%飙升35%创历史新高。下周宇树IPO上会+Computex大会双重催化。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">休市中</div><div class=\"lbs\">A股状态</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\" style=\"color:#ef4444\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\" style=\"color:#22c55e\">+35%↑</div><div class=\"lbs\">戴尔盘后</div></div>\n</div>\n\n<h1>AI板块周末晚间复盘 · A股休市 白银75美元震荡</h1>\n<p><strong>时间：</strong>2026-05-30 21:07（A股上周五已收盘，周末休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>A股周末休市中（上周五5/29已收盘）。上周五上演剧烈\"高切低\"——科技全面退潮，科创50暴跌5.04%，电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔AI服务器营收161亿美元+757%盘后飙升35%</strong>创历史新高。下周<strong>三重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔美股传导效应</strong>，有望提振AI板块情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">周跌-0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银(伦敦)</div><div class=\"iv\"><strong>75.25 美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力T+D</div><div class=\"iv\"><strong>18,284 元/千克</strong> <span class=\"pill pill-up\">5月+2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.90 美元</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.93-99.33</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>白银经历了极为剧烈的5月行情——5月上旬从70美元下方快速拉升至89.3美元（5/13年内高点），随后因美国4月CPI超预期引发恐慌性抛售，单日暴跌超9%，一路回撤至73美元。近期在72-78美元区间震荡筑底。周末COMEX白银期货收报<strong>75.58美元/盎司</strong>（周跌0.81%，5月累计+2.1%）。黄金同期收4569.90美元（周涨0.28%，5月-2.03%），白银5月表现优于黄金。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供底部支撑：</strong>美元指数持续回落至98.93-99.33区间，较前期高点显著走弱，对贵金属整体形成支撑</li>\n  <li><strong>通胀粘性超预期：</strong>美国4月PCE物价同比+3.8%创三年新高，市场对降息预期延后，但抗通胀资产需求回升</li>\n  <li><strong>工业需求前景向好：</strong>光伏+AI数据中心+新能源汽车对白银工业需求维持高位，瑞银预计2026年全球白银供应缺口扩大</li>\n  <li><strong>投机情绪降温：</strong>CFTC截至5/26数据，COMEX白银投机性净多头10,244手，较前周减少1,517手</li>\n  <li><strong>机构观点分化：</strong>美银看多（Q4目标100美元），瑞银偏谨慎（下调至85美元），分歧反映市场不确定性</li>\n</ul>\n\n<blockquote>💡 白银自1月121美元历史高点已回落约38%，当前在72-80美元区间宽幅震荡。短线支撑72美元（前低区域），上方压力80美元整数关口。5月振幅达18.81%，波动剧烈。建议控制仓位，避免追涨杀跌。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（上周五5/29收盘回顾）</h2>\n<p>A股上周五高开低走全线收跌，<strong>科创50暴跌5.04%</strong>领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n  <div class=\"info-item\"><div class=\"il\">主力净流出</div><div class=\"iv\"><strong>831.55亿元</strong>（连续多日）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。北向资金成交4734亿元（占两市14.26%）。</p>\n\n<p><strong>盘面特征（极致分化）：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、电子(-4%+)、国防军工(-4.23%)领跌。\"高切低\"调仓清晰，申万一级仅12个行业上涨。</p>\n\n<p><strong>5月整体回顾：</strong>沪指月线收阴，但科创50本月累计涨超<strong>11%</strong>突破2020年以来高点；创业板指涨近<strong>10%</strong>站稳4000点。芯片产业链为5月绝对主线（中芯国际、寒武纪等多只龙头创历史新高），AI算力硬件（\"易中天\"光模块、PCB等）趋势强劲。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块全面回调，人工智能指数(BK0800)收跌<strong>3.06%</strong>，成交额5398亿元。但隔夜<strong>美股AI全线大涨</strong>强势确认产业景气：</p>\n<ul>\n  <li>📈 <strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n  <li>📈 <strong>戴尔AI服务器营收161亿美元 +757%</strong>，盘后飙升35%创历史新高，全年AI预期上调至600亿美元</li>\n  <li>📈 <strong>Cerebras</strong>上市首日暴涨89%市值750亿美元</li>\n  <li>📈 高通+6%、ARM+5%再创新高、美光+3.5%续创新高、博通+3.2%、微软+3%</li>\n  <li>📈 四大云厂商2026年资本支出合计约7250亿美元(+77%+)</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI的调整是<strong>交易层面的\"高切低\"筹码消化</strong>，而非产业逻辑破坏。A股与美股对AI定价出现阶段性背离——历史上这种背离往往意味着<strong>逢低布局窗口</strong>。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调</span> <span class=\"pill pill-up\">美股强势+戴尔+35%</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372.05亿元居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌，科创人工智能ETF(589010)跌1.63%。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>高通+6%、ARM+5%创新高、博通+3.2%、美光+3.5%创新高。AI交易热潮持续升温。</p>\n<p class=\"sn\"><strong>基本面（最强验证）：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上修全年AI预期至600亿美元，是全球AI基建加速的最强信号。Cerebras上市+89%。华为星河AI数据中心发布。四大云厂商资本支出7250亿美元(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex 2026</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构。发改委\"人工智能+\"从拓展升级为全面实施。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎但美股持续升温。关注戴尔财报周一向A股算力/服务器供应链传导。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃，澜起科技沪股通成交42亿、兆易创新33.86亿。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（同比+260%）创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星交付首批12层48GB HBM4E样品，性能提升超20%。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%。美光警告内存短缺持续至2026年后。</p>\n<p class=\"sn\"><strong>情绪面：</strong>股价已充分反映涨价预期，获利资金兑现。中长期HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，回调即布局机会。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势但成交缩量，抛压在消化中。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面（密集催化）：</strong><strong>宇树科技科创板IPO将于6月1日（下周一）上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标100万台/年。Figure 03开启全天候包裹分拣直播。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为板块<strong>标志性催化</strong>，带动情绪企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头高位震荡，但<strong>通信线缆及配套</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿、中天科技净流入9.35亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电启动200Gbps微环调制量产。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频引发产业关注。下周Computex大会预计发布CPO新方案。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（上周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一）——AI科技全面失血</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向——亨通光电全市场第一(39.76亿)</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>对比：</strong>周五A股AI是最大失血方向，但隔夜美股AI反之是全市场最大吸金方向。这一阶段性背离通常是<strong>逢低布局信号</strong>。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后+35%创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上修全年预期至600亿美元。全球最强AI硬件业绩验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，主力资金集中配置</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿</span></td><td>半导体龙头获利回吐，创历史新高后大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（上周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>关键观察：</strong>通信线缆/光通信占据TOP10中<strong>4席</strong>（亨通光电、长芯博创、剑桥科技、长飞光纤），CPO产业链延伸方向是全市场唯一获得集中配置的AI方向，主力资金正从\"光模块\"向\"通信线缆\"结构性延伸。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。中国供应链价值量占60%-70%：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器（线性）</strong></td><td>拓普集团</td><td>601689</td><td>线性执行器独家（腿/腰大关节），单机价值约1.5万元，已签40亿+订单</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>执行器（旋转）</strong></td><td>三花智控</td><td>002050</td><td>旋转关节总成独家（14个上肢关节），单机约3万元，锁定54亿订单</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器龙头，V3单台14-20个，唯一规模化进T链</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>丝杠</strong></td><td>五洲新春</td><td>603667</td><td>行星滚柱丝杠核心，V3单机34根</td><td>⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器国产替代</td><td>⭐⭐</td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服系统+控制器</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手电机</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机独家</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>恒立液压</td><td>601100</td><td>滚柱丝杠供应商</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新催化：</strong>宇树科技IPO于<strong>6月1日（下周一）上会</strong>，拟募资42亿元，为板块最强催化。2026年是人形机器人<strong>从0到1量产兑现阶段</strong>。核心仓位配置执行器+减速器。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（上周五高切低全线回调，科创50-5.04%）。隔夜美股AI全线大涨，纳指七连涨创历史新高，戴尔+35%。A股与美股定价出现阶段性背离。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周一关键事件⏰</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一 6/1：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五 6/2-6/5：</strong>Computex 2026 — 英伟达黄仁勋主题演讲（Vera Rubin架构）/ 戴尔财报传导</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受戴尔+35%和美股AI全线大涨带动，A股AI板块周一大概率<strong>高开</strong>。关键看成交量——若量能有效放大（2.5万亿+）则有望企稳反弹。通信线缆方向（亨通）可能延续强势。关注戴尔产业链传导效应。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供支撑。沪银夜盘可关注。下周关注美国非农数据。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金连续多日大额净流出。若周一高开但量能不足，警惕\"高开低走\"。A股与美股阶段性背离的收敛需要时间。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力传导（周一早盘）<br><strong>2)</strong> Computex窗口逢低布局算力/光模块龙头<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块走向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260530-2207", "date": "2026-05-30 22:07", "title": "周末AI板块复盘 · 白银震荡筑底 聚焦下周Computex/宇树IPO", "tags": ["周末复盘", "白银", "Computex", "宇树IPO", "美股新高", "非交易日"], "summary": "非交易日，A股本周五科技全线退潮。COMEX白银75.58美元震荡。美股5月完美收官，戴尔+101%领涨。下周Computex+宇树IPO最值得期待。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX白银 $/oz</div></div>\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证收(周五)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50(周五)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+0.20%</div><div class=\"lbs\">纳指(周五)</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 白银震荡筑底 聚焦Computex催化</h1>\n<p><strong>时间：</strong>2026-05-30 22:07（非交易日）</p>\n\n<div class=\"tagline\">📌 <strong>当前状态：</strong>北京时间周六晚22点，A股为非交易日。本周五(5/29)上演\"高切低\"全面切换——科技退潮，防御板块吸金，科创50暴跌5.04%。美股周五5月完美收官，三大指数齐创历史新高。COMEX白银震荡在75美元附近。下周两大核心事件：6/1宇树科技IPO上会 + 6/2-6/5 Computex大会。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货(周五收盘)</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">伦敦银现</div><div class=\"iv\"><strong>75.29美元/盎司</strong> <span class=\"pill pill-down\">-0.44%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银T+D</div><div class=\"iv\"><strong>18,284元/千克</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金(周五收盘)</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.93</strong> <span class=\"pill pill-down\">-0.08%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">白银月涨幅</div><div class=\"iv\"><strong>5月 +2.1%</strong></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>白银自1月29日创下121美元/盎司历史高点（20年新高）后大幅回落，5月呈现\"震荡筑底\"走势。5月初自70美元启动反弹，5月13日冲高至近90美元，随后因美国CPI数据超预期、美联储降息预期推迟而大幅回调至73美元。本周在75美元附近企稳。5月整体收涨+2.1%，月度录得正收益。</p>\n\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元继续走弱：</strong>美元指数周五跌至98.93，持续下行趋势对贵金属形成基本支撑</li>\n  <li><strong>美联储政策预期反复：</strong>美国4月PCE核心通胀同比+3.3%创数月新高，美联储官员表态谨慎，降息预期推迟但加息概率低</li>\n  <li><strong>工业需求支撑：</strong>光伏+AI数据中心基础设施对白银的工业需求持续强劲，构成中长期基本面支撑</li>\n  <li><strong>美伊和谈利好：</strong>美伊停火协议预期推动风险偏好回升，避险情绪边际降温</li>\n  <li><strong>CFTC持仓：</strong>截至5月26日当周，COMEX白银投机者净多头减少1517手至10,244手，投机资金短期看涨意愿减弱</li>\n</ul>\n\n<blockquote>💡 白银处于72-80美元区间宽幅震荡，短线支撑75美元，压力80美元和90美元。5月月线收涨+2.1%，筑底信号偏积极。白银波动剧烈（5月单日曾出现超9%的暴跌），参与需注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、周五(5/29)大盘回顾</h2>\n\n<p>A股三大指数周五高开低走全线收跌，科技板块全面退潮：</p>\n\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<ul>\n  <li><strong>主力资金净流出831.55亿元</strong>，连续净流出。电子行业净流出372亿元居首</li>\n  <li><strong>电力(+43亿)、公用事业(+42亿)、食品饮料(+22亿)</strong>等防御板块逆势净流入，\"高切低\"特征明显</li>\n  <li>通信线缆(+39.83亿)逆势吸金——亨通光电净流入39.76亿居全市场第一，CPO产业链延伸</li>\n  <li>北向资金成交4734亿元，宁德时代/中际旭创/天孚通信为深股通成交前三</li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。两日\"冰火两重天\"（周四创业板首超沪指、\"易中天\"齐创新高 vs 周五科技全线暴跌）说明市场情绪极度敏感、多空分歧剧烈。</p>\n\n<p>但核心判断：这是<strong>交易层面的筹码消化而非产业逻辑破坏</strong>——AI产业基本面（算力资本开支高增长、HBM供需紧张、光模块景气持续）未有任何变化。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>电子行业主力净流出372亿居首。中芯国际净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex大会</strong>是最大催化——英伟达预计发布\"PC新时代\"新品（市场猜测为自研Arm架构PC芯片N1/N1X）。微软与英伟达同步造势。</p>\n<p class=\"sn\"><strong>基本面：</strong>Cerebras美股上市首日大涨89%市值达750亿美元。戴尔AI服务器营收161亿美元同比+757%，戴尔5月股价翻倍(+101%)。四大云厂商2026年资本支出7250 td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸，亨通光电领涨</td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+端午消费预期</td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿</td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>消费板块资金集中涌入</td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td></tr>\n</table>\n\n<p><strong>AI板块热度判断：</strong>电子(+计算机+通信)合计净流出超<strong>400亿元</strong>，AI板块在全市场资金热度中<strong>降至低位</strong>。但通信线缆作为AI产业链延伸方向逆势吸金近40亿，是科技板块中唯一的亮点。</p>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong> 600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿，全市场第一</span></td><td>通信线缆龙头，受益CPO/算力互联概念延伸</td></tr>\n  <tr><td><strong>戴尔科技</strong> DELL</td><td><span class=\"pill pill-up\">5月暴涨101%，周五再涨33%</span></td><td>AI服务器营收161亿美元同比+757%，全年预期上调至600亿美元。获美军大单</td></tr>\n  <tr><td><strong>美光科技</strong> MU</td><td><span class=\"pill pill-up\">5月累涨87.76%，屡创历史新高</span></td><td>HBM/存储龙头，受益AI存储需求爆发</td></tr>\n  <tr><td><strong>中芯国际</strong> 688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿，全市场第一</span></td><td>获利回吐，周四创新高后周五大幅回调</td></tr>\n</table>\n\n<hr>\n\n<h2>六、全球市场要点</h2>\n\n<h3>📈 美股5月完美收官</h3>\n<ul>\n  <li><strong>三大指数5月全部收涨齐创历史新高</strong>——纳指+8.36%，标普+5.15%，道指+2.78%</li>\n  <li><strong>AI是绝对主线：</strong>戴尔+101%、美光+87.76%、ARM+67.98%、AMD+45.59%、甲骨文+39.9%</li>\n  <li>英伟达5月+5.8%，市值仍冠绝全球；微软+10.65%、苹果+15.11%</li>\n  <li>费城半导体指数周五再创历史新高</li>\n  <li><strong>SaaS板块延续强势：</strong>ServiceNow+14%、Adobe+7%、微软+5.45%</li>\n</ul>\n\n<h3>🗓️ 下周核心事件</h3>\n<table>\n  <tr><th>日期</th><th>事件</th><th>影响板块</th><th>重要程度</th></tr>\n  <tr><td><strong>6/1(周一)</strong></td><td>宇树科技科创板IPO上会</td><td>人形机器人</td><td><span class=\"pill pill-up\">⭐⭐⭐</span></td></tr>\n  <tr><td><strong>6/2-6/5</strong></td><td>Computex 2026台北国际电脑展</td><td>算力/AI芯片/服务器/光模块/机器人</td><td><span class=\"pill pill-up\">⭐⭐⭐</span></td></tr>\n  <tr><td><strong>6/2(周二)</strong></td><td>英伟达+微软或将联合发布自研Arm PC芯片</td><td>半导体/AI芯片</td><td><span class=\"pill pill-up\">⭐⭐⭐</span></td></tr>\n  <tr><td><strong>6月中旬</strong></td><td>特斯拉Optimus V3投产预期</td><td>机器人</td><td><span class=\"pill pill-mid\">⭐⭐</span></td></tr>\n  <tr><td><strong>6月中旬</strong></td><td>美联储议息会议(关注点阵图)</td><td>全市场/白银/贵金属</td><td><span class=\"pill pill-mid\">⭐⭐</span></td></tr>\n</table>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">周六非交易日。A股科技板块遭遇获利回吐式调整，AI产业基本面未变。美股AI热度持续攀升，5月完美收官。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周核心催化</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一6/1宇树上会 + 周二6/2 Computex开幕</strong>，两大事件有望扭转上周五科技板块的颓势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股信号</div><div class=\"iv\" style=\"font-size:14px\">美股AI持续新高强烈验证产业景气。A股科技调整是内部资金博弈结果，非产业逻辑逆转。<strong>若Computex催化超预期，AI板块周一有望迎来修复反弹。</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银观点</div><div class=\"iv\" style=\"font-size:14px\">75美元附近震荡筑底。美元走弱对贵金属构成基本支撑。关注6月美联储议息会议和非农数据。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续净流出格局未改，若Computex催化不及预期，调整或延续。警惕\"利好落地\"后的获利兑现。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>逢低布局算力/光模块龙头</strong>，不追高。关注CPO产业链中通信线缆等新方向。机器人板块聚焦宇树IPO进展。白银可在75美元附近做底仓布局。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。当前为非交易日，报告中涉及A股数据均为周五(5/29)收盘数据，美股数据为周五(5/29)收盘数据。</blockquote>"}, {"id": "mon-20260530-2307", "date": "2026-05-30 23:07", "title": "周六晚间速览 · AI政策密集落地 白银反弹企稳", "tags": ["周末复盘", "白银", "政策", "HBM4E", "CPO"], "summary": "A股休市聚焦周末消息面：三星HBM4E送样、五部门推AI融通、沪银收涨0.64%。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX白银(美元/盎司)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.43%</div><div class=\"lbs\">周跌幅</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+2.1%</div><div class=\"lbs\">白银5月涨跌幅</div></div>\n  <div class=\"metric-box\"><div class=\"num\">18323</div><div class=\"lbs\">沪银主力(元/千克)</div></div>\n</div>\n\n<h1>AI板块周末市场速览</h1>\n<p><strong>时间：</strong>2026-05-30 23:07 <span class=\"pill pill-mid\">周六 非交易时段</span></p>\n\n<div class=\"tagline\">📌 <strong>总体研判：</strong> A股上周五（5月29日）已收盘，本周（5月25日-29日）沪指冲高回落，AI板块内部分化。周末消息面密集：三星率先交付HBM4E工程样品、发改委/工信部等五部门推进AI融通对接、Computex大会6月2日开幕在即。白银经历5月28日大跌后小幅反弹企稳于75美元上方。</div>\n\n<hr>\n\n<h2>零、COMEX白银期货播报</h2>\n\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银</div><div class=\"iv\">75.58 <span class=\"pill pill-down\">-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\">18323 <span class=\"pill pill-up\">+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">伦敦银现</div><div class=\"iv\">75.246 <span class=\"pill pill-mid\">小幅企稳</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\">98.96 <span class=\"pill pill-down\">偏弱</span></div></div>\n</div>\n\n<p><strong>最新价格：</strong>COMEX白银期货最新收报 <strong>75.58美元/盎司</strong>（5月29日收盘），日内跌0.43%，周跌0.81%。</p>\n<p><strong>近期走势：</strong>5月28日白银单日暴跌超2.8%，一度触及73.29美元低点，此后两日技术性反弹修复至75美元上方，但反弹力度偏弱。</p>\n<p><strong>月度表现：</strong>5月白银整体仍录得 <strong>+2.1%</strong> 的涨幅，跑赢黄金（黄金5月跌2.03%）。</p>\n<p><strong>驱动因素分析：</strong></p>\n<ul>\n  <li><strong>利空：</strong>5月28日美联储会议纪要偏鹰，美元指数反弹至99以上，打压贵金属；印度进口关税从6%提至15%可能缩减亚洲需求。</li>\n  <li><strong>利多：</strong>全球白银连续第六年供应短缺，2026年缺口预计达4630万盎司；美伊局势持续紧张，避险需求仍在。</li>\n  <li><strong>情绪面：</strong>CFTC数据显示截至5月26日当周，COMEX白银投机净多头减少1517手至10244手，投机情绪有所降温。</li>\n  <li><strong>关键观察：</strong>下周关注美伊协议进展、美国非农数据，如美元走弱银价有望重上78美元关口。</li>\n</ul>\n\n<hr>\n\n<h2>一、AI板块整体市场概览（盘后）</h2>\n<p>A股上周五（5月29日）三大指数涨跌互现：<strong>上证指数收于4105.41</strong>，创业板指小幅回调。AI板块上周前半周强势（算力/光模块领涨），但5月27日人形机器人板块大跌超7%拖累情绪，周后期板块进入分化。</p>\n\n<p>周末（5月30日）消息面催化密集，对下周行情形成积极预期：</p>\n<ul>\n  <li><strong>📆 Computex 2026</strong> 将于6月2日-5日召开，以\"AI Together\"为主题，英伟达、AMD、英特尔将集中发布AI芯片及算力方案。</li>\n  <li><strong>🔬 三星HBM4E</strong>首批12层样品交付，存储赛道竞争白热化。</li>\n  <li><strong>📝 五部门\"百场万企\"</strong> 聚焦机器人/AI终端等前沿赛道。</li>\n  <li><strong>🇺🇸 美股</strong>三大指数再创新高，纳斯达克站上26946点，英伟达财报亮眼持续支撑全球AI情绪。</li>\n</ul>\n\n<hr>\n\n<h2>二、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-up\">情绪 乐观</span></div>\n<p class=sn><strong>资金面（上周五）：</strong>AI算力芯片板块5月29日主力资金净流出态势延续，但光模块龙头获逆势抢筹。新易盛本周获主力净流入47亿元领先全市场。</p>\n<p class=sn><strong>政策面：</strong>发改委明确\"指导国产大模型加大力度适配国产算力芯片\"，国产算力替代上升为国家级战略。Computex大会6月2-5日召开，预计发布新一代AI芯片方案，是下周最核心的产业催化。</p>\n<p class=sn><strong>基本面：</strong>英伟达最新一季度数据中心收入750亿美元同比翻倍，谷歌/Meta/微软/亚马逊2026年合计资本支出7250亿美元创历史新高。Cerebras晶圆级AI芯片上市首日涨89%，验证AI算力需求无边界。</p>\n<p class=sn><strong>情绪面：</strong>海外AI算力股持续创新高，国内算力链在业绩确认后获机构资金持续配置。博杰股份连续两日涨停（AI算力+业绩反转），市场对算力赛道维持高关注度。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">情绪 乐观偏谨慎</span></div>\n<p class=sn><strong>资金面：</strong>A股存储板块上周整体震荡，HBM概念股分化。海外存储巨头（三星/海力士/美光）持续受益于HBM供不应求，股价维持高位。</p>\n<p class=sn><strong>政策面：</strong>长鑫科技科创板IPO重启，一季度业绩历史性突破，国产HBM产业化进程提速。大基金二期加大对存储领域投资力度。</p>\n<p class=sn><strong>基本面：</strong>⭐<strong>最重磅消息：</strong>三星电子5月29日正式向全球核心客户交付业界首批12层堆叠HBM4E内存工程样品！相较HBM4性能提升超20%，单堆栈带宽3.6TB/s，12层容量48GB。HBM3E现货价格较半年前暴涨超300%，\"存力危机\"全面爆发。</p>\n<p class=sn><strong>情绪面：</strong>HBM供不应求已成行业共识，三星HBM4E率先送样进一步巩固其领先地位。A股HBM产业链（设备/材料/封测）关注度持续提升。需注意国内HBM产业链尚处早期，\"从0到1\"阶段波动较大。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">情绪 中性偏谨慎</span></div>\n<p class=sn><strong>资金面（上周）：</strong>5月27日人形机器人板块遭遇\"黑色星期二\"，指数暴跌超7%，主力资金单日净流出超143亿元。此后两日低位震荡，资金观望为主。机器人ETF近1月被持续抛售。</p>\n<p class=sn><strong>政策面：</strong>五部门发布\"百场万企\"融通对接通知，工信部牵头机器人、服务器、AI终端等专场。国家工业信息安全发展研究中心启动《人形机器人安全分级技术规范》行业标准编制。国家电网2026年具身智能总投资预计突破100亿元。</p>\n<p class=sn><strong>基本面：</strong>宇树科技科创板IPO将于6月1日上会，冲刺\"人形机器人第一股\"，但Q1财报显示增收不增利（营收+68%，扣非净利润-52%）。特斯拉Optimus V3有望7-8月在弗里蒙特投产，国内供应链批量订单有望落地。中国4月工业机器人出口突破2.5万台，同比增近90%。</p>\n<p class=sn><strong>情绪面：</strong>宇树Q1业绩不及预期引发对行业盈利模式的质疑，短期情绪受挫。但中长期看，特斯拉量产+国内政策催化+海外Figure产能扩张（120天24倍），产业趋势未变。板块经历深度回调后估值回落，进入高性价比配置窗口。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">情绪 乐观</span></div>\n<p class=sn><strong>资金面：</strong>5月28日CPO概念大幅拉升，中际旭创成交225亿元居A股第一。\"易中天\"（新易盛/中际旭创/天孚通信）股价齐创历史新高。新易盛本周主力净流入47亿元居A股个股第一。</p>\n<p class=sn><strong>政策面/产业面：</strong>台积电5月技术论坛将光子互连（COUPE）列为未来最重要架构层级，宣布启动全球首款200Gbps微环调制器量产。英伟达明确2026年Q4启动CPO量产。2026年被国金证券定义为\"CPO产业化元年\"。</p>\n<p class=sn><strong>基本面：</strong>Q1光模块板块业绩亮眼：源杰科技净利润同比暴增1153%，多家净利润增长超200%。全球光模块龙头产能已售罄至2028年。LightCounting预测100G+光模块市场2030年超500亿美元。中际旭创Q1营收194.96亿同比+192%，归母净利57.35亿同比+262%。</p>\n<p class=sn><strong>情绪面：</strong>CPO板块目前处于强劲的业绩兑现期，市场情绪高度乐观。兴业证券指出经历了近一个月扩散后，\"光\"为代表的北美算力链又到了可以提升关注的时候。下周Computex大会有望带来新的催化剂。</p>\n</div>\n\n<hr>\n\n<h2>三、主流净流入板块监控</h2>\n<p><em>数据截至5月29日（上周最后一个交易日）</em></p>\n<table>\n  <tr><th>#</th><th>板块</th><th>本周主力净流入（亿元）</th><th>核心驱动</th><th>驱动类型</th></tr>\n  <tr><td><strong>1</strong></td><td>公用事业（电力）</td><td><span class=green>+325</span></td><td>算电协同+绿电ETF连续17日净流入6.4亿</td><td><span class=\"pill pill-up\">政策+业绩</span></td></tr>\n  <tr><td><strong>2</strong></td><td>通信</td><td><span class=green>+206</span></td><td>光模块/CPO景气度持续兑现</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>3</strong></td><td>电子</td><td><span class=green>+100+</span></td><td>半导体/HBM产业链国产替代</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>电力设备</td><td><span class=green>+100+</span></td><td>算力基础设施带动电力需求</td><td><span class=\"pill pill-mid\">预期驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>商贸零售</td><td><span class=green>+55</span></td><td>消费复苏预期</td><td><span class=\"pill pill-mid\">预期驱动</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=green>+45</span></td><td>防御性配置+消费复苏</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>医药生物</td><td><span class=green>+33</span></td><td>创新药+AI医疗概念</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>银行</td><td><span class=green>+20+</span></td><td>高股息轮动</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=green>+9.65</span></td><td>能源安全+高股息</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>建筑装饰</td><td><span class=green>+6.23</span></td><td>基建预期</td><td><span class=\"pill pill-mid\">预期驱动</span></td></tr>\n</table>\n\n<p><strong>AI板块相对热度分析：</strong></p>\n<ul>\n  <li><strong>通信（+206亿）和电子（+100亿+）</strong> 两大行业本周主力净流入合计超300亿，是AI板块的核心资金聚集地。</li>\n  <li><strong>计算机板块本周遭主力净流出逾167亿元</strong>，说明AI资金并非全面扩散，而是<strong>高度聚焦在算力基础设施（光模块、半导体设备、电力）</strong>等业绩确定性强、能见度高的方向，软件/应用层暂未获得同等级别配置。</li>\n  <li><strong>公用事业（电力）以+325亿居首</strong>，背后的核心逻辑是\"AI算力→电力需求\"的\"算电协同\"主线，绿电ETF华夏连续17日净流入。</li>\n  <li>AI整体（通信+电子+部分电力）合计净流入超 <strong>630亿</strong>，是本周全市场最为明确的配置方向，相对热度处于 <strong>高位</strong>。</li>\n</ul>\n\n<hr>\n\n<h2>四、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>博杰股份</strong></td><td>002975</td><td><span class=\"pill pill-up\">连续两日涨停</span></td><td>AI算力布局+业绩反转（2025净利增557%），绑定英伟达AI服务器测试设备量产，5/28、5/29连续涨停</td></tr>\n  <tr><td><strong>新易盛</strong></td><td>300502</td><td><span class=\"pill pill-up\">创历史新高 周净流入47亿</span></td><td>光模块\"易中天\"核心，1.6T光模块订单饱满，本周获主力资金47亿净买入居全市场个股第一</td></tr>\n  <tr><td><strong>海格通信</strong></td><td>002465</td><td><span class=\"pill pill-up\">特大单净流入4.29亿</span></td><td>5月30日特大单净流入居首，国防通信+卫星互联网双重催化</td></tr>\n</table>\n\n<hr>\n\n<h2>五、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 下周核心催化</div><div class=\"iv\" style=\"font-size:14px\">6月2日-5日Computex大会（AI芯片发布）+ 6月1日宇树科技IPO上会</div></div>\n  <div class=\"info-item\"><div class=\"il\">🔬 算力</div><div class=\"iv\" style=\"font-size:14px\">Computex催化+海外云厂商资本开支上修，算力硬件确定性最强</div></div>\n  <div class=\"info-item\"><div class=\"il\">💾 存储</div><div class=\"iv\" style=\"font-size:14px\">HBM4E送样加速，\"存力危机\"下HBM产业链景气可持续</div></div>\n  <div class=\"info-item\"><div class=\"il\">🤖 机器人</div><div class=\"iv\" style=\"font-size:14px\">短期情绪受宇树Q1业绩压制，但Optimus量产趋势不变，回调是布局良机</div></div>\n  <div class=\"info-item\"><div class=\"il\">📡 CPO</div><div class=\"iv\" style=\"font-size:14px\">业绩兑现期最强细分，\"易中天\"齐创新高确认产业趋势，关注1.6T放量节奏</div></div>\n  <div class=\"info-item\"><div class=\"il\">🥈 白银</div><div class=\"iv\" style=\"font-size:14px\">75美元附近博弈，供应短缺vs美元压力。下周关注美伊协议进展</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">5月ETF净流出3571亿，机构获利了结迹象；北向资金连续流出；美伊局势不确定性</div></div>\n</div>\n\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260531-0007", "date": "2026-05-31 00:07", "title": "AI板块周末复盘 · 科技高切低 白银窄幅震荡 聚焦下周Computex+宇树IPO", "tags": ["周末复盘", "高切低", "科技回调", "白银", "CPO通信线缆", "Computex", "宇树IPO"], "summary": "周五科技全线退潮科创50暴跌5%。COMEX白银75.58美元窄幅震荡。下周宇树IPO+Computex大会催化。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX白银</div></div>\n  <div class=\"metric-box\"><div class=\"num\">4569.9</div><div class=\"lbs\">COMEX黄金</div></div>\n  <div class=\"metric-box\"><div class=\"num\">99.01</div><div class=\"lbs\">美元指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">18,284</div><div class=\"lbs\">沪银(元/kg)</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 等待下周最强催化窗口</h1>\n<p><strong>时间：</strong>2026-05-31 00:07（A股周五已收盘，周六凌晨）</p>\n\n<div class=\"tagline\">📌 <strong>盘面回顾（周五5/29）：</strong>A股上演\"高切低\"全面切换——科技全线退潮，科创50暴跌5.04%。电力/公用事业/通信线缆逆势吸金。COMEX白银周五收盘涨0.83%报4569.9美元/盎司（黄金），白银跌0.43%报75.58美元/盎司。周六凌晨为周末休市状态。下周一<strong>宇树科技IPO上会（6/1）</strong>和<strong>Computex大会（6/2-6/5）</strong>是AI板块最强催化窗口。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货（周五收盘）</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">跌0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货（周五收盘）</div><div class=\"iv\"><strong>4,569.9 美元/盎司</strong> <span class=\"pill pill-up\">涨0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>75.246 美元/盎司</strong> <span class=\"pill pill-mid\">震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力（周五日盘）</div><div class=\"iv\"><strong>18,284 元/千克</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>约99.01</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>白银自1月29日创下<strong>121美元/盎司</strong>历史高点后一路震荡下行，最大回撤近50%。5月初从70美元启动七连涨至近90美元（5月13日高点），随后因美国CPI数据超预期单日暴跌超9%至73美元。周五（29日）微跌0.43%报75.58美元，周跌0.81%。5月整体涨幅约<strong>+2.1%</strong>。当前处于<strong>72-80美元宽幅震荡区间</strong>，短线在75美元附近震荡筑底。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供底部支撑：</strong>美元指数报99.01持续走弱，对贵金属整体形成支撑</li>\n  <li><strong>美伊局势：</strong>特朗普称即将对伊朗战事最终拍板，地缘不确定性扰动贵金属市场</li>\n  <li><strong>通胀数据：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求升温</li>\n  <li><strong>印度加征进口关税：</strong>印度将白银进口关税从6%大幅提高至15%，可能减少来自印度的需求</li>\n  <li><strong>供给持续短缺：</strong>全球白银供应连续第六年短缺，2026年缺口预计扩大至4630万盎司</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心建设对白银工业需求维持高位</li>\n</ul>\n<blockquote>💡 白银当前72-80美元区间震荡，短线支撑72美元，压力80美元。下方有供给短缺和工业需求支撑，上方受宏观情绪压制。波动剧烈（5月曾单日跌超9%），注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（周五5/29回顾）</h2>\n<p>A股周五<strong>高开低走全线收跌</strong>，科创50暴跌5.04%领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong> 放量下跌</div></div>\n</div>\n\n<p>全市场仅<strong>1541只上涨</strong>，3884只下跌。主力资金净流出<strong>831.55亿元</strong>（连续多日净流出）。申万一级仅12个行业上涨——食品饮料(+3.02%)、煤炭、公用事业领涨；电子行业净流出<strong>372亿元</strong>居全行业第一。</p>\n<p><strong>盘面核心特征：</strong>昨日（周四）创业板首超沪指创历史里程碑，今日科技板块全面退潮——<strong>两日\"冰火两重天\"</strong>的极端切换说明主力资金在高位科技品种上分歧剧烈。北向资金总成交4734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。这是继周四集体狂欢后的全面获利回吐。</p>\n<ul>\n  <li><strong>电子行业</strong>主力净流出372亿元居首位，半导体/消费电子/元件集体回调</li>\n  <li>昨日\"易中天\"（新易盛/中际旭创/天孚通信）齐创新高的盛况今日彻底反转</li>\n  <li>但需注意：<strong>产业基本面未变</strong>——调整是<strong>交易层面的筹码消化</strong>，非产业逻辑破坏</li>\n  <li>美股纳指周五继续上涨，AI产业热度仍在，A股调整更多是<strong>内部资金博弈和\"高切低\"</strong></li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">净流出显著</span> <span class=\"pill pill-mid\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>电子行业主力净流出372亿元居首。中芯国际主力净流出31.4亿居全市场第一。中科曙光、寒武纪等AI芯片龙头资金同步流出。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex大会</strong>以\"AI Together\"为主题，英伟达、AMD、英特尔等巨头将集中发布最新AI芯片方案，是全球AI供应链最高规格对接平台。市场监管总局&发改委联合发布《人工智能计量体系和能力建设指引(2026版)》。工信部五部门开展\"百场万企\"融通对接，聚焦机器人/服务器/AI终端。</p>\n<p class=\"sn\"><strong>基本面：</strong>Cerebras在美上市首日大涨89%市值达750亿美元，验证AI算力赛道高景气。戴尔2027财年Q1 AI优化服务器营收161亿美元（同比+757%），上调全年预期至600亿美元。四大云厂商2026年资本支出7250亿美元（+77%）。国内\"韬定律\"发布，为国产AI芯片提供不依赖EUV的新路径。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期获利资金从科技撤离明显，但美股AI股仍在上涨（纳指六连涨创新高）。下周Computex大会预计将重新点燃板块热情。调整是<strong>短期现象</strong>。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>跟随半导体整体回调。北向资金在存储龙头上交投活跃但方向偏流出。澜起科技沪股通成交42亿、兆易创新成交33.86亿。佰维存储周五盘中逆势上涨0.94%成为存储中少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面：</strong>HBM景气度持续超预期——<strong>HBM3E现货价半年暴涨超300%</strong>，有价无货一芯难求。三星率先交付首批12层48GB HBM4E样品。全球DRAM营收2026年Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%）。美光警告内存短缺将延续至2026年后。东北证券预计HBM涨价至少持续到2027年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲但股价已充分反映涨价预期。HBM在AI芯片成本占比已从52%升至63%，仍为AI产业链中<strong>供需格局最紧张</strong>的环节。调整后估值更具吸引力。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">情绪 谨慎</span> <span class=\"pill pill-mid\">等待催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续5月27日净流出143亿元的抛压，周五继续承压。天永智能、奥比中光等前期强势股回调明显。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是人形机器人<strong>规模化验证关键期</strong>。宇树科技科创板IPO将于<strong>6月1日（下周一）上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。海关总署数据显示4月工业机器人出口量突破2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，弗里蒙特产线已开始切换为目标年产百万台人形机器人的产线。上海\"十五五\"规划推动10万台机器人进工厂。</p>\n<p class=\"sn\"><strong>情绪面：</strong>板块下周面临<strong>宇树IPO上会</strong>和<strong>Computex大会机器人展示</strong>双重催化。湘财证券指出，机器人板块近两周表现处于AI板块中相对较低水平，具有较好的基本面支撑，有望成为AI板块内部轮动的聚焦点。当前是<strong>逢低布局窗口</strong>。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span> <span class=\"pill pill-up\">情绪 结构性乐观</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化显著——光模块龙头中际旭创前日大涨6.77%成交225亿（A股第一）后高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>，在科技股全面退潮中一枝独秀。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿，长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年被机构定义为<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产，鸿海CPO全光交换机出货目标从此前1万台大幅上调至2026-2027年超过5万台。台积电CPO（COUPE封装技术）加速推进。LightCounting预测2030年CPO市场规模达<strong>100亿美元</strong>。中际旭创2026年Q1营收194.96亿元（+192%），净利润57.35亿元（+262%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在产业链中寻找\"新面孔\"——通信线缆方向获得集中配置。市场普遍认为CPO是算力集群效率提升的核心变量。国盛证券建议重回\"大光\"主线。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（TOP10 · 周五5/29）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿元)</th><th>核心驱动</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>资金从科技向防御方向大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸 亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红 估值洼地受追捧</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏预期+618大促催化</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>消费板块资金集中涌入</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出，但并非资金离场——是在大规模\"高切低\"</li>\n  <li><strong>电子行业</strong>净流出<strong>372亿元</strong>（居第一），机械设备/电力设备各超100亿</li>\n  <li>电力+公用事业合计净流入约<strong>85亿元</strong>，防御属性板块成最大受益方</li>\n  <li>通信线缆是AI板块中<strong>唯一逆势吸金方向</strong>（+39.83亿）——CPO产业链\"新面孔\"受追捧</li>\n  <li>AI相关板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li>北向资金成交4734亿但整体呈净流出态势，外资同样在\"高切低\"</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸受益，在科技全线退潮中逆势吸金</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，前一日创历史新高后今日大幅回调，拖累板块</td></tr>\n  <tr><td><strong>戴尔/联想</strong></td><td>海外/港股</td><td><span class=\"pill pill-up\">财报全面超预期</span></td><td>戴尔AI服务器营收161亿美元（+757%），盘前涨39%。联想港股暴涨22.46%。验证全球AI硬件高景气</td></tr>\n  <tr><td><strong>博杰股份</strong></td><td>002975</td><td><span class=\"pill pill-up\">涨停</span></td><td>AI算力+业绩爆发（2025年净利增557%），切入英伟达供应链，液冷测试设备发货</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3预计年中亮相并正式启动量产，首代目标年产能<strong>100万台</strong>。Optimus产业链A股受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证环节</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，工业自动化延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>操作思路：</strong>2026年是人形机器人从\"0到1\"兑现阶段。6月1日宇树科技IPO上会将是行业标志性事件，如果顺利过会将为板块注入强心剂。板块适合<strong>逢低布局而非追高</strong>。核心仓位以三花、绿的谐波为主，传感器/电机作为卫星仓位。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 周五回顾</div><div class=\"iv\" style=\"font-size:14px\">A股已收盘（周五5/29）。<strong>\"高切低\"全面切换日</strong>——科技全线退潮，防御逆势吸金。科创50暴跌5.04%。两日\"冰火两重天\"说明市场情绪极度敏感。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1（下周一）宇树科技IPO上会</strong>——A股\"人形机器人第一股\"<br><strong>2) 6/2-6/5 Computex大会</strong>——全球AI年度最强催化窗口<br><strong>3) 美国5月非农数据</strong>——影响美联储降息预期</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引（周五）</div><div class=\"iv\" style=\"font-size:14px\">美股三大指数继续走强。戴尔AI服务器营收+757%盘前涨39%。Cerebras上市首日涨89%市值750亿美元。费城半导体+1%+。纳指六连涨创新高。<strong>AI产业热度仍在，A股调整更多是内部资金博弈。</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银报75.58美元/盎司，72-80美元区间宽幅震荡。美元走弱和供给短缺提供底部支撑。下周关注非农数据和美联储表态。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续大额净流出，若下周Computex无法提振情绪，AI板块调整时间或延长。关注北向资金是否转为净流入。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头。核心仓位不动，利用波动降低成本。CPO产业链通信线缆方向值得重点关注。宇树IPO和Computex大会是关键催化，届时可适当加仓。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260531-0107", "date": "2026-05-31 01:07", "title": "AI板块周末复盘 · 白银75美元震荡 戴尔AI营收+757%爆表 聚焦下周Computex+宇树IPO", "tags": ["周末复盘", "白银震荡", "戴尔财报", "Computex", "宇树科技", "高切低", "通信线缆"], "summary": "A股周末休市。周五科技高切低科创50暴跌5%，隔夜美股AI全线大涨纳指新高，戴尔AI营收+757%飙35%。下周六重催化：宇树IPO上会+Computex大会+戴尔传导。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.27</div><div class=\"lbs\">COMEX白银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.43%</div><div class=\"lbs\">日内涨跌</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔飙升</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 白银75美元震荡 戴尔AI营收+757%爆表 聚焦Computex</h1>\n<p><strong>时间：</strong>2026-05-31 01:07（A股周末休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>当前为周末休市时段（A股上周五5/29已收盘）。上周五上演典型的\"高切低\"切换——科技全面退潮、科创50暴跌5.04%，电力/公用事业/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔Q1 AI服务器营收161亿美元同比+757%盘后飙升35%</strong>，全球AI基建投资加速的最强确认信号。下周<strong>三重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔财报传导效应</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>约75.27-76.08美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>约75美元附近</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>约18,035元/千克</strong> <span class=\"pill pill-up\">夜盘+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>约4,527-4,591美元/盎司</strong> <span class=\"pill pill-up\">日内+1.02%~+1.61%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多头</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>周二周白银行情剧烈波动——5/26收77.27美元，5/28跌至73.29美元（-2.84%创月内新低），5/29强力反弹至76.08美元（+3.81%），5/30回落至75.27美元（-0.85%）。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空双方在75美元一线激烈博弈。自1月29日创下121美元历史高点后已回撤约38%。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供底部支撑：</strong>美元指数回落至99附近，对贵金属整体形成支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求上升</li>\n  <li><strong>美伊局势：</strong>特朗普称即将对伊朗战事做出最终决定，中东地缘不确定性仍高</li>\n  <li><strong>投机情绪降温：</strong>CFTC白银净多头减少至10,244手，短线资金看涨情绪降温</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心建设对白银工业需求维持高位</li>\n  <li><strong>波动率放大：</strong>5月中旬单日跌超9%后市场波动率系统性提升，价格呈现急涨急跌特征</li>\n</ul>\n<blockquote>💡 白银当前在72-80美元区间宽幅震荡筑底。短线支撑72美元（前低），上方压力80美元整数关口。波动剧烈，注意仓位管理。关注下周美国非农数据和美联储表态。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（上周五5/29收盘回顾）</h2>\n<p>A股上周五高开低走全线收跌，科创50暴跌5.04%：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。主力资金净流出<strong>831.55亿元</strong>，连续多日大额净流出。北向资金成交4734亿元（占两市14.26%）。<strong>电子行业</strong>主力净流出<strong>372.05亿元</strong>居全行业第一，机械设备/电力设备均超100亿。</p>\n\n<p><strong>盘面特征（极致分化）：<
