<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二级市场研究员 · 智能仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
header{background:rgba(15,23,42,.85);backdrop-filter:blur(12px);border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.badge{background:#22c55e;width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ht{font-size:13px;color:#94a3b8}
.tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid #334155;overflow-x:auto}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;border:1px solid transparent;cursor:pointer;font-size:13px;color:#94a3b8;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab.active{border-color:#334155 #334155 #0f172a;background:#0f172a;color:#f1f5f9;font-weight:600}
.tab .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.page{display:none;padding:16px 24px 24px;max-width:1200px;margin:0 auto}
.page.show{display:block}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px}
.card .lbl{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card .val{font-size:22px;font-weight:700}
.card .sub{font-size:12px;margin-top:4px}
.green{color:#22c55e}.red{color:#ef4444}.orange{color:#f59e0b}.purple{color:#a855f7}.cyan{color:#06b6d4}.gray{color:#94a3b8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 6px;color:#94a3b8;font-weight:500;font-size:11px;text-transform:uppercase;text-align:left;border-bottom:1px solid #334155}
td{padding:7px 6px;border-bottom:1px solid rgba(51,65,85,.5)}
tr:hover td{background:rgba(59,130,246,.05)}
.code{font-size:11px;color:#64748b;font-family:monospace}
.fund-row{display:flex;align-items:center;margin-bottom:6px;font-size:12px}
.fund-row .n{width:80px;color:#94a3b8;text-align:right;padding-right:8px;flex-shrink:0}
.fund-row .b{flex:1;height:20px;border-radius:4px;overflow:hidden}
.fund-row .b div{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;color:#fff;font-size:10px;font-weight:600}
.tagcloud{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tagcloud span{padding:4px 10px;border-radius:6px;font-size:12px;cursor:default}
.articles{display:flex;flex-direction:column;gap:10px}
.article{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 18px;cursor:pointer;transition:border .15s}
.article:hover{border-color:#3b82f6}
.article .meta{font-size:11px;color:#94a3b8;display:flex;gap:8px;margin-bottom:4px}
.article .meta .t{padding:1px 7px;border-radius:4px;font-size:10px;font-weight:500}
.article .meta .t.mon{background:rgba(59,130,246,.15);color:#3b82f6}
.article .meta .t.rpt{background:rgba(168,85,247,.15);color:#a855f7}
.article h3{font-size:14px;font-weight:600;margin-bottom:3px}
.article p{font-size:12px;color:#94a3b8;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.article .tags span{font-size:10px;padding:1px 6px;background:rgba(59,130,246,.1);color:#3b82f6;border-radius:4px}
.search{width:100%;padding:10px 14px;border:1px solid #334155;border-radius:8px;font-size:13px;background:#1e293b;color:#f1f5f9;outline:none;font-family:inherit;margin-bottom:12px}
.search:focus{border-color:#3b82f6}
.filters{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.filters button{padding:4px 10px;border-radius:999px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;font-family:inherit;transition:all .1s}
.filters button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.rpt-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:16px;cursor:pointer;transition:border .15s}
.rpt-card:hover{border-color:#3b82f6}
.rpt-card .icon{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.rpt-card .info h3{font-size:15px;font-weight:600;margin-bottom:4px}
.rpt-card .info .desc{font-size:12px;color:#94a3b8;line-height:1.5}
.rpt-card .info .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.rpt-card .info .tags span{font-size:10px;padding:2px 7px;background:rgba(59,130,246,.1);color:#3b82f6;border-radius:4px}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:800px;max-height:88vh;background:#1e293b;border:1px solid #334155;border-radius:14px;z-index:201;flex-direction:column;box-shadow:0 25px 80px rgba(0,0,0,.5)}
.modal.show{display:flex}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(6px)}
.overlay.show{display:block}
.modal .mh{padding:16px 20px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:700;flex-shrink:0}
.modal .mh button{background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;padding:0 4px}
.modal .mb{padding:20px;overflow-y:auto;line-height:1.7;font-size:14px}
.modal .mb h1{font-size:22px;margin:20px 0 8px;font-weight:700}
.modal .mb h2{font-size:17px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #334155;font-weight:600}
.modal .mb h3{font-size:15px;margin:12px 0 4px;font-weight:600}
.modal .mb h4{font-size:13px;margin:10px 0 3px;font-weight:600}
.modal .mb p{margin-bottom:10px;font-size:14px;line-height:1.8}
.modal .mb strong{color:#fff}
.modal .mb blockquote{border-left:3px solid #3b82f6;margin:12px 0;padding:10px 16px;background:rgba(59,130,246,.08);border-radius:0 8px 8px 0;font-size:13px}
.modal .mb table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.modal .mb td,.modal .mb th{border:1px solid #334155;padding:6px 8px}
.modal .mb th{background:rgba(255,255,255,.04);font-weight:600}
.modal .mb hr{border:none;border-top:1px solid #334155;margin:16px 0}
.modal .mb ul,.modal .mb ol{padding-left:22px;margin-bottom:10px}
.modal .mb li{margin-bottom:4px;font-size:14px;line-height:1.7}
.modal .mb .metric-box{display:inline-block;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:10px 16px;margin:4px;text-align:center}
.modal .mb .metric-box .num{font-size:22px;font-weight:700;color:#3b82f6}
.modal .mb .metric-box .lbs{font-size:11px;color:#94a3b8}
.modal .mb .metric-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.modal .mb .sect-card{background:rgba(255,255,255,.03);border-radius:8px;padding:14px;margin:12px 0;border:1px solid rgba(51,65,85,.5)}
.modal .mb .sect-card .sn{font-size:12px;color:#94a3b8;margin-bottom:6px}
.modal .mb .sect-card .sh{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal .mb .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.modal .mb .info-item{background:rgba(255,255,255,.03);border-radius:6px;padding:10px}
.modal .mb .info-item .il{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
.modal .mb .info-item .iv{font-size:16px;font-weight:700;margin-top:2px}
.modal .mb .tagline{font-size:13px;color:#94a3b8;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:8px;margin:12px 0;border-left:3px solid #3b82f6}
.modal .mb .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.modal .mb .pill-up{background:rgba(34,197,94,.15);color:#22c55e}
.modal .mb .pill-down{background:rgba(239,68,68,.15);color:#ef4444}
.modal .mb .pill-mid{background:rgba(245,158,11,.15);color:#f59e0b}
@media(max-width:800px){
  .grid2,.grid3{grid-template-columns:1fr}
  .page{padding:12px 14px}
  .row{grid-template-columns:repeat(2,1fr)}
  header{padding:10px 14px}
  header h1{font-size:14px}
  .modal .mb{padding:14px}
  .rpt-card{flex-direction:column;gap:8px}
}
</style>
</head>

<header>

<script>

const monitors = [{"id": "mon-0528-1930", "date": "2026-05-28 19:00", "title": "AI板块收盘复盘 · 创业板首超沪指 半导体全面爆发", "tags": ["收盘复盘", "半导体", "算力", "创业板"], "summary": "A股三大指数集体收涨，创业板指+1.96%首超沪指。半导体产业链全面爆发，\"易中天\"齐创历史新高。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">+1.96%</div><div class=\"lbs\">创业板指</div></div>\n  <div class=\"metric-box\"><div class=\"num\">2.97万亿</div><div class=\"lbs\">成交额</div></div>\n  <div class=\"metric-box\"><div class=\"num\">3018</div><div class=\"lbs\">上涨家数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">126</div><div class=\"lbs\">涨停</div></div>\n</div>\n\n<h1>AI板块收盘复盘</h1>\n<p><strong>时间：</strong>2026-05-28 15:30</p>\n\n<div class=\"tagline\">📌 <strong>里程碑时刻：</strong>创业板指收盘 4125.07 首次超越上证指数 4098.64，标志着市场风格从传统蓝筹向科技成长切换——这是一次结构性信号，而非短期情绪波动。</div>\n\n<h2>一、大盘解读</h2>\n<p>A股三大指数集体收涨，呈现鲜明的<strong>沪弱深强</strong>格局：</p>\n\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4098.64 <span class=\"pill pill-up\">+0.12%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15861.89 <span class=\"pill pill-up\">+0.80%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4125.07 <span class=\"pill pill-up\">+1.96%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1844.25 <span class=\"pill pill-up\">+1.59%</span></div></div>\n</div>\n\n<p>全市场 <strong>3018 只上涨</strong> / 2365 只下跌，涨停 126 只，跌停 12 只。两市成交额 <strong>2.97 万亿元</strong>，较前日缩量约 2700 亿，但总体量能仍处高位，显示市场交投活跃度维持良好。</p>\n\n<hr>\n\n<h2>二、AI板块整体概览</h2>\n<p>AI板块是今日当之无愧的 <strong>领涨核心</strong>，资金集中涌入两个方向：<strong>算力硬件</strong>（光模块/AI服务器/AI芯片）和 <strong>半导体</strong>（代工/设备/材料）。培育钻石、超级电容作为科技支线同步走强，但主线的赚钱效应更为集中。</p>\n<p>值得关注的是，资金并非分散撒网，而是集中在确定性强、业绩能见度高的龙头标的上——\"易中天\"（新易盛/中际旭创/天孚通信）三者股价齐创历史新高，说明市场在<strong>理性定价而非情绪炒作</strong>。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-up\">净流入 8.7亿</span> <span class=\"pill pill-up\">情绪 乐观</span></div>\n<p class=sn><strong>资金面：</strong>算力硬件主力净流入约 8.7 亿，联特科技、宏和科技、金安国纪等多股涨停。\"易中天\"（新易盛/中际旭创/天孚通信）三者股价齐创历史新高，这是产业景气度最直接的确认信号。</p>\n<p class=sn><strong>基本面：</strong>AI 算力需求持续超预期，800G 光模块订单饱满，1.6T 产品认证加速推进。国内 AI 芯片龙头产能利用率持续爬升，订单可见度已延伸至 2026 年下半年。</p>\n<p class=sn><strong>政策面：</strong>美国新一轮对华半导体设备出口管制传闻持续发酵，反而强化了国产算力替代的确定性。国内 AI 基建投资预算在上半年已超预期加码。</p>\n<p class=sn><strong>情绪面：</strong>资金对算力景气度高度认可，板块放量突破前期高点。市场普遍预期 AI 基建投资将在 2026H2 进一步提速。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">净流入 3.5亿</span> <span class=\"pill pill-mid\">情绪 中性</span></div>\n<p class=sn><strong>资金面：</strong>HBM 概念整体净流入约 3.5 亿，但个股内部分化明显——龙头受追捧但华海诚科持续承压。</p>\n<p class=sn><strong>基本面：</strong>长鑫存储 HBM3 客户样品验证稳步推进，大基金二期加大对存储领域的投资力度。国产 HBM 产业链\"从 0 到 1\"的确定性在增强。</p>\n<p class=sn><strong>情绪面：</strong>中长期 HBM 国产化逻辑被市场认可，但华天科技对华海诚科的清仓减持（3 个月窗口期）对板块情绪形成短线压制。减持筹码消化需要时间。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-up\">净流入 5.2亿</span> <span class=\"pill pill-up\">情绪 乐观</span></div>\n<p class=sn><strong>资金面：</strong>板块主力净流入约 5.2 亿，执行器、传感器方向资金承接力度最强。</p>\n<p class=sn><strong>基本面：</strong>特斯拉 Optimus 量产预期持续发酵，国内外供应链切入进度加快。三花智控（执行器）、绿的谐波（减速器）等核心环节确定性最强。</p>\n<p class=sn><strong>情绪面：</strong>市场普遍预期 2026 年下半年人形机器人将进入小批量量产阶段，产业链景气度确定性上行。板块估值虽已有所反映，但产业趋势仍在加速。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO 板块 <span class=\"pill pill-up\">净流入 4.1亿</span> <span class=\"pill pill-up\">情绪 乐观</span></div>\n<p class=sn><strong>资金面：</strong>光模块、光芯片整体净流入约 4.1 亿，中际旭创放量创新高，资金主线清晰。</p>\n<p class=sn><strong>基本面：</strong>800G/1.6T 光模块需求持续旺盛，AI 集群对高速互联的需求呈指数级增长。国内外 AI 数据中心建设同步拉动光模块出货量超预期。</p>\n<p class=sn><strong>情绪面：</strong>算力链景气正在向光通讯环节传导，市场对 CPO 技术 2027 年的应用前景持乐观态度。现阶段的光模块景气具备旺盛支撑。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控 TOP5</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入</th><th>核心驱动</th><th>驱动类型</th></tr>\n  <tr><td><strong>1</strong></td><td>半导体</td><td><span class=green>+12.4亿</span></td><td>中芯国际创新高 + 国产化预期</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>2</strong></td><td>AI算力</td><td><span class=green>+8.7亿</span></td><td>\"易中天\"齐创新高 + 算力需求爆发</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>3</strong></td><td>机器人</td><td><span class=green>+5.2亿</span></td><td>特斯拉 Optimus 小批量量产预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>CPO 光模块</td><td><span class=green>+4.1亿</span></td><td>800G/1.6T 出货量持续超预期</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>HBM 存储</td><td><span class=green>+3.5亿</span></td><td>长鑫 HBM3 验证 + HBM 国产化</td><td><span class=\"pill pill-mid\">预期驱动</span></td></tr>\n</table>\n<p>AI板块（算力+半导体+机器人+光模块+HBM）合计净流入约 <strong>34 亿</strong>，在全市场净流入格局中占据 <strong>绝对主导</strong>地位。相比之下，白酒/贵金属/证券等传统板块普遍净流出，资金从传统低增长方向持续向科技高景气方向迁移。</p>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th><th>关注度</th></tr>\n  <tr  <td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-up\">创历史新高</span></td><td>半导体代工景气确认，产能满载，订单可见度延伸至Q4</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>华虹公司</strong></td><td>688347</td><td><span class=\"pill pill-up\">创历史新高</span></td><td>特色工艺代工受益，消费电子+物联网需求回暖</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>联特科技</strong></td><td>301205</td><td><span class=\"pill pill-up\">涨停</span></td><td>算力硬件龙头，光模块出货量超预期触发涨停</td><td>⭐⭐</td></tr>\n  <tr><td><strong>惠丰钻石</strong></td><td>839725</td><td><span class=\"pill pill-up\">+29.98%</span></td><td>培育钻石概念全面爆发，消费+工业双驱动</td><td>⭐</td></tr>\n  <tr><td><strong>四方达</strong></td><td>300179</td><td><span class=\"pill pill-up\">+20.01%</span></td><td>培育钻石+超硬材料共振，传统业务提供安全垫</td><td>⭐</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉 Optimus 量产预期持续发酵，A 股核心受益环节及标的全面梳理：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th><th>当前估值水位</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证环节</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，工业自动化延伸至机器人</td><td⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n</table>\n<p><strong>操作思路：</strong>机器人板块目前处于\"业绩尚未兑现但产业趋势确定\"的阶段，适合<strong>逢低布局而非追高</strong>。核心仓位以三花、绿的谐波为主，传感器/电机作为卫星仓位。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 短期研判</div><div class=\"iv\" style=\"font-size:14px\">创业板强势有望延续，半导体/算力为主线</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 关键观察</div><div class=\"iv\" style=\"font-size:14px\">明日成交能否维持 2.5 万亿以上，决定反弹成色</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">北向资金连续净流出，一旦缩量至 2 万亿以下需警惕分化</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 策略建议</div><div class=\"iv\" style=\"font-size:14px\">守核心（算力+半导体）+ 探新方向（MLCC/培育钻石）</div></div>\n</div>\n\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-0528-1200", "date": "2026-05-28 12:00", "title": "AI板块午评 · 探底回升 MLCC/半导体领涨", "tags": ["午评", "探底回升", "MLCC", "半导体"], "summary": "三大指数早盘探底回升，创业板低开超2%后翻红。MLCC与培育钻石概念走强。", "html": "<h1>AI板块午评 · 探底回升</h1>\n<p><strong>时间：</strong>2026-05-28 11:30</p>\n\n<div class=\"tagline\">📌 <strong>关键分时信号：</strong>11:27 准时拉升，神秘资金入场迹象明显，可能与政策面利好预期有关。V型反转是市场韧性的直接证明。</div>\n\n<h2>一、大盘解读</h2>\n<p>三大指数早盘<strong>探底回升</strong>，一度低迷后快速拉升翻红：</p>\n<\ndiv class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4098.64 <span class=\"pill pill-mid\">午盘 -0.14%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">-- <span class=\"pill pill-mid\">午盘 -0.26%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">-- <span class=\"pill pill-up\">午盘 +0.21%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">半日成交</div><div class=\"iv\">1.78万亿</div></div>\n</div>\n\n<p>早盘一度 <strong>2082 涨、3287 跌</strong>（普跌格局），11:27 企准时拉升翻红——分时图的 V 型反转说明下方承接盘有力。半日成交 1.78 万亿，较前日缩量约 2850 亿，但午后的成交量往往更大，全天仍有希望维持在 2.5 万亿以上。</p>\n\n<h2>二、细分领域</h2>\n<ul>\n <li<strong>算力：</strong>早盘跟随市场探底后快速修复，光模块最先反弹。</li>\n  <li><strong>存储：</strong>华海诚科继续承压，长鑫无新增催化。</li>\n  <li><strong>机器人：</strong>板块整体震荡，三花低开后小幅修复。</li>\n  <li><strong>CPO：</strong>跟随算力链修复，强于大盘。</li>\n</ul>\n\n<h2>三、主流净流入</h2>\n<table>\n  <tr><th>排名</th><th>板块</th><th>驱动</th></tr>\n  <tr><td>1</td><td>MLCC</td><td>涨价周期启动预期</td></tr>\n  <tr><td>2</td><td>培育钻石</td><td>消费+工业需求共振</td></tr\n  <tr><td>3</td><td>半导体</td><td>国产替代预期</td></tr>\n</table>\n\n<h2>四、展望</h2>\n<p>午后关键：看成交量能否放大 + 指数能否站稳 4100。MLCC 和培育钻石值得关注是否具备持续性。</p>\n<blockquote>⚠️ 市场有风险，投资需谨慎。</blockquote>"}, {"id": "mon-0527-1530", "date": "2026-05-27 15:30", "title": "AI板块收盘复盘 · 算力链延续强势 制裁传闻催化国产替代", "tags": ["收盘复盘", "算力", "国产替代", "半导体"], "summary": "A股三大指数涨跌互现，算力链延续强势。半导体制裁传闻触发国产替代预期升温。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">+0.71%</div><div class=\"lbs\">创业板</div></div>\n  <div class=\"metric-box\"><div class=\"num\">2.34万亿</div><div class=\"lbs\">成交额</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-12.3亿</div><div class=\"lbs\">北向净流</div></div>\n</div>\n\n<h1>AI板块收盘复盘</h1>\n<p><strong>时间：</strong>2026-05-27 15:30</p>\n\n<div class=\"tagline\">📌 <strong>核心主线：< class=\"pill pill-up\">日内 +0.04%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">隔夜COMEX白银</div><div class=\"iv\">75.915 <span class=\"pill pill-up\">+1.36%</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>白银价格自1月29日创下121美元/盎司历史高点后，已接近腰斩。当前在75美元附近震荡企稳，日内一度跌破75关口后有所修复。短期呈现<strong>低位震荡筑底</strong>特征。</p>\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数报99.02，较前期高点回落，对贵金属形成一定提振</li>\n  <li><strong>美联储加息预期反复：</strong>市场对今年降息节奏的预期出现摇摆，前期超卖后的技术性修复</li>\n  <li><strong>工业需求端：</strong>光伏+AI硬件对白银工业需求维持高位，但短期受全球宏观情绪拖累</li>\n  <li><strong>地缘因素：</strong>美伊和谈进展反复，避险情绪边际降温</li>\n</ul>\n<blockquote>💡 白银当前处于历史高位回落的筑底阶段，短线支撑看72-75美元区间，上方压力80美元整数关口。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读</h2>\n<p>今日A股三大指数高开低走，全线收跌：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">约4038 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\"><span class=\"pill pill-down\">-3.7%+</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>约3.32万亿</strong></div></div>\n</div>\n<p>全市场仅约<strong>1541只上涨</strong>，3884只下跌，涨跌比约3:7。两市成交额约3.32万亿元，较前日放量约3300亿，但属于<strong>放量下跌</strong>——资金从高位板块出逃后并未离场，而是在低位方向积极寻找承接。</p>\n<p><strong>核心特征：</strong></p>\n<ul>\n  <li><strong>主力资金单日净流出1073亿元，连续5日净流出</strong>，内资抛售意愿坚决</li>\n  <li>北向资金成交4734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三</li>\n  <li>昨日\"科技股卷土重来\"的热闹景象今日全线反转，节奏切换之快说明<strong>市场情绪极度敏感</strong></li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>今日AI板块<strong>全面回调，集体退潮</strong>。人工智能指数(BK0800)收跌<strong>3.06%</strong>，成交额5398亿元。科创人工智能指数(950180)<strong>下跌3.52%</strong>。</p>\n<p>昨日\"易中天\"齐创新高的盛况不再，今日科技股全线走弱。<strong>两日\"冰火两重天\"的极端切换</strong>说明当前主力资金在高位科技品种上分歧剧烈，获利了结压力显著。</p>\n<p>但需注意：这是<strong>高位调整而非趋势逆转</strong>。产业基本面（AI算力资本开支高增长、HBM供不应求）未变，调整更多是交易层面的资金博弈。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">净流出显著</span> <span class=\"pill pill-mid\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>AI算力芯片板块延续昨日尾盘乏力态势，主力资金连续抛售。中芯国际主力资金净流出<strong>31.4亿元</strong>居全市场首位，华工科技、兆易创新等龙头资金大幅流出。算力ETF全线收跌，科创人工智能ETF华夏（589010）跌1.63%。</p>\n<p class=\"sn\"><strong>政策面：</strong>无新增重磅政策。工信部五部门发布\"百场万企\"通知，聚焦机器人、服务器、AI终端等前沿赛道。国家能源局召开AI+能源现场推进会，但政策面催化效应边际递减。下周6月2-5日Computex大会即将召开，有望形成新的催化剂。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业面持续向好——戴尔2027财年Q1 AI优化服务器营收161亿美元同比激增757%，上调全年AI服务器营收预期至600亿美元。联想集团财报同样亮眼，今日联想港股大涨22.46%。但A股市场对基本面利好已出现<strong>\"利多出尽\"</strong>的反应模式。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场情绪由乐观急转谨慎。资金对算力板块的追高意愿显著下降，高位筹码松动明显。但产业趋势未变——调整是<strong>筹码消化而非逻辑破坏</strong>。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>存储板块跟随半导体整体回调。北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但整体方向偏流出。</p>\n<p class=\"sn\"><strong>基本面：</strong>HBM价格持续上涨——HBM3E现货价半年来暴涨超300%。三星率先交付首批12层48GB HBM4E样品，美光警告内存短缺将持续至2026年后。AI对HBM的巨量需求挤占常规DRAM产能，DDDR5价格同步暴涨。产业景气的确定性<strong>极高</strong>。</p>\n<p class=\"sn\"><strong>情绪面：</strong>虽然基本面极为强劲，但短期股价已充分反映涨价预期，获利资金同样选择兑现。佰维存储今日盘中上涨0.94%成为存储中少有的红盘股。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>5月27日机器人板块已净流出143亿元，今日延续抛压。执行器、减速器等核心环节标的调整幅度较大。</p>\n<p class=\"sn\"><strong>基本面：</strong>板块中长期逻辑未变——宇树科技科创板IPO将于<strong>6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。海关总署数据显示4月工业机器人出口量突破2.5万台，同比增近90%。产业趋势加速中。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场短期聚焦宇树科技上会结果，若顺利过会将为板块注入强心剂。当前调整是<strong>等待催化剂</strong>的\"真空期\"行情。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>CPO板块内部分化显著。光模块龙头中际旭创等有所回调（昨日涨幅巨大），但通信线缆及配套板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入39.76亿元居全市场第一，剑桥科技净流入11.73亿元。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年被机构定义为<strong>CPO产业化元年</strong>。英伟达明确2026年Q4启动CPO量产，鸿海集团CPO全光交换机机柜提前出货给英伟达，出货目标从此前1万台上调至2026-2027年超过5万台。LightCounting预测2030年CPO市场规模达100亿美元。</p>\n<p class=\"sn\"><strong>情绪面：</strong>CPO产业链逻辑清晰，英伟达/台积电的产业化时间表提供了确定性指引。但短期获利盘同样丰厚，需时间消化。<strong>通信线缆</strong>作为CPO概念的新延伸方向受到资金追捧。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入（亿元）</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>资金从科技向防御切换</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联概念延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御属性+估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏预期+防御属性</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>消费+外资回流配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>同白酒Ⅲ，资金回流消费</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G概念延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向特征鲜明：</strong></p>\n<ul>\n  <li>今日全市场主力资金净流出<strong>1073亿元</strong>，连续5日净流出</li>\n  <li><strong>电力+公用事业+火电</strong>合计净流入近110亿元，资金从科技向防御方向<strong>大迁徙</strong></li>\n  <li>通信线缆（亨通光电、长飞光纤、剑桥科技）获资金追捧，是AI板块中<strong>唯一的逆势吸金方向</strong></li>\n  <li>AI板块（算力+半导体+光模块）整体净流出居前，在全市场中<strong>相对热度降至低位</strong></li>\n  <li>北向资金成交活跃，宁德时代/中际旭创/天孚通信是深股通成交前三，说明外资仍在关注，但未形成净买入</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿</span></td><td>通信线缆龙头，CPO/算力互联概念延伸，全市场主力净流入第一</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿</span></td><td>半导体龙头获利回吐，主力净流出居全市场首位，高开低走拖累板块</td></tr>\n  <tr><td><strong>博杰股份</strong></td><td>002975</td><td><span class=\"pill pill-up\">涨停</span></td><td>AI算力+业绩爆发（2025年净利增557%），切入英伟达供应链，液冷测试设备小批量发货</td></tr>\n  <tr><td><strong>戴尔/联想</strong></td><td>海外</td><td><span class=\"pill pill-up\">财报亮眼</span></td><td>戴尔AI服务器营收161亿美元+757%；联想港股涨22.46%，服务器龙头业绩全面超预期</td></tr>\n</table>\n\n<hr>\n\n<h2>六、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 今日定性</div><div class=\"iv\" style=\"font-size:14px\">A股已收盘，今日为<strong>情绪退潮日</strong>——科技股全线回调，防御板块吸金。高位筹码需消化，但AI产业基本面未变。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 关注</div><div class=\"iv\" style=\"font-size:14px\"><strong>下周关键事件：</strong>6/1 宇树科技上会 + 6/2-6/5 Computex大会（AI最强催化窗口）</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股三大指数齐创新高，纳指六连涨。Snowflake暴涨36%，英伟达/微软/亚马逊上涨。费城半导体指数+1%。AI产业热度仍在，A股调整更多是<strong>内部筹码问题</strong>。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金连续5日净流出，若下周无法企稳，调整时间可能延长。需关注北向资金后续动向。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头，核心仓位不动，利用波动降低成本。下周Computex大会是重要催化窗口。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-0529-2000", "date": "2026-05-29 20:00", "title": "AI板块盘后复盘 · 科技全线退潮 白银强势反弹 +3.81%", "tags": ["收盘复盘", "科技回调", "白银反弹", "高切低", "CPO"], "summary": "科创50暴跌5.04%，科技板块全面退潮。电力/公用事业等防御板块逆势吸金。COMEX白银日内反弹+3.81%至76美元上方。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">-0.73%</div><div class=\"lbs\">上证指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-1.81%</div><div class=\"lbs\">深证成指</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-2.11%</div><div class=\"lbs\">创业板指</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n</div>\n\n<h1>AI板块盘后复盘 · 科技全线退潮 白银强势反弹</h1>\n<p><strong>时间：</strong>2026-05-29 20:00（A股今日已收盘）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>今日A股上演\"高切低\"全面高低切换。科技板块全面退潮，AI算力/半导体高位股大幅回调，主力资金单日净流出831亿元。电力、公用事业、食品饮料等防御板块逆势吸金。科创50暴跌5.04%领跌全场。COMEX白银期货日内反弹超3.8%至76美元上方，表现亮眼。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>76.08美元/盎司</strong> <span class=\"pill pill-up\">日内 +3.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>75.85美元/盎司</strong> <span class=\"pill pill-up\">日内 +3.61%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,358元/千克</strong> <span class=\"pill pill-up\">日内 +2.31%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.01-99.10</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,527.3美元/盎司</strong> <span class=\"pill pill-up\">+1.02%</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>白银经历了剧烈波动——自5月初70美元启动后一度冲高至近90美元（5月13日高点），随后因美国CPI数据超预期大幅回调至73美元（5月18日低点），5月25日拉升至78美元上方，近期在75-78美元区间震荡。今日COMEX白银期货日内大涨3.81%报76.08美元/盎司，短线反弹势头强劲，但仍未收复80美元整数关口。整体处于<strong>宽幅震荡筑底</strong>阶段。</p>\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元持续走弱：</strong>美元指数报99.01，创近期新低，对贵金属整体形成支撑</li>\n  <li><strong>美伊和谈预期：</strong>美伊谈判接近达成的消息主导今日行情，地缘风险溢价下降带来风险偏好回升</li>\n  <li><strong>通胀数据：</strong>美国4月PCE物价指数同比+3.8%创三年新高，通胀粘性强化抗通胀资产需求</li>\n  <li><strong>工业需求故事：</strong>光伏+AI数据中心建设对白银的需求逻辑持续被市场定价，但短期受宏观情绪拖累明显</li>\n  <li><strong>波动率放大：</strong>5月中旬银价单日暴跌超9%后市场波动率系统性提升，多空分歧剧烈</li>\n</ul>\n<blockquote>💡 白银当前处于历史高位（1月121美元高点）回落后的<strong>宽幅震荡区间</strong>（72-80美元）。短线支撑看72美元，上方压力80美元。市场波动剧烈，操作上注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读</h2>\n<p>A股三大指数今日高开低走，全线收跌：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">约4038 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04%</span> 💥领跌</div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（较前日+3500亿）</div></div>\n</div>\n<p>全市场仅约<strong>1565只上涨</strong>，3867只下跌。成交额3.32万亿元放量至近期高位，但属于<strong>放量下跌</strong>——主力资金净流出约<strong>831.55亿元</strong>。创业板净流出376亿元，沪深300成分股净流出183亿元。</p>\n<p><strong>盘面特征（极致分化）：</strong></p>\n<ul>\n  <li><strong>食品饮料</strong>行业涨3.02%居首，煤炭/公用事业/美容护理涨超2%</li>\n  <li><strong>综合</strong>行业跌5.39%居末，国防军工/电子跌超4%，机械设备/计算机/电力设备跌超2%</li>\n  <li>昨日创业板首超沪指的\"里程碑\"被今日全面退潮迅速抹平——<strong>市场情绪极度敏感</strong></li>\n  <li>北向资金总成交4734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三</li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>今日AI板块<strong>全面回调，集体退潮</strong>。人工智能指数(BK0800)收跌<strong>3.06%</strong>，成交额5398亿元。科创人工智能指数(950180)<strong>下跌3.52%</strong>。</p>\n<p>昨日\"易中天\"齐创新高、半导体全面爆发的盛况今日彻底反转。半导体产业链全线走弱——派瑞股份、利扬芯片、国芯科技、复旦微电、中芯国际等多股纷纷大幅下挫。<strong>两日\"冰火两重天\"</strong>的极端切换说明：</p>\n<ul>\n  <li>主力资金正在<strong>系统性从高位科技抱团品种撤退</strong>，而非临时调仓</li>\n  <li>北向资金虽然成交活跃但未形成净买入，\"聪明的钱\"也在观望</li>\n  <li>但产业基本面未变——调整是<strong>交易层面的筹码消化</strong>，而非产业逻辑破坏</li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">净流出显著</span> <span class=\"pill pill-mid\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>AI算力芯片板块全线回调。电子行业主力资金净流出居首，达<strong>372亿元</strong>。昨日创新高的中际旭创、中芯国际等今日成为主要抛压方向。算力ETF全线收跌，创业板人工智能ETF华安(159279)跌2.02%，科创人工智能ETF华夏(589010)跌1.63%。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6月2-5日Computex大会</strong>即将召开，以\"AI Together\"为主题，全球AI算力巨头将集中发布AI芯片、服务器、液冷散热等最新方案，有望形成新的催化剂。市场监管总局&发改委联合发布《人工智能计量体系和能力建设指引（2026版）》，系统布局AI计量能力。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业面持续亮眼——Cerebras在美上市首日大涨89%市值达到750亿美元，验证AI算力赛道的高景气。华为推出星河AI数据中心网络方案（NPU与存储直通，传输带宽提升8倍）。海内外AI基建投资同步加码，谷歌微软等四大云厂商2026年资本支出合计达7250亿美元（+77%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场情绪由极度乐观急转谨慎。但要注意——美股AI板块仍在上涨（纳指六连涨创新高），A股的调整更多是<strong>内部资金博弈和\"高切低\"</strong>的体现。短期调整后，基本面更好的标的将率先企稳。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>跟随半导体整体回调。北向资金在存储龙头上成交活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但整体方向偏流出。佰维存储盘中逆势上涨0.94%，成为存储中少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面：</strong>HBM景气度持续超预期——全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。HBM在AI芯片成本占比已从52%升至63%，东北证券预计HBM涨价至少持续到2027年。三星率先交付首批12层48GB HBM4E样品，HBM供给紧张态势持续。集邦预测2026年HBM需求将再增长70+%。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强势，但股价短期已充分反映涨价预期。获利资金同样选择兑现。中长期来看，HBM仍是整个AI产业链中<strong>供需格局最紧张</strong>的环节之一。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>5月27日机器人板块已净流出143亿元，今日继续承压。5月29日人形机器人板块整体随大市回调，天永智能、奥比中光等前期强势股回调明显。奥比中光在科创AI指数中表现相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——2026年是人形机器人<strong>规模化验证关键期</strong>。宇树科技科创板IPO<strong>6月1日上会</strong>，冲刺A股\"人形机器人第一股\"。海关数据显示4月工业机器人出口量突破2.5万台（同比+90%）。全球格局中美日三足鼎立，中国凭借供应链优势主导量产，2025年中国整机出货量占全球84.71%。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期聚焦宇树科技上会结果和下周Computex大会机器人相关展示。调整本质上是<strong>等待催化剂真空期</strong>的正常行情。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span> <span class=\"pill pill-up\">情绪 结构性乐观</span></div>\n<p class=\"sn\"><strong>资金面：</strong>CPO板块内部分化显著——光模块龙头中际旭创等因昨日涨幅过大今日有所回调（成交额225亿元居A股第一），但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿元</strong>居全市场第一，剑桥科技净流入11.73亿元，长飞光纤净流入10.39亿元。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年机构定义为<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海集团CPO全光交换机出货目标从此前1万台上调至5万台以上。台积电COUPE封装技术加速推进。LightCounting预测2030年CPO市场规模达100亿美元。中际旭创2026年一季度营收194.96亿元（+192%），净利润57.35亿元（+262%），业绩增速惊人。</p>\n<p class=\"sn\"><strong>情绪面：</strong>CPO产业趋势确定性极高，但市场也对CPO替代传统可插拔光模块的影响存在分歧。但斌转发CPO视频引发关注，说明产业处于\"从0到1\"的认知扩散阶段。通信线缆方向的资金流入显示市场在寻找<strong>CPO产业链的\"新面孔\"</strong>。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入（亿元）</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>主力资金从科技向防御方向大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联概念延伸，亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量，板块受益</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地受追捧</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏预期+避险资金配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>消费+外资回流配置，贵州茅台获主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>同白酒Ⅲ，消费板块资金集中涌入</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力资金净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>主力净流出<strong>372.05亿元</strong>居全行业第一，是今日最大失血板块</li>\n  <li>机械设备净流出超100亿，电力设备净流出超100亿，计算机/通信/军工净流出超20亿</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿元，资金从科技全面撤退至防御板块</li>\n  <li>通信线缆是AI板块中<strong>唯一的逆势吸金方向</strong>，CPO产业链资金仍在活跃</li>\n  <li><strong>AI板块（电子+计算机+通信）合计净流出超过400亿</strong>，在全市场中相对热度降至冰点</li>\n  <li>北向资金成交4734亿但整体呈净流出态势，外资同样在\"高切低\"</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸受益，获主力资金集中追捧</td></tr>\n  <tr><td><strong>博杰股份</strong></td><td>002975</td><td><span class=\"pill pill-up\">昨日涨停</span></td><td>AI算力+业绩爆发（2025年净利增557%），切入英伟达供应链，液冷测试设备小批量发货</td></tr>\n  <tr><td><strong>中际旭创</strong></td><td>300308</td><td><span class=\"pill pill-mid\">成交额225亿<br>A股第一</span></td><td>光模块龙头，昨日大涨6.77%后今日高位震荡。一季度营收195亿同比+192%，全年业绩确定性强</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>HK.0992</td><td><span class=\"pill pill-up\">港股暴涨22.46%</span></td><td>财报全面超预期，AI服务器业务成为核心增长引擎，验证全球AI硬件景气度</td></tr>\n</table>\n\n<hr>\n\n<h2>六、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 今日定性</div><div class=\"iv\" style=\"font-size:14px\">A股已收盘。今日为明显的<strong>\"高切低\"切换日</strong>——科技板块全面回调，防御板块逆势吸金。两日\"冰火两重天\"说明市场情绪极度敏感、多空分歧剧烈。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1 宇树科技上会</strong>（人形机器人第一股）<br><strong>2) 6/2-6/5 Computex大会</strong>（全球AI年度最强催化）</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股三大指数<strong>齐创新高</strong>（纳指六连涨+0.91%）。Snowflake暴涨36%，英伟达/微软/亚马逊上涨。费城半导体指数+1%。AI产业热度仍在，A股的调整更多是<strong>内部资金博弈问题</strong>。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银日内反弹+3.81%至76.08美元，受美伊和谈和美元走弱提振。白银在72-80美元区间宽幅震荡，短线反弹动能较强，但整体方向需等待下周非农数据和美联储表态。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续大额净流出，若下周Computex大会无法提振市场情绪，AI板块调整时间可能延长。仓位管理是第一要务。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头，核心仓位不动。下周Computex大会是最重要的催化窗口，关注英伟达Vera Rubin架构相关更新。CPO产业链（通信线缆方向）值得重点关注新机会。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}];
const reports = [{"id": "citic-pe", "title": "中信证券(600030) 近三年PE-TTM走势分析", "icon": "📈", "tags": ["中信证券", "PE-TTM", "估值分析"], "desc": "基于自建数据库对中信证券近三年PE-TTM走势的深度复盘与当前估值定位分析", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">16.72x</div><div class=\"lbs\">当前 PE-TTM</div></div>\n  <div class=\"metric-box\"><div class=\"num\">21.93x</div><div class=\"lbs\">近 3 年均值</div></div>\n  <div class=\"metric-box\"><div class=\"num\">13.33x</div><div class=\"lbs\">近 3 年最低</div></div>\n  <div class=\"metric-box\"><div class=\"num\">35.26x</div><div class=\"lbs\">近 3 年最高</div></div>\n</div>\n\n<h1>中信证券(600030) 近三年 PE-TTM 走势分析</h1>\n\n<div class=\"tagline\">📌 <strong>核心结论：</strong>当前 PE-TTM 16.72 倍，处于近三年偏低分位（约 30% 分位），较均值 21.93 倍折价约 23.7%。对于中长期投资者，具备较高安全边际。</div>\n\n<h2>一、PE-TTM 走势全景回顾</h2>\n<p>PE-TTM（滚动市盈率）= 股价 ÷ 最近 12 个月的实际每股收益。相比静态市盈率，它使用<strong>最新四个季度财务数据</strong>，更真实反映公司当前估值水平。</p>\n\n<h3>走势三阶段</h3>\n<p><strong>第一阶段：估值收缩期（2024 年）</strong><br>受证券行业\"降费让利\"政策预期影响，市场对券商盈利前景产生担忧。叠加成交量萎缩、自营承压，PE 从年初 20 倍区间持续下滑至年末 <strong>14.7 倍</strong>附近，全年估值中枢下移约 26%。</p>\n\n<p><strong>第二阶段：底部震荡期（2025 年初至年中）</strong><br>PE 在 <strong>13.33 ~ 15.5 倍</strong> 区间窄幅波动。市场对券商板块关注度降至低点。期间中信证券多次回购稳定投资者信心。<strong>13.33 倍</strong> 成为本轮调整的估值铁底。</p>\n\n<p><strong>第三阶段：估值修复期（2025 年下半年至今）</strong><br>市场活跃度回升 + 权益市场回暖，券商自营及经纪业务环比改善。PE 从历史底部区域反弹至 16~18 倍区间。当前 16.72 倍较底部反弹约 25.4%，但距均值仍有空间。</p>\n\n<hr>\n\n<h2>二、关键区间分析</h2>\n<table>\n  <tr><th>指标</th><th>数值</th><th>含义</th></tr>\n  <tr><td><strong>最低 PE</strong></td><td>13.33x</td><td>2025 年 7 月——近三年绝对底部，也是压力测试的极限值</td></tr>\n  <tr><td><strong>最高 PE</strong></td><td>35.26x</td><td>2024 年初\"中特估\"行情驱动</td></tr>\n  <tr><td><strong>均值 PE</strong></td><td>21.93x</td><td>近三年估值中枢</td></tr>\n  <tr><td><strong>中位数 PE</strong></td><td>18.77x</td><td>半数时间在此以下</td></tr>\n  <tr><td><strong>当前 PE</strong></td><td>16.72x</td><td>低于均值和中位数，折价约 23.7%</td></tr>\n</table>\n<p><strong>分位数：</strong>当前 16.72 倍处于近三年 PE 序列约 <strong>30% 分位</strong>——即过去三年中约 <strong>70% 的时间估值高于当前</strong>。从历史统计角度看具有明显安全边际。</p>\n\n<hr>\n\n<h2>三、驱动因素</h2>\n<ul>\n  <li><strong>市场周期：</strong>券商估值与日均成交额高度正相关。2024 日均<8000 亿 vs 2025 日均>1.2 万亿</li>\n  <li><strong>行业政策：</strong>\"降费让利\"冲击边际递减；注册制改革深化利好投行</li>\n  <li><strong>自营收益：</strong>权益市场修复是 PE 回升核心推动力</li>\n</ul>\n\n<hr>\n\n<h2>四、估值展望</h2>\n<p>当前已反映大部分不确定性，下行风险有限。若市场活跃度维持，PE 有望向均值 <strong>21.93 倍</strong> 修复，对应约 <strong>31% 上行空间</strong>。</p>\n<p><strong>操作参考：</strong>PE 进入 <strong>15 倍以下</strong> 逐步布局；PE 接近或突破 <strong>22 倍</strong> 时分批兑现。</p>\n\n<blockquote>⚠️ 以上分析仅基于公开数据和历史统计，不构成投资建议。PE 为滞后指标。</blockquote>"}, {"id": "hbm-chain", "title": "国产HBM产业链全景解析", "icon": "🔬", "tags": ["HBM", "长鑫存储", "长电科技", "安集科技"], "desc": "全面梳理国产HBM产业链现状、核心玩家与挑战，从DRAM到先进封装逐环节拆解", "html": "<h1>国产 HBM 产业链全景解析</h1>\n<p><strong>日期：</strong>2026-05-28</p>\n\n<div class=\"tagline\">国产 HBM 产业链目前处于 <strong>\"从 0 到 1，点状突破\"</strong> 的初级阶段。与国际顶尖水平（SK 海力士 HBM3E）存在 2~3 代差距，但代差已从 8 年缩至 4 年。</div>\n\n<h2>一、HBM 存储颗粒</h2>\n<table>\n  <tr><th>公司</th><th>上市</th><th>最新进展</th></tr>\n  <tr><td><strong>长鑫存储 (CXMT)</strong></td><td><span class=\"pill pill-mid\">未上市</span></td><td>HBM2 已于 2025H1 量产，HBM3 样品交付客户，目标 2027 年 HBM3E</td></tr>\n  <tr><td>武汉新芯 (XMC)</td><td><span class=\"pill pill-mid\">未上市</span></td><td>HBM2 开发中，月产能 3000 片 12 英寸工厂</td></tr>\n</table>\n<p>从成熟 DDR5 转向高性能 HBM DRAM，技术跨度大，长鑫的 HBM3 量产验证是关键一战。</p>\n\n<h2>二、先进封装</h2>\n<table>\n  <tr><th>公司</th><th>代码</th><th>技术布局</th><th>推荐</th></tr>\n  <tr><td><strong>长电科技</strong></td><td>600584</td><td>XDFOI 对标 CoWoS，2.5D/3D 封装最强竞争者</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>通富微电</strong></td><td>002156</td><td>绑定 AMD，已与长鑫合作 HBM2 样品</td><td>⭐⭐</td></tr>\n  <tr><td>华天科技</td><td>002185</td><td>TSV/3D 封装布局中</td><td>⭐</td></tr>\n</table>\n\n<h2>三、关键设备</h2>\n<ul>\n  <li><strong>TSV 刻蚀：</strong>北方华创 (002371) / 中微公司 (688012) ✅ 可国产化</li>\n  <li><strong>CMP 设备：</strong>华海清科 (688120) ✅ 国内龙头</li>\n  <li><strong>封装光刻：</strong>上海微电子——已量产出货</li>\n  <li><strong>键合设备：</strong>新益昌追赶中——<strong>最大短板之一</st // --- Tab & Filter Functions -----------------
let monFilter = 'all';

function showTab(name, evt) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById('page-' + name).classList.add('show');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  evt.target.classList.add('active');
}

function filterMon(f, evt) {
  monFilter = f;
  document.querySelectorAll('#monFilter button').forEach(b => b.classList.remove('active'));
  evt.target.classList.add('active');
  renderMonitors();
}

function renderMonitors() {
  const list = monitors.filter(m => {
    if (monFilter === 'all') return true;
    return m.date.startsWith(monFilter);
  });
  const el = document.getElementById('monList');
  if (!el) return;
  el.innerHTML = list.length === 0
    ? '<div style="text-align:center;padding:40px;color:#64748b">\u{1f4ed} \u6682\u65e0\u76d1\u63a7\u6570\u636e</div>'
    : list.map(m =>
      '<div class="article" onclick="openMonitor(\'' + m.id + '\')">' +
        '<div class="meta"><span class="t mon">\u{1f4e1} \u76d1\u6d4b\u62a5\u544a</span><span>' + m.date + '</span></div>' +
        '<h3>' + m.title + '</h3>' +
        '<p>' + m.summary + '</p>' +
        '<div class="tags">' + m.tags.map(t => '<span>' + t + '</span>').join('') + '</div>' +
      '</div>'
    ).join('');
}

function openMonitor(id) {
  const m = monitors.find(x => x.id === id);
  if (!m) return;
  document.getElementById('mTitle').textContent = m.title;
  document.getElementById('mBody').innerHTML = m.html;
  document.getElementById('modal').classList.add('show');
  document.getElementById('ov').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('ov').classList.remove('show');
  document.body.style.overflow = '';
}

  if (!el) return;
  el.innerHTML = reports.length === 0
    ? '<div style="text-align:center;padding:40px;color:#64748b">\u{1f4ed} \u6682\u65e0\u4e13\u9898\u62a5\u544a</div>'
    : reports.map(r =>
      '<div class="article" onclick="openReport(\'' + r.id + '\')">' +
        '<div class="meta"><span class="t rpt">\u{1f4cb} \u4e13\u9898\u62a5\u544a</span></div>' +
        '<h3>' + r.title + '</h3>' +
        '<p>' + r.desc + '</p>' +
        '<div class="tags">' + r.tags.map(t => '<span>' + t + '</span>').join('') + '</div>' +
      '</div>'
    ).join('');
}

function openReport(id) {
  const r = reports.find(x => x.id === id);
  if (!r) return;
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mBody').innerHTML = r.html;
  document.getElementById('modal').classList.add('show');
  document.getElementById('ov').classList.add('show');
  document.body.style.overflow = 'hidden';
}

(function() {
  if (!monitors || monitors.length===0) return;
  const l=monitors[monitors.length-1];
  const h=l.html;

  // extract info-grid items
  const infoItems={};
  const re=/<div class="il">(.*?)<\/div>\s*<div class="iv">(.*?)<\/div>/gs;
  let m; while((m=re.exec(h))) infoItems[m[1].trim()]=m[2].trim();

  // Market indices
  const idxMap={sh:'上证指数',sz:'深证成指',cy:'创业板指',kc:'科创50'};
  Object.entries(idxMap).forEach(([k,v])=>{
    if(infoItems[v]){
      const raw=infoItems[v];
      const price=(raw.match(/[\d.]+/)||['--'])[0];
      const chg=(raw.match(/[+-]\d+\.?\d*%/)||['--'])[0];
      document.getElementById('v_'+k).textContent=price;
      if(chg!=='--'){
        const up=chg.startsWith('+');
        document.getElementById('sub_'+k).className='sub '+(up?'green':'red');
        document.getElementById('sub_'+k).textContent=chg;
      }
    }
  });

  // Tags -> tagCloud
  const tags=l.tags||[];
  const tagColors=['#3b82f6','#a855f7','#ec4899','#06b6d4','#f59e0b','#22c55e'];
  document.getElementById('tagCloud').innerHTML=tags.slice(0,8).map((t,i)=>
    '<span style="background:'+tagColors[i%6]+'18;color:'+tagColors[i%6]+'">#'+t+'</span>'
  ).join('');

  // Parse net inflow table
  const tables=[...h.matchAll(/<table>(.*?)<\/table>/gs)].map(m=>m[1]);
  let funds=[];
  tables.forEach(tbl=>{
    if(/净流入/.test(tbl)&&(/板块/.test(tbl)||/驱动/.test(tbl))){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=3){
          const name=cells[1].replace(/<[^>]+>/g,'').trim();
          const fv=parseFloat(cells[2].replace(/<[^>]+>/g,'').replace(/[+亿]/g,''));
          if(!isNaN(fv)) funds.push({n:name,v:fv,c:'#3b82f6'});
        }
      }
    }
  });
  if(funds.length===0) funds=tags.slice(0,5).map((t,i)=>({n:t,v:(5-i)*2,c:'#3b82f6'}));
  funds=funds.slice(0,5);
  const maxV=Math.max(...funds.map(f=>f.v));
  document.getElementById('fundList').innerHTML=funds.map(f=>
    '<div class=fund-row><span class=n>'+f.n+'</span><div class=b style="background:'+f.c+'22"><div style="width:'+(f.v/maxV*100)+'%;background:'+f.c+'">'+f.v.toFixed(1)+'亿</div></div></div>'
  ).join('');

  // Parse highlights
  let highlights=[];
  tables.forEach(tbl=>{
    if(/异动/.test(tbl)&&(/个股/.test(tbl)||/逻辑/.test(tbl))){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length&&highlights.length<5;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=2){
          const stock=cells[0].replace(/<[^>]+>/g,'').trim();
          const action=cells.length>=4?cells[cells.length-2].replace(/<[^>]+>/g,'').trim():'';
          highlights.push('• <strong>'+stock+'</strong> — '+action);
        }
      }
    }
  });
  if(highlights.length===0){
    const s=l.summary||'';
    highlights=s.split(/[。.]/).filter(x=>x.trim()).slice(0,3).map(x=>'• '+x.trim()+'。');
  }
  document.getElementById('highlightList').innerHTML=highlights.join('<br>');

  // Parse watchlist
  let wl=[];
  tables.forEach(tbl=>{
    if(/名称/.test(tbl)&&/代码/.test(tbl)&&/现价/.test(tbl)){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=4){
          const name=cells[0].replace(/<[^>]+>/g,'').trim();
          const code=cells[1].replace(/<[^>]+>/g,'').trim();
          const price=cells[2].replace(/<[^>]+>/g,'').trim();
          const chg=cells[3].replace(/<[^>]+>/g,'').trim();
          let ch=null;
          try{ch=parseFloat(chg.replace(/[+%]/g,''));}catch(e){}
          wl.push({n:name,c:code,p:price,ch:ch});
        }
      }
    }
  });
  if(wl.length>0){
    document.getElementById('wlBody').innerHTML=wl.map(s=>{
      if(s.ch!==null&&!isNaN(s.ch)){
        const cls=s.ch>=0?'green':'red';
        const sign=s.ch>=0?'+':'';
        return '<tr><td><strong>'+s.n+'</strong></td><td><span class=code>'+s.c+'</span></td><td>&yen;'+s.p+'</td><td class="'+cls+'">'+sign+s.ch.toFixed(2)+'%</td></tr>';
      }
      return '<tr style="color:#94a3b8;font-size:11px"><td>'+s.n+'</td><td><span class=code>'+s.c+'</span></td><td>--</td><td>--</td></tr>';
    }).join('');
  }

  // Market comment
  document.getElementById('marketComment').innerHTML='<p>'+(l.summary||'暂无数据')+'</p>';
})()</script>
</body>
</html>
