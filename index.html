/strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。两日\"冰火两重天\"——周四创业板首超沪指、\"易中天\"齐创新高，周五全面退潮——说明<strong>市场情绪极度敏感</strong>，主力资金正在系统性\"高切低\"。</p>\n\n<p><strong>5月整体：</strong>沪指\"先扬后抑\"月线收阴。科创50月涨超11%领跑，创业板指涨近10%站稳4000点。但月末科技板块在高位遭遇获利了结压力。5月沪深两市股票型ETF净流出<strong>3571亿元</strong>，资金借道ETF离场迹象明显。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n\n<p><strong>但积极信号在外盘——美股AI全线大涨：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体指数+1%创历史新高</li>\n  <li><strong>戴尔Q1 AI服务器营收161亿美元 +757%</strong>，盘后股价飙升35%创历史新高，上调全年AI营收至600亿美元</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、美光+3.5%续创新高、微软+3%</li>\n  <li><strong>全球AI资本开支全面上修：</strong>四大云厂商2026年支出7250亿美元(+77%+)</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。美股AI持续创新高验证产业景气度。下周Computex大会和戴尔财报情绪传导有望带动A股AI板块情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿居全市场第一。工业富联、兆易创新成交额均超220亿但抛压沉重。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创新高、博通+3.2%、美光+3.5%续创新高。市场对AI算力的需求定价仍在强化。</p>\n<p class=\"sn\"><strong>基本面（核心利好）：</strong><strong>戴尔2027财年Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年AI营收预期至600亿美元——这是全球AI基建投资加速的最强确认信号。Cerebras上市首日+89%。华为推出星河AI数据中心网络方案（NPU与存储直通带宽提升8倍）。四大云厂商2026年资本支出合计7250亿美元(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构新细节。发改委\"人工智能+\"从拓展升级为全面实施。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎（高位获利回吐），但美股情绪持续升温。关注戴尔财报情绪向下周一A股AI服务器/算力供应链传导的可能性。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>随电子板块整体回调。北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺将持续至2026年后。闪迪CTO称AI竞赛正在变成\"拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。奥比中光相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面（产业趋势加速）：</strong><strong>宇树科技科创板IPO 6月1日上会</strong>，冲刺A股\"人形机器人第一股\"拟募资42.02亿元。小鹏宣布2026年完成人形机器人量产。海关总署4月工业机器人出口量突破2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产、首代目标年产能100万台。Figure 03开启全天候包裹分拣直播。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为行业标志性催化剂，带动板块情绪企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强 — 唯一吸金AI方向</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头中际旭创高位震荡（成交225亿A股第一），但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿、中天科技净流入9.35亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台以上。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。台积电COUPE封装加速推进。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频引关注。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技-防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日大额净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>居全行业第一（AI科技方向全面失血）</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块中<strong>唯一逆势吸金方向</strong>——亨通光电全市场主力净流入第一（39.76亿）</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>A股vs美股背离：</strong>A股AI板块是全市场最大失血方向，而隔夜美股AI是全市场最大吸金方向（纳指七连涨）</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证，将传导至A股供应链。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股 600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股 688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创新高后大幅回调</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3 已下线投入内部测试，Q2正式启动量产，首代目标年产能100万台。2026年是<strong>人形机器人从0到1的量产兑现阶段</strong>。A股核心受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th><th>水位</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器国产替代</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动龙头</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+结构件</td><td>⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机核心</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n</table>\n<p>宇树科技6月1日IPO上会是板块最强催化剂。板块适合<strong>逢低布局</strong>，核心以三花智控+绿的谐波为主。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。上周五\"高切低\"全线回调（科创50-5.04%）。但隔夜美股AI全线大涨纳指七连涨创新高，戴尔AI营收+757%盘后飙升35%。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-五(6/2-6/5)：</strong>Computex 2026大会<br>— 英伟达黄仁勋主题演讲<br>— Vera Rubin架构细节<br>— 戴尔财报情绪传导</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受戴尔财报+35%和美股AI全面上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量：放量则企稳反弹，缩量则注意高开低走。通信线缆方向（亨通光电/长飞光纤/剑桥科技）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供底部支撑，沪银夜盘+0.64%。上方突破80美元需更强催化剂。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金连续多日大额净流出。若周一高开但成交不足，需警惕\"高开低走\"走势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力供应链的情绪传导<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 关注CPO产业链通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块下周方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260531-0208", "date": "2026-05-31 02:08", "title": "AI板块周末复盘 · 科技高切低 白银筑底 聚焦下周Computex/宇树IPO", "tags": ["周末复盘", "高切低", "科技回调", "白银筑底", "CPO通信线缆", "Computex", "宇树IPO"], "summary": "5月收官科技全线退潮科创50暴跌5%。COMEX白银月涨2.1%筑底。聚焦下周Computex和宇树IPO超级催化窗口。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.73%</div><div class=\"lbs\">日涨跌</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX白银</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技高切低 白银筑底 聚焦下周超级催化窗口</h1>\n<p><strong>时间：</strong>2026-05-31 02:08（A股今日已收盘，周末）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>5月最后一个交易日A股上演\"高切低\"全面切换——科技板块全面退潮，科创50暴跌5.04%。电力/消费/通信线缆逆势吸金。COMEX白银周五报75.58美元/盎司（月涨+2.1%），经历剧烈过山车行情。周末盘点来看，下周<strong>6/1宇树科技IPO上会 + 6/2-6/5 Computex大会</strong>是AI板块最强催化窗口，调整中值得布局。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">隔夜 -0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.90美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,284元/千克</strong> <span class=\"pill pill-mid\">平稳</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>约99.0</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>白银5月经历剧烈\"过山车\"——月初从70美元启动，5月13日冲高至近90美元（月内高点），随后因美国CPI超预期暴跌至73美元（5月18日低点），5月25日反弹至78美元上方，月底稳定在75-76美元区间。COMEX白银期货周跌0.81%，月涨<strong>2.1%</strong>。整体处于<strong>72-80美元宽幅震荡</strong>状态。</p>\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元持续走弱：</strong>美元指数报约99.0，逼近年内低位，对贵金属形成底部支撑</li>\n  <li><strong>美伊和谈：</strong>美伊谈判接近达成协议的消息推动避险情绪降温，白银作为工业+避险双重属性资产短期承压</li>\n  <li><strong>全球白银供应短缺：</strong>全球白银已连续第六年出现供应短缺，2026年缺口预计扩大到约4630万盎司，库存降至极低水平</li>\n  <li><strong>印度提高白银进口关税：</strong>印度政府将白银进口关税从6%大幅提高至15%，可能减少来自印度的实物需求</li>\n  <li><strong>工业需求支撑：</strong>光伏+AI数据中心对白银工业需求维持在历史高位，中长期基本面扎实</li>\n  <li><strong>CFTC持仓：</strong>截至5月26日当周，COMEX白银投机者净多头持仓减少1517手至10244手，投机资金看涨情绪有所降温</li>\n</ul>\n<blockquote>💡 白银在72-80美元区间宽幅震荡。短线支撑72美元，上方压力80美元。5月波动剧烈（单日曾跌超9%），注意仓位管理。但中长期来看，全球供应短缺+工业需求增长的基本面故事仍然成立。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（5月收官）</h2>\n<p><strong>⚠️ A股今日已收盘，周六为周末休市日。</strong></p>\n<p>回顾5月最后一个交易日（5月29日周五），A股三大指数高开低走全线收跌，科创50暴跌5.04%: </p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量+3500亿）</div></div>\n</div>\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。主力资金净流出<strong>831.55亿元</strong>。电子行业净流出372亿元居首。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>5月收官，AI板块整体呈现<strong>\"冲高回落\"</strong>走势——月初至5月28日半导体/AI算力持续走强，创业板首次超越沪指；但5月29日科创50暴跌5%，科技股全面回调。</p>\n<p>产业逻辑上，AI产业景气度持续向上，但<strong>短期交易层面</strong>存在以下特征：</p>\n<ul>\n  <li><strong>高位筹码拥挤：</strong>经过连续多月的趋势性上涨，大量标的短期快速拉升，获利盘积累丰厚</li>\n  <li><strong>板块估值偏高：</strong>估值性价比持续下降，场内机构和短线资金兑现意愿升温</li>\n  <li><strong>月末资金结算：</strong>临近季度资金结算和净值复盘节点，机构集中锁定收益放大抛压</li>\n  <li>但AI产业基本面未变——调整本质是<strong>交易层面的筹码消化</strong>，非产业逻辑破坏</li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>电子行业5月29日主力净流出372亿元居首。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex大会</strong>以\"AI Together\"为主题，英伟达、AMD、英特尔将集中发布AI芯片/服务器/液冷等最新方案，是全年最强催化窗口。市场监管总局&发改委联合发布《人工智能计量体系和能力建设指引(2026版)》。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业面持续亮眼——黄仁勋称到本十年末AI资本支出将达3-4万亿美元。四大云巨头Q1资本支出1306.5亿美元(+71%)。Cerebras在美上市首日大涨89%市值750亿美元。华为推出星河AI数据中心网络方案。下周Computex大会预计将发布NVIDIA Vera Rubin架构和AMD MI400系列。</p>\n<p class=\"sn\"><strong>情绪面：</strong>周末资金离场观望情绪浓厚，但产业趋势和技术迭代仍在加速。Computex大会可能成为AI板块情绪修复的<strong>关键催化</strong>。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>跟随半导体整体回调。北向资金在存储龙头上交投活跃但方向偏流出。佰维存储盘中逆势上涨0.94%成为存储中的少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面：</strong>HBM景气度持续超预期——HBM3E现货价半年暴涨超300%。三星率先交付首批12层48GB HBM4E样品（提升30%以上），在HBM竞争中抢占先机。SK海力士目标2027年量产HBM4E。全球DRAM营收Q1逼近970亿美元（+260%）。美光警告内存短缺将持续至2026年后。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲，但股价已充分反映涨价预期，获利资金兑现。中长期来看，HBM是AI产业链中<strong>供需格局最紧张</strong>的环节之一。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">情绪 谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>5月27日板块已净流出143亿元，29日延续抛压。前期强势股如三花智控（高管批量减持套现4.2亿）、天永智能等回调明显。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>宇树科技科创板IPO 6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。特斯拉Optimus Gen-3首批下线，弗里蒙特工厂产线改造中，目标年产能百万台。Figure AI生产速度从每天一台跃升至每小时一台，120天内实现24倍产能扩张。国家电网2026年具身智能投资规模预计突破100亿。海关数据显示4月工业机器人出口量突破2.5万台（同比+90%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>宇树科技Q1业绩\"增收不增利\"（营收+68%但扣非净利-52.55%）引发市场对行业盈利能力的质疑。5月27日三大利空集中爆发导致板块暴跌。下周宇树上会结果至关重要。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化显著——光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿、长飞光纤10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台以上。中际旭创Q1营收195亿（+192%），净利润57亿（+262%）。LightCounting预测2030年CPO市场规模达100亿美元。台积电COUPE封装技术加速推进。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO产业链的\"新面孔\"——通信线缆方向获得集中配置。下周Computex大会预计将有更多CPO相关技术发布。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（5月29日 TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿元)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期 + 估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>主力资金从科技向防御全面切换</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸，亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地受追捧</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>618大促+消费复苏预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>外资回流配置消费</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿带动</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日大额净流出</li>\n  <li><strong>电力+公用事业+火电</strong>合计净流入约110亿元——资金从科技全面撤退至防御方向</li>\n  <li>通信线缆（亨通、长飞、剑桥）是AI板块<strong>唯一逆势净流入方向</strong>，CPO产业链资金仍在活跃</li>\n  <li><strong>电子行业</strong>净流出372亿居全行第一，AI板块全市场相对热度降至<strong>冰点</strong></li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联延伸受益，获主力资金集中配置</td></tr>\n  <tr><td><strong>三花智控</strong></td><td>002050</td><td><span class=\"pill pill-down\">高管集体减持套现4.2亿</span></td><td>具身智能热门标的，董事长以43.1元均价减持975.6万股套现约4.2亿，多名高管同步减持用于子女教育。</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿</span></td><td>半导体龙头获利回吐，29日净流出居全市场首位，拖累板块情绪</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3首批已下线，弗里蒙特工厂产线改造中（目标年产能百万台）。A股核心受益标的全梳理：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证环节（⚠️ 注意高管减持扰动）</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件，技术壁垒高</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，工业自动化延伸至机器人</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td></tr>\n  <tr><td><strong>轴承</strong></td><td>五洲新春</td><td>603667</td><td>机器人关节轴承，5月27日跌停后承压</td></tr>\n</table>\n<p><strong>核心催化：</strong><strong>6月1日（下周一）宇树科技科创板IPO上会</strong>，这将是检验市场对机器人板块估值容忍度的\"试金石\"。若顺利过会，将为人形机器人板块注入强心剂。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 本周定性</div><div class=\"iv\" style=\"font-size:14px\">5月收官周：周初半导体/AI持续走强+创业板首超沪指的\"里程碑\"，周三/周五科技股两次暴跌。典型<strong>\"冲高回落、高切低\"</strong>行情。AI产业基本面未变，调整是筹码消化。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1（周一）宇树科技IPO上会</strong>——人形机器人第一股<br><strong>2) 6/2-6/5 Computex大会</strong>——全球AI年度最强催化窗口<br><strong>3) 6/3 博通Q2财报</strong>——AI推理芯片关键指引<br><strong>4) 6/4 戴尔/惠普财报</strong>——AI服务器需求验证<br><strong>5) 美联储5月非农数据</strong>——影响降息预期</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引（周五夜盘）</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股三大指数<strong>齐创新高</strong>，纳指六连涨。费城半导体指数+1%。AI产业热度持续——A股的调整是<strong>内部资金博弈</strong>而非全球性AI退潮。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💰 白银指引</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银在76美元附近震荡整固。全球供应短缺+工业需求增长的基本面未变，但短期受宏观数据、美元走势和地缘政治影响波动剧烈。关注下周非农数据。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续大额净流出。若Computex大会不能有效提振情绪，调整可能延长。北向资金需持续关注。<strong>三花智控高管集体减持</strong>需警惕机器人板块内部大股东减持风险。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">调整中<strong>逢低分批布局</strong>算力/光模块龙头，核心仓位不动，利用波动降低成本。重点关注：<strong>1) Computex大会英伟达Vera Rubin架构更新 2) 博通AI芯片业绩指引 3) 宇树IPO对机器人板块的催化作用</strong>。CPO产业链的通信线缆方向值得关注\"新面孔\"机会。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260531-0307", "date": "2026-05-31 03:07", "title": "AI板块凌晨复盘 · 科技高切低休整 白银75美元震荡 下周Computex/宇树双催化", "tags": ["凌晨复盘", "高切低", "白银震荡", "Computex", "宇树科技", "戴尔财报"], "summary": "A股上周五科技全线退潮科创50-5.04%。隔夜美股AI大涨纳指创新高，戴尔AI营收+757%盘后飙升35%。下周Computex+宇树上会双催化。", "html": "\n    <div class=\"metric-row\">\n      <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n      <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n      <div class=\"metric-box\"><div class=\"num\">3.32万亿</div><div class=\"lbs\">周五成交</div></div>\n      <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔盘后</div></div>\n    </div>\n\n    <h1>AI板块凌晨复盘 · 科技高切低休整 白银75美元震荡 聚焦下周一</h1>\n    <p><strong>时间：</strong>2026-05-31 03:07（北京时间·周日凌晨·非交易时段）</p>\n\n    <div class=\"tagline\">📌 <strong>核心基调：</strong>当前A股处于周末休市。上周五（5/29）A股上演\"高切低\"全面切换——科技全线退潮科创50暴跌5.04%，电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔AI服务器营收+757%盘后暴涨35%</strong>，AI基本面强势不改。下周一（6/1）<strong>宇树科技IPO上会</strong> + 下周二起（6/2-6/5）<strong>Computex 2026大会</strong> = AI板块最强催化窗口。</div>\n\n    <hr>\n\n    <h2>📊 零、COMEX白银期货播报</h2>\n    <div class=\"info-grid\">\n      <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-mid\">本周-0.81%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">5月月度涨跌</div><div class=\"iv\"><span class=\"pill pill-up\">+2.1%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">沪银主力夜盘</div><div class=\"iv\"><span class=\"pill pill-up\">+0.64%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">沪金主力夜盘</div><div class=\"iv\"><span class=\"pill pill-up\">+1.61%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">CFTC白银净多持仓</div><div class=\"iv\">10,244手 <span class=\"pill pill-down\">周减1,517手</span></div></div>\n    </div>\n\n    <p><strong>近期趋势判断：</strong>COMEX白银本周走势剧烈震荡——周一77美元，周三下探至73.29美元（近两周低点），周四强力反弹至76.08美元（+3.81%），周五回落至75.58美元。全周跌0.81%，但5月份整体仍录得<strong>+2.1%</strong>的月度涨幅。当前处于<strong>72-80美元宽幅震荡筑底</strong>阶段。</p>\n\n    <p><strong>驱动因素简析：</strong></p>\n    <ul>\n      <li><strong>美元持续走弱：</strong>美元指数回落至99附近，对贵金属形成底部支撑</li>\n      <li><strong>通胀粘性：</strong>美国4月PCE同比+3.8%创三年新高，抗通胀资产需求升温</li>\n      <li><strong>美伊局势：</strong>特朗普即将对伊朗\"最终决定\"，地缘不确定性维持高位</li>\n      <li><strong>投机情绪降温：</strong>CFTC白银净多头减少至10,244手，短线资金看涨情绪降温</li>\n      <li><strong>工业需求：</strong>光伏+AI数据中心建设对白银工业需求维持高位</li>\n      <li><strong>供需缺口：</strong>全球白银连续第六年供应短缺，2026年缺口约4630万盎司</li>\n    </ul>\n    <blockquote>💡 白银自1月121美元历史高点回落约38%，当前72-80美元区间筑底。短线支撑72美元（前低），上方压力80美元。波动剧烈，注意仓位管理。</blockquote>\n\n    <hr>\n\n    <h2>一、大盘解读（上周五5/29收盘回顾）</h2>\n    <p>A股上周五高开低走全线收跌，科创50暴跌5.04%领跌全场：</p>\n    <div class=\"info-grid\">\n      <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n      <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n    </div>\n    <p>全市场仅<strong>1565只上涨</strong>，3867只下跌，涨跌比约3:7。主力资金净流出<strong>831.55亿元</strong>，其中<strong>电子行业</strong>净流出<strong>372.05亿元</strong>居全行业之首。</p>\n    <p>北向资金成交4734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三。</p>\n\n    <hr>\n\n    <h2>二、AI板块整体市场概览</h2>\n    <p>上周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n    <p><strong>核心特征——两日\"冰火两重天\"：</strong>周四创业板首超沪指、\"易中天\"齐创新高→周五全面退潮。主力资金从高位科技抱团品种<strong>系统性撤离</strong>，转向电力/消费等防御方向。</p>\n    <p><strong>但积极信号在外盘：</strong></p>\n    <ul>\n      <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n      <li><strong>戴尔财报爆炸：</strong>AI服务器营收161亿美元 <strong>+757%</strong>，上调全年AI营收预期至600亿美元，盘后暴涨35%创历史新高</li>\n      <li><strong>Cerebras上市首日+89%</strong>市值达750亿美元</li>\n      <li>高通+6%、ARM+5%再创历史新高、美光+3.5%续创新高</li>\n    </ul>\n    <p><strong>核心判断：</strong>A股的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。下周Computex+宇树上会双催化，AI板块有望迎来情绪修复。</p>\n\n    <hr>\n\n    <h2>三、细分领域动态</h2>\n\n    <div class=\"sect-card\">\n    <div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔+35%最亮</span></div>\n    <p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n    <p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面上涨——高通+6%、ARM+5%创新高、博通+3.2%、美光+3.5%续创新高。AI算力需求定价仍在强化。</p>\n    <p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>——全球最强AI硬件业绩验证。Cerebras上市+89%。华为推出星河AI数据中心网络。四大云厂商2026年资本支出7250亿美元(+77%)。</p>\n    <p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin相关架构细节。发改委\"人工智能+\"从深化拓展升级为全面实施。</p>\n    <p class=\"sn\"><strong>情绪面：</strong>A股谨慎但美股热度不减。关注戴尔财报情绪向下周一传导——AI服务器/算力供应链有望高开。</p>\n    </div>\n\n    <div class=\"sect-card\">\n    <div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n    <p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），整体方向偏流出。佰维存储逆势+0.94%。</p>\n    <p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（+260%）创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星交付首批12层48GB HBM4E样品。集邦预测2026年HBM需求再增70%+。HBM在AI芯片成本占比从52%升至63%。闪迪CTO：AI竞赛正在变成\"拼内存\"。</p>\n    <p class=\"sn\"><strong>情绪面：</strong>产业数据亮眼但股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n    </div>\n\n    <div class=\"sect-card\">\n    <div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会</span></div>\n    <p class=\"sn\"><strong>资金面：</strong>延续净流出态势，成交缩量抛压在消化中。奥比中光相对抗跌(+0.84%)。</p>\n    <p class=\"sn\"><strong>基本面：</strong>2026年是<strong>规模化验证关键期</strong>。<strong>宇树科技科创板IPO 6月1日上会</strong>，冲刺A股\"人形机器人第一股\"拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。Figure 03全天候包裹分拣直播。</p>\n    <p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块关键催化剂。</p>\n    </div>\n\n    <div class=\"sect-card\">\n    <div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n    <p class=\"sn\"><strong>资金面：</strong>光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>——亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n    <p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海全光交换机出货目标上调至5万台以上。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)净利57亿(+262%)。Lumentum产能已售罄至2028年。</p>\n    <p class=\"sn\"><strong>情绪面：</strong>资金寻找CPO\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频。光模块龙头调整属获利回吐。</p>\n    </div>\n\n    <hr>\n\n    <h2>四、主流净流入板块监控（周五TOP8）</h2>\n    <table>\n      <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n      <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n      <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n      <tr><td><strong>3</strong></td><td>通信线缆</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n      <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n      <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估值</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n      <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n      <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n      <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n    </table>\n\n    <p><strong>资金流向核心发现：</strong></p>\n    <ul>\n      <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n      <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>居全行业第一；机械设备/电力设备均超100亿</li>\n      <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御方向</li>\n      <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向——亨通光电全市场主力净流入第一</li>\n      <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n      <li><strong>对比：</strong>A股AI大失血 VS 美股AI全线大涨——内外对AI定价出现阶段性背离，这是布局窗口信号</li>\n    </ul>\n\n    <hr>\n\n    <h2>五、关键异动个股</h2>\n    <table>\n      <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n      <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后暴涨+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI营收预期至600亿美元。全球最强AI硬件业绩验证。对下周一A股算力/服务器方向构成直接催化。</td></tr>\n      <tr><td><strong>亨通光电</strong></td><td>A股</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向。周五逆势大涨，主力资金集中追捧的AI相关个股。</td></tr>\n      <tr><td><strong>中芯国际</strong></td><td>A股</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨创历史新高后今日大幅回调，拖累AI板块。</td></tr>\n    </table>\n\n    <hr>\n\n    <h2>六、主力资金增仓TOP10个股（周五）</h2>\n    <table>\n      <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n      <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n      <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n      <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n      <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n      <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n      <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n      <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费</td></tr>\n      <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n      <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n      <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n    </table>\n    <p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通、长芯博创、剑桥、长飞），CPO产业链延伸方向是周五全市场唯一获得集中配置的AI相关方向。</p>\n\n    <hr>\n\n    <h2>七、特斯拉机器人概念股解析</h2>\n    <p>特斯拉Optimus Gen-3已下线，Q2启动量产，首代目标年产能100万台。宇树科技6/1上会。A股核心受益标的：</p>\n    <table>\n      <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n      <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td></tr>\n      <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td></tr>\n      <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商</td><td>⭐⭐</td></tr>\n      <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头</td><td>⭐⭐</td></tr>\n      <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n      <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机核心驱动</td><td>⭐⭐</td></tr>\n    </table>\n    <p>2026年是人形机器人<strong>从0到1量产兑现阶段</strong>。板块适合<strong>逢低布局</strong>，核心以三花+绿的为主。</p>\n\n    <hr>\n\n    <h2>八、总结与展望</h2>\n    <div class=\"info-grid\">\n      <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。上周五科技全面退潮科创50-5.04%。但隔夜美股AI全线大涨纳指七连涨创新高，AI热度不减。</div></div>\n      <div class=\"info-item\"><div class=\"il\">👀 下周一关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 宇树科技IPO上会（6/1）</strong>——人形机器人板块核心催化<br><strong>2) 戴尔财报传导（6/1开盘）</strong>——AI服务器板块有望高开<br><strong>3) Computex大会预热（6/2-6/5）</strong>——英伟达黄仁勋主题演讲</div></div>\n      <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受戴尔财报+35%和美股AI上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量——若高开放量则有望企稳反弹，若缩量需警惕\"高开低走\"。通信线缆方向（亨通光电）可能延续。算力/服务器/光模块关注戴尔映射效应对供应链的估值提振。</div></div>\n      <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。沪银夜盘+0.64%，短线反弹动能延续但幅度有限。关注下周非农数据与美联储表态。</div></div>\n      <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">①A股主力资金连续多日大额净流出 ②若高开后量能不济需警惕\"高开低走\" ③美伊局势不确定性 ④科技股估值需消化</div></div>\n      <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器供应链的传导效应<br><strong>2)</strong> Computex窗口逢低布局算力/光模块/PCB龙头<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块短期方向</div></div>\n    </div>\n    <blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n    "}, {"id": "mon-20260531-0407", "date": "2026-05-31 04:07", "title": "AI板块周末复盘 · A股休市 白银75美元区间震荡 Computex/宇树IPO下周最强催化", "tags": ["周末复盘", "白银震荡", "戴尔财报", "Computex", "宇树科技", "高切低", "CPO通信线缆"], "summary": "A股周末休市。周五科技高切低科创50暴跌5%+，隔夜美股AI全线大涨，戴尔AI营收+757%盘后升35%。下周Computex+宇树上会最强催化窗口。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">--</div><div class=\"lbs\">A股休市</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔飙升</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 白银震荡 聚焦下周最强催化</h1>\n<p><strong>时间：</strong>2026-05-31 04:07（北京时间·A股周末休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>当前A股处于周末休市期间。上周五（5/29）A股上演\"高切低\"全面切换——科技全线退潮，科创50暴跌超5%，电力/公用事业/食品饮料等防御板块逆势吸金。但隔夜美股AI全线大涨，<strong>戴尔AI服务器营收161亿美元+757%，盘后飙升35%</strong>，AI产业基本面强势不改。下周<strong>六重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔传导效应</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-mid\">75-78区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>~75美元</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035元/千克</strong> <span class=\"pill pill-up\">夜盘+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\">10,244手 <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银本周（5/25-5/30）走势剧烈震荡——周初77美元，周三下探至73.29美元（近月低点），周四强势反弹至76.08美元（+3.81%），周五回落至75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空双方在75美元一线激烈博弈。月线看，5月以来白银先涨后跌——5月7日一度冲高至81.42美元（+5.32%），月累计仍录得约+2.1%的小幅涨幅。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数持续回落至99附近低位运行，对贵金属形成底部支撑</li>\n  <li><strong>通胀粘性强化抗通胀需求：</strong>美国4月PCE物价指数同比+3.8%创三年新高，抗通胀资产需求上升</li>\n  <li><strong>美伊地缘风险：</strong>特朗普称即将就伊朗问题做出\"最终决定\"，霍尔木兹海峡局势不确定性持续扰动市场</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机者净多头持仓减少至10,244手，短线资金看涨情绪降温，但净多头仍在万手以上</li>\n  <li><strong>工业需求支撑：</strong>光伏+AI数据中心建设对白银工业需求维持高位，中长期基本面仍偏多</li>\n  <li><strong>印度加征关税：</strong>印度将白银进口关税从6%提升至15%，可能抑制亚洲需求</li>\n</ul>\n<blockquote>💡 白银自1月29日121美元历史高点已回落约38%，当前在72-80美元区间筑底。短线支撑72美元，上方压力80美元。波动剧烈注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（A股周五收盘回顾）</h2>\n<p>A股上周五（5/29）高开低走全线收跌，科创50暴跌：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1,565只上涨</strong>，3,867只下跌。主力资金净流出<strong>831.55亿元</strong>。北向资金成交4,734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三。</p>\n\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)/煤炭(+2.13%)/公用事业(+2%+)领涨；综合(-5.39%)/国防军工(-4.23%)/电子(-4%+)领跌。科技板块全面获利了结和防御切换，风格急剧反转。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5,398亿元。两日\"冰火两重天\"——周四创业板首超沪指、\"易中天\"齐创新高，周五全面退潮。</p>\n\n<p><strong>但积极的外盘信号不容忽视：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体指数+1%</li>\n  <li><strong>戴尔AI服务器营收161亿美元 +757%</strong>，盘后飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%，ARM+5%</strong>再创历史新高，美光+3.5%续创新高</li>\n  <li><strong>全球AI资本开支全面上修：</strong>四大云厂商2026年支出7,250亿美元(+77%+)</li>\n</ul>\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。下周Computex大会和戴尔财报传导效应有望带动情绪修复。<strong>A股与美股AI定价阶段性背离</strong>，历史上这种背离往往很快会被修正。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔+35%最强信号</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿元居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创新高、博通+3.2%逼近历史新高、英伟达+1.5%、美光+3.5%续创新高。市场对AI算力的需求定价仍在持续强化。</p>\n<p class=\"sn\"><strong>基本面（最强确认）：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年AI营收预期至600亿美元——这是全球AI基建投资加速的最强确认信号。Cerebras上市首日+89%（晶圆级芯片，4万亿晶体管/200mm直径）。华为推出星河AI数据中心网络方案（NPU与存储直通，带宽提升8倍）。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构最新进展。发改委\"人工智能+\"从拓展升级为全面实施。华为9系列RISC-V处理器适配安卓16，国产AI芯片替代路径拓宽。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎但美股持续升温。戴尔财报情绪有望向A股传导——AI服务器供应链（工业富联、浪潮信息、中科曙光等）周一值得重点关注。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气度最确定</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品（6nm DRAM工艺）。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺将持续至2026年后。闪迪CTO直言\"AI竞赛正在变成拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期，获利资金兑现。HBM是AI产业链中<strong>供需格局最紧张的环节</strong>，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树IPO上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势但成交缩量——抛压在消化中。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>人形机器人规模化验证关键期</strong>。<strong>宇树科技科创板IPO将于6月1日（周一）上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产。小鹏宣布2026年完成人形机器人量产。Figure 03已开启全天候包裹分拣直播，展现全流程闭环操作。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将为机器人板块强心剂。但注意宇树Q1扣非净利润同比-52%（\"增收不增利\"），上会过程可能存在争议。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势吸金</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化——光模块龙头中际旭创（成交225亿A股第一）高位震荡，但<strong>通信线缆及配套</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电启动全球首款200Gbps微环调制器量产。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)/净利57亿(+262%)。Lumentum光通信组件产能售罄至2028年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO\"新面孔\"——通信线缆方向获得集中配置。但斌转发CPO视频引发业界关注。光模块龙头短期调整属获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估</td><td><span class=\"pill pill-mid\">防御</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费+618预期</td><td><span class=\"pill pill-mid\">防御</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御</span></td></tr>\n</table>\n\n<p><strong>资金流向核心结论：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>全行业第一（跌幅最大）</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，防御逻辑主导</li>\n  <li><strong>通信线缆</strong>是AI板块唯一逆势吸金方向，亨通光电全市场第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong></li>\n  <li>隔夜美股AI反之——AI全市场最大吸金方向。<strong>A股vs美股AI定价背离</strong></li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球AI硬件业绩最强验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>CPO产业链通信线缆方向占据4席(亨通/长芯博创/剑桥/长飞)，是周五主力资金唯一集中配置的AI相关方向。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2启动正式量产，首代目标年产100万台。A股核心受益环节：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>机器人关节驱动系统</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p>2026年是人形机器人<strong>从0到1量产兑现阶段</strong>。宇树科技6月1日IPO上会为最强催化剂。关注宇树Q1\"增收不增利\"是否影响过会审议。核心仓位以三花+绿的为主，传感器/电机为卫星仓位。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（周五高切低全线回调，科创50-5%+）。隔夜美股AI全面大涨纳指七连涨创新高，产业热度持续升温。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026大会<br>— 英伟达黄仁勋主题演讲（预计）<br>— Vera Rubin架构/CPO量产/GB300<br>— 微软Copilot+/AMD Zen6<br>— 戴尔AI服务器财报传导效应</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量：高开放量则有望企稳反弹；缩量则需警惕\"高开低走\"。通信线缆方向（亨通/长飞/剑桥）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间宽幅震荡。美元走弱提供支撑。关注下周五非农数据对加息预期的扰动。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力持续大额净流出。若下周一高开缩量需警惕\"高开低走\"。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力供应链的传导效应<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/中天）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260531-0507", "date": "2026-05-31 05:07", "title": "AI板块周末复盘 · A股休市 美股戴尔AI营收+757%飙涨35% 白银75美元震荡 聚焦下周Computex", "tags": ["周末复盘", "美股AI", "戴尔财报", "白银震荡", "CPO通信线缆", "Computex", "宇树科技"], "summary": "A股休市。周五科技高切低科创50暴跌5%。隔夜美股AI全线大涨纳指新高，戴尔AI服务器营收+757%飙涨35%。白银75美元附近震荡。下周Computex+宇树IPO最强催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">--</div><div class=\"lbs\">A股周末休市</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔财报飙升</div></div>\n</div>\n\n<h1>AI板块周末早间复盘 · 科技高切低 白银区间震荡 聚焦下周Computex</h1>\n<p><strong>时间：</strong>2026-05-31 05:07（A股周五已收盘，周日凌晨）</p>\n\n<div class=\"tagline\">📌 <strong>当前状态：</strong>现在是北京时间5月31日（周日）凌晨，A股处于周末休市状态。上周五（5/29）A股上演\"高切低\"全面切换——科技全线退潮，科创50暴跌5.04%，电力/通信线缆/消费逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔财报AI服务器营收+757%盘后飙涨35%</strong>创历史新高，全球AI算力需求持续超预期。下周<strong>六重催化：宇树IPO上会(6/1) + Computex 2026大会(6/2-6/5) + 戴尔美股传导效应</strong>。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-mid\">周跌0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>约75.25美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">周涨0.28%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035元/千克</strong>（夜盘+0.64%）</div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月涨跌幅</div><div class=\"iv\"><strong>+2.1%</strong> <span class=\"pill pill-up\">月线收涨</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银期货本周走势剧烈震荡——5/26（周一）77.27美元，5/28（周三）下探至73.29美元（-2.84%）创周内低点，5/29（周四）强力反弹+3.81%至76.08美元后回落至75.27-75.58美元。整体处于<strong>72-80美元宽幅震荡区间</strong>，月线仍录得+2.1%的涨幅。多空双方在75美元一线激烈博弈。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数回落至99附近，近期持续走弱对贵金属形成底部支撑</li>\n  <li><strong>通胀粘性支撑贵金属：</strong>美国4月PCE物价指数同比+3.8%创三年新高，抗通胀资产需求升温</li>\n  <li><strong>白银投机情绪降温：</strong>CFTC数据显示截至5月26日，COMEX白银投机净多头持仓减少1,517手至10,244手，短线看涨情绪降温</li>\n  <li><strong>工业需求维持强劲：</strong>光伏+AI数据中心建设对白银工业需求维持高位，中长期需求故事不变</li>\n  <li><strong>地缘不确定性高企：</strong>美伊谈判进展反复，特朗普称即将就伊朗战事作出最终决定</li>\n  <li><strong>波动率放大：</strong>5月以来银价经历了从70→89→73→78美元的大幅波动，日内涨跌超3%成常态</li>\n</ul>\n<blockquote>💡 白银自1月121美元历史高点已回落约38%，当前在72-80美元区间筑底震荡。短线支撑72美元（前低），上方压力80美元整数关口。月线+2.1%表明多头基础仍在。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（周五5/29回顾）</h2>\n<p>A股三大指数周五高开低走全线收跌，<strong>科创50暴跌5.04%领跌全场</strong>：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌，+3500亿）</div></div>\n  <div class=\"info-item\"><div class=\"il\">主力净流出</div><div class=\"iv\"><span class=\"red\">-831.55亿元</span>（连续多日净流出）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌，涨跌比约3:7。北向资金成交4734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通成交前三。申万一级仅12个行业上涨——食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。</p>\n\n<p><strong>本周（5/26-5/30）整体表现：</strong>上证指数累计跌1.08%，深证成指跌0.14%，创业板指涨2.53%。煤炭、公用事业、通信行业领涨。整体呈现<strong>\"先扬后抑\"</strong>——周初半导体/AI连续大涨，周末科技全面退潮。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n\n<p><strong>核心特征：</strong>两日\"冰火两重天\"——周四创业板首超沪指、\"易中天\"齐创新高，周五全面退潮科创50暴跌5%。主力资金从高位科技抱团品种<strong>系统性撤离</strong>至电力/消费等防御方向。</p>\n\n<p><strong>但强烈积极信号在外盘：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体指数+1%创新高</li>\n  <li><strong>戴尔财报AI服务器营收161亿美元 +757%</strong>（盘后飙涨+35%，创历史新高）</li>\n  <li><strong>Cerebras</strong>（餐盘大小的AI芯片）上市首日暴涨89%市值750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、美光+3.5%续创新高、微软+3%</li>\n  <li>四大云厂商2026年资本支出合计<strong>7250亿美元（+77%）</strong></li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。\"高切低\"更多是资金轮动。美股AI全面上涨+戴尔爆表财报证明全球AI算力需求仍在加速，下周A股有望在戴尔传导效应和Computex催化下企稳回升。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势</span> <span class=\"pill pill-up\">戴尔财报最强催化</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿全市场第一。算力ETF全线下跌，创业板人工智能ETF华安(159279)跌2.02%。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创新高、博通+3.2%逼近新高、英伟达+1.5%、美光+3.5%续创新高。市场对AI算力的需求定价继续强化。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元（+757%）</strong>，上调全年AI服务器预期至600亿美元——这是全球AI基建投资加速的最强确认信号。Cerebras纳斯达克上市首日涨89%。华为推出星河AI数据中心网络方案（带宽提升8倍）。四大云厂商2026年资本支出7250亿美元（+77%+）。联想集团财报同样亮眼，AI服务器业务高速增长。全球AI算力投资\"军备竞赛\"白热化。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋预计做主题演讲，有望发布Vera Rubin架构细节。国家发改委\"人工智能+\"从\"深化拓展\"升级为\"全面实施\"。工信部/国家数据局联动推动国产大模型适配国产算力芯片。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎但美股持续升温。戴尔+35%的传导效应将是下周一A股AI板块最需要关注的因子。若算力/服务器方向（工业富联/中科曙光/浪潮信息）高开放量，则板块有望企稳。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span> <span class=\"pill pill-mid\">A股回调</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但整体方向偏流出。佰维存储逆势上涨0.94%成存储中少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%）创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>，有价无货一芯难求。三星率先交付首批12层48GB HBM4E样品（比HBM4提升20%+，比HBM3E快40%+）。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺延续至2026年后。闪迪CTO：AI竞赛正变成\"拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>HBM产业数据极为亮眼但股价已充分反映涨价预期，获利资金兑现。中长期来看，HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，每次回调都是布局机会。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续5/27净流出143亿的抛压态势，但成交缩量——抛压在消化中。前期强势股回调明显。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>人形机器人规模化验证关键期</strong>。<strong>宇树科技科创板IPO将于6月1日（周一）上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。Figure 03开始全天候包裹分拣直播，展示从识别到自主换电的闭环操作。小鹏2026年完成人形机器人量产，新一代IRON三季度亮相、年底量产。海关总署数据：4月工业机器人出口2.5万台（同比+90%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树科技上会结果。若顺利过会，将成为机器人板块标志性催化剂，带动板块情绪企稳回升。当前属<strong>等待催化剂真空期</strong>的正常调整。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span> <span class=\"pill pill-up\">CPO产业化元年</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化——光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>（全市场第一），剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产。鸿海CPO全光交换机出货目标从此前1万台上调至5万台以上。台积电将光子互连列为最重要架构层级。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿（+192%），净利57亿（+262%）业绩亮眼。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正在寻找CPO产业链\"新面孔\"——通信线缆方向获得集中配置。但斌转发CPO视频引发产业关注。光模块龙头短期调整属获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五5/29 TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御资金大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向 <strong>🔥</strong></td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估值</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出。仅10个行业获净流入，21个行业净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一）；机械设备(-111亿)、电力设备(-102亿)紧随其后</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，防御类板块成为资金避风港</li>\n  <li><strong>通信线缆是AI板块中唯一逆势吸金方向</strong>——亨通光电全市场主力净流入第一</li>\n  <li>AI相关板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，在全市场中相对热度降至冰点</li>\n  <li><strong>对比美股：</strong>值得深思的是——A股周五AI板块是全市场最大的\"失血\"方向；而隔夜美股AI板块却是全市场最大的\"吸金\"方向。这种跨市场背离通常是短暂的。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元同比+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证，A股下周一算力/服务器方向有望传导。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股(600487)</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向获资金集中追捧，周五9.42%涨幅</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股(688981)</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨创新高后大幅回调</td></tr>\n  <tr><td><strong>博杰股份</strong></td><td>A股(002975)</td><td><span class=\"pill pill-up\">连续涨停</span></td><td>AI算力布局+业绩反转（2025年净利增557%），切入英伟达供应链，液冷测试设备小批量发货</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五5/29）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿元)</th><th>板块归属</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>关键观察：</strong>通信线缆/光通信方向占据TOP10中<strong>4席</strong>（亨通光电/长芯博创/剑桥科技/长飞光纤），CPO产业链延伸方向是周五全市场唯一获得集中配置的AI相关领域。下周值得重点关注CPO产业链向通信线缆扩散的持续性。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3预计Q2启动量产，首代目标年产能100万台。中国供应链凭借成本优势核心受益：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证环节</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人关节</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新进展：</strong>宇树科技IPO将于<strong>6月1日（周一）上会</strong>，若成功过会将为板块带来最强催化剂。2026年是行业从0到1的<strong>量产兑现阶段</strong>。核心配置以三花+绿的为主，逢低布局。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。上周五高切低全面回调（科创50-5.04%），但隔夜美股AI全线大涨纳指七连涨创新高。AI产业热度持续升温，调整是筹码消化而非逻辑破坏。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026台北电脑展<br>— 英伟达黄仁勋主题演讲（预计Vera Rubin架构）<br>— 微软Copilot+ PC / AMD Zen6 / 英特尔新品<br>— 戴尔美股飙涨35%传导效应<br><strong>周五(6/5)：</strong>美国非农数据</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报飙涨35%</strong>和美股AI全面上涨传导，A股AI板块有望<strong>高开</strong>。重点关注：①AI服务器/算力方向（工业富联/中科曙光/浪潮信息）的早盘表现 ②通信线缆方向（亨通光电）是否延续强势 ③若高开后成交量有效放大，则板块有望企稳反弹；若缩量则警惕\"高开低走\"。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供支撑，月线+2.1%显示多头基础仍在。上方突破80美元需更强催化剂（美联储鸽派信号或地缘升级）。沪银夜盘+0.64%收涨。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力连续多日大额净流出。若周一高开但成交量不足（<3万亿），需警惕\"高开低走\"。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对AI服务器/算力方向的传导效应<br><strong>2)</strong> 逢低分批布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 密切关注CPO通信线缆新方向（亨通/长飞/剑桥）的持续性<br><strong>4)</strong> 宇树科技6/1上会结果决定机器人板块短期方向<br><strong>5)</strong> 核心仓位不动，利用调整降低成本</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260531-0607", "date": "2026-05-31 06:07", "title": "AI板块周末复盘 · 白银75美元区间震荡 隔夜美股戴尔AI营收爆表 聚焦下周Computex+宇树IPO", "tags": ["周末复盘", "白银", "戴尔财报", "Computex", "宇树科技", "美股AI"], "summary": "A股休市。周五科技高切低科创50暴跌5.04%。隔夜美股AI全线大涨纳指七连涨，戴尔AI服务器营收+757%盘后飙升35%。下周Computex+宇树IPO为最强催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔盘后</div></div>\n  <div class=\"metric-box\"><div class=\"num\">3.32万亿</div><div class=\"lbs\">周五成交</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 白银75美元震荡 美股戴尔AI营收爆表</h1>\n<p><strong>时间：</strong>2026-05-31 06:07（A股周末休市·上周五5/29已收盘）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>A股处于周末休市状态。上周五5/29上演<strong>\"高切低\"全面切换</strong>——科技全线退潮科创50暴跌5.04%，电力/公用事业/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指<strong>七连涨创新高</strong>，<strong>戴尔AI服务器营收161亿美元+757%盘后飙升35%创历史新高</strong>，产业基本面强势不改。下周<strong>六重催化：宇树科技IPO上会(6/1) + Computex 2026大会(6/2-6/5) + 戴尔美股传导效应</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">5/29收跌-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>约75.32 美元/盎司</strong> <span class=\"pill pill-mid\">75美元附近震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035元/千克</strong> <span class=\"pill pill-up\">夜盘+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪金主力</div><div class=\"iv\"><strong>夜盘+1.61%</strong> <span class=\"pill pill-up\">小幅回暖</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.15</strong> <span class=\"pill pill-down\">近期低位运行</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4,569.90 美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC投机净多</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银期货本周（5/26-5/30）走势剧烈震荡——周初77.27美元，周三下探至<strong>73.29美元</strong>低点（-2.84%），周四强力反弹至76.08美元（+3.81%），周五回落至75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>。周线微跌0.73%，但<strong>5月整体仍录得约+2.1%的月涨幅</strong>。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数报99.15持续低位运行，对贵金属构成底部支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，强化抗通胀资产需求</li>\n  <li><strong>美伊局势：</strong>特朗普称即将对伊朗战事做出最终决定，中东地缘不确定性高位</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机净多头持仓减少至10,244手，短线看涨情绪降温但并非恐慌</li>\n  <li><strong>工业需求故事：</strong>光伏+AI数据中心对白银工业需求维持高位，中长期基本面偏多</li>\n  <li><strong>供需缺口：</strong>全球白银供应连续第六年出现短缺，2026年缺口预计扩大到约4630万盎司</li>\n</ul>\n<blockquote>💡 白银自1月121美元历史高点回落约38%，当前在72-80美元区间筑底震荡。短线支撑72美元（前低），上方压力80美元整数关口。波动率较大，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（A股周五5/29收盘回顾）</h2>\n<p>A股三大指数上周五高开低走，全线收跌，科创50暴跌5.04%领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌+3300亿）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌，涨跌比约3:7。主力资金净流出<strong>831.55亿元</strong>，连续多日净流出。北向资金成交4734亿元（占两市14.26%）。</p>\n\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、<strong>电子(-4%+)</strong>领跌。科技板块全面的获利了结和\"高切低\"调仓非常清晰。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。周四\"易中天\"齐创新高、半导体全面爆发的盛况被周五全线回调彻底反转。</p>\n\n<p><strong>但盘后积极信号密集涌现：</strong></p>\n<ul>\n  <li><strong>美股纳指七连涨创新高</strong>（+0.91%），费城半导体+1%</li>\n  <li><strong>戴尔Q1 AI服务器营收161亿美元+757%</strong>，盘后飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、美光+3.5%续创新高、微软+3%</li>\n  <li><strong>全球AI资本开支全面上修：</strong>四大云厂商2026年支出7250亿美元(+77%+)</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的技术性获利回吐），而非产业逻辑破坏。美股对AI的定价与A股出现了<strong>阶段性背离</strong>——这往往意味着A股AI板块的调整是短期的。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调·美股强势</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿全市场第一（昨创新高后今日获利回吐）。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创新高、博通+3.2%、英伟达+1.5%创新高、美光+3.5%创新高。纳指七连涨创纪录。</p>\n<p class=\"sn\"><strong>基本面（最强信号）：</strong><strong>戴尔Q1 AI服务器营收161亿美元+757%</strong>，全年AI营收预期上调至600亿美元——这是全球AI基建投资加速的最强确认。Cerebras上市首日+89%。华为推出星河AI数据中心方案（NPU与存储直通，带宽提升8倍）。四大云厂商2026年资本支出7250亿美元(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin新架构。发改委\"人工智能+\"从拓展升级为全面实施。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎但美股情绪持续升温。戴尔财报传导效应有望在下周一早盘体现。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品。美光HBM4产能提升速度达HBM3的两倍，警告内存短缺持续至2026年后。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。闪迪CTO：AI竞赛正变成\"拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲但股价短期已反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树IPO上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。奥比中光相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面（密集催化）：</strong><strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3已下线测试，Q2启动量产首代目标年产能100万台。小鹏宣布2026年完成人形机器人量产。Figure 03开启全天候包裹分拣直播。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块标志性催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化——光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电已启动全球首款200Gbps微环调制器量产。LightCounting预测2030年CPO市场规模达100亿美元。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。光模块龙头短期调整属获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>居全行业第一（机械设备/电力设备均超100亿）</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御</li>\n  <li>通信线缆是AI板块中<strong>唯一逆势吸金方向</strong>，亨通光电全市场第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li>但隔夜美股AI全线大涨，A股和美股对AI的定价出现<strong>阶段性背离</strong></li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。最强AI硬件业绩验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股(600487)</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向获资金追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股(688981)</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，创新高后大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线测试，Q2启动量产，首代目标年产能100万台。中国供应链核心受益企业：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p>2026年是人形机器人<strong>从0到1量产兑现阶段</strong>。宇树科技IPO上会(6/1)将是行业标志性里程碑事件。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（上周五科技高切低科创50暴跌5.04%）。隔夜美股AI全线大涨纳指七连涨创新高。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026大会<br>— 英伟达黄仁勋主题演讲（Vera Rubin架构更新）<br>— 戴尔AI服务器财报传导效应<br>— 微软Copilot+ PC升级 / AMD新品</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%飙升</strong>和美股AI全面上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量——放量则有望企稳反弹。通信线缆方向（亨通光电/长飞光纤）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡筑底。美元走弱+通胀粘性提供支撑，但上方突破80美元需更强催化剂。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力资金连续多日大额净流出（周五-831亿）。若下周一高开但量能不济，需警惕\"高开低走\"。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导（周一早盘）<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头<br><strong>3)</strong> 重点关注CPO通信线缆方向新机会（亨通光电、长飞光纤）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260531-0707", "date": "2026-05-31 07:07", "title": "AI板块周末复盘 · 科技高切低科创50暴跌5% 隔夜美股AI全线大涨 戴尔+35%", "tags": ["周末复盘", "高切低", "戴尔财报", "白银震荡", "Computex", "宇树科技", "Anthropic"], "summary": "周五科技高切低科创50暴跌5%，隔夜美股戴尔AI营收+757%飙35%。本周Computex+宇树上会最强催化。COMEX白银75.58美元震荡。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">休市</div><div class=\"lbs\">A股周末</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔盘后</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技高切低 隔夜美股全线大涨</h1>\n<p><strong>时间：</strong>2026-05-31 07:07（北京时间·周日·A股上周五已收盘）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>上周五（5/29）A股上演全面\"高切低\"——科技全线退潮，科创50暴跌5.04%，电子板块主力净流出372亿，电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔AI服务器营收161亿美元+757%盘后飙升35%</strong>，Anthropic 9650亿美元估值反超OpenAI。产业基本面持续超预期。<strong>本周最强催化：6/1宇树IPO上会 + 6/2-6/5 Computex大会</strong>。A股调整=筹码消化≠逻辑破坏。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-mid\">周跌-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>约75美元附近</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035元/千克</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">-1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银本周走势剧烈震荡——周初77.27美元，周三下探至73.29美元低位（-2.84%），周四强势反弹至76.08美元（+3.81%），周五回落至75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空在75美元一线激烈博弈。5月整体录得约+2.1%月涨幅。白银自1月创下121美元历史高点后已回调约38%，当前处于震荡筑底阶段。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元持续走弱支撑贵金属：</strong>美元指数回落至99附近，创近期新低，对黄金和白银均形成底部支撑</li>\n  <li><strong>通胀粘性推升避险需求：</strong>美国4月PCE物价同比+3.8%创三年新高，美联储降息预期仍摇摆不定</li>\n  <li><strong>美伊地缘不确定性：</strong>特朗普称即将对伊朗作出\"最终决定\"，霍尔木兹海峡局势持续紧张</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机净多头持仓减少至10,244手，短线看涨情绪降温</li>\n  <li><strong>工业需求端：</strong>光伏+AI数据中心建设对白银工业需求维持高位，但短期受宏观情绪压制</li>\n  <li><strong>波动率系统性提升：</strong>5月中旬银价单日跌超9%后，市场呈现急涨急跌的高波动特征</li>\n</ul>\n<blockquote>💡 白银当前72-80美元区间宽幅震荡，短线支撑72美元（前低），上方压力80美元整数关口。波动剧烈（5月区间振幅超20%），注意仓位管理。贵金属定价短期看美元/美联储，中长期看工业需求（光伏+AI）。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（5/29 A股收盘回顾）</h2>\n<p>上周五A股三大指数高开低走全线收跌，科创50暴跌5.04%：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。主力资金净流出<strong>831.55亿元</strong>（连续多日净流出）。</p>\n\n<p><strong>盘面特征——极致分化：</strong></p>\n<ul>\n  <li><strong>上涨方向：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)、美容护理(+2%+)——全线防御属性</li>\n  <li><strong>下跌方向：</strong>综合(-5.39%)、国防军工(-4.23%)、电子(-4%以上)、机械设备(-2%+)、计算机(-2%+)、通信(-2%+)——科技全线退潮</li>\n  <li><strong>北向资金：</strong>总成交4734亿元（占两市14.26%），宁德时代/中际旭创/天孚通信为深股通前三大成交</li>\n  <li><strong>两日极端反转：</strong>周四创业板首超沪指、\"易中天\"齐创新高 → 周五全面退潮科创50暴跌5%——<strong>主力资金在系统性\"高切低\"</strong></li>\n</ul>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块全面回调。人工智能指数(BK0800)收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n\n<p><strong>但重要的积极信号在外盘：</strong></p>\n<u
