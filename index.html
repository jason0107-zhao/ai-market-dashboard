本面：</strong>戴尔2027财年Q1 AI优化服务器营收<strong>161亿美元</strong>同比激增<strong>757%</strong>，上调全年AI营收预期至600亿美元。Cerebras在美上市首日大涨89%市值达750亿美元。海内外AI基建投资同步加码，四大云厂商2026年资本支出7250亿美元（+77%+）。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex 2026</strong>以\"AI Together\"为主题，英伟达/AMD/英特尔等巨头将集中发布AI芯片和服务器最新方案。发改委\"人工智能+\"从\"深化拓展\"升级为\"全面实施\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期情绪谨慎（获利回吐），但美股AI热情不减。下周Computex大会是扭转A股AI板块情绪的关键催化。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">短期回调 · 中期景气最强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但整体偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（最强环节）：</strong>HBM3E现货价半年暴涨超300%。全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（+260%），创历史新高。三星率先交付首批12层48GB HBM4E样品。集邦预测2026年HBM需求再增70%+。HBM在AI芯片成本占比已从52%升至63%。美光警告内存短缺将持续至2026年后。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期股价已充分反映涨价预期，获利资金兑现。但中期来看HBM是AI产业链<strong>供需格局最紧张</strong>的环节，回调即布局机会。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待催化 · 宇树6/1上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，执行器、减速器等核心环节标的回调。但板块成交缩量——抛压在消化中。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。海关总署数据显示4月工业机器人出口量突破2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树科技上会结果。若顺利过会将为机器人板块注入强心剂，带动板块情绪企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆异军突起</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化显著。光模块龙头中际旭创高位震荡（成交225亿A股第一），但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台以上。台积电COUPE封装加速推进。中际旭创2026Q1营收194.96亿（+192%），净利润57.35亿（+262%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向成为资金集中配置的新方向。光模块龙头的短期调整是获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技->防御资金大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸（新方向）</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+防御配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>核心结论：</strong></p>\n<ul>\n  <li>全市场主力净流出831.55亿元，<strong>连续多日净流出</strong></li>\n  <li><strong>电子行业</strong>净流出372亿（全行业第一）——AI科技方向全面失血</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向 — 亨通光电全市场主力净流入第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸，资金集中追捧新方向</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创新高后大幅回调，拖累AI板块</td></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE:DELL</td><td><span class=\"pill pill-up\">财报后+35%飙升<br>历史新高</span></td><td>AI服务器营收161亿美元+757%，上调全年预期至600亿美元。A股AI板块下周一有望受此提振高开。</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿元)</th><th>板块归属</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的4席（亨通光电/长芯博创/剑桥科技/长飞光纤），显示CPO-通信线缆产业链是周五主力资金<strong>唯一集中配置的AI相关方向</strong>。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 周五定性</div><div class=\"iv\" style=\"font-size:14px\">A股已收盘。\"高切低\"全面切换——科技退潮、防御逆势。科创50暴跌5%。但隔夜美股AI全线大涨，A股调整更多是<strong>内部资金博弈</strong>而非产业逻辑破坏。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键日历</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一 6/1：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五 6/2-6/5：</strong>Computex 2026台北电脑展（全球AI最强催化）<br>— 英伟达黄仁勋主题演讲<br>— 可能发布Vera Rubin架构细节<br>— 微软/AMD/英特尔AI新品发布</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股<strong>纳指六连涨创新高</strong>（+0.91%），费城半导体+1%创新高。高通+6%，ARM+5%再创新高，美光+3.5%再创新高，微软+3%。<strong>AI交易热潮升温中。</strong>戴尔财报后暴涨35%（AI服务器营收+757%）。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供支撑，但美联储加息预期反复压制上方空间。沪金银夜盘收涨（金+1.61%/银+0.64%），短线反弹动能延续。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力连续多日大幅净流出。若下周一AI板块高开（受美股/戴尔财报提振）但成交量不能有效放大，需警惕\"高开低走\"。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导效应（周一早盘）<br><strong>2)</strong> Computex大会窗口逢低布局算力/光模块龙头<br><strong>3)</strong> 关注CPO通信线缆方向新机会（亨通光电、长飞光纤）<br><strong>4)</strong> 宇树上会结果决定机器人板块下周走势</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260530-0607", "date": "2026-05-30 06:07", "title": "AI板块周末复盘 · 科技全面休整 美股AI全线大涨戴尔暴升35%", "tags": ["周末复盘", "美股AI", "戴尔财报", "白银震荡", "Computex", "宇树科技"], "summary": "A股已收盘，科技高切低科创50暴跌5%。隔夜美股AI全线大涨纳指新高，戴尔AI服务器营收+757%暴升35%。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">--</div><div class=\"lbs\">A股周末休市</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.27</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔财报飙升</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技全面休整 美股戴尔AI营收爆表</h1>\n<p><strong>时间：</strong>2026-05-30 06:07（北京时间·非交易时段）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>当前A股处于周末休市状态（周五5/29已收盘）。上周五上演典型的\"高切低\"切换——科技全线退潮、防御板块逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔财报AI服务器营收+757%盘后暴升35%</strong>，产业基本面强势不改。下周<strong>六重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔美股传导效应</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.27美元/盎司</strong> <span class=\"pill pill-mid\">近期75-78区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>75美元附近</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035元/千克</strong>（上周五夜盘+0.64%）</div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪金主力</div><div class=\"iv\"><span class=\"pill pill-up\">夜盘+1.61%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\">10,244手 <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银期货本周（5/26-5/30）走势剧烈震荡——周初77.27美元，周三下探至73.29美元（-2.84%），周四强力反弹至76.08美元（+3.81%），周五回落至75.27美元（-0.85%）。整体处于<strong>72-80美元宽幅震荡区间</strong>，多空双方在75美元一线激烈博弈。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元指数持续走弱：</strong>美元指数回落至99附近，对贵金属整体形成底部支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求上升</li>\n  <li><strong>美伊关系：</strong>特朗普称即将对伊朗战事做出最终决定，中东地缘不确定性高位</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机净多头持仓减少至10,244手，短线资金看涨情绪降温</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心建设对白银工业需求维持高位，但短期超卖</li>\n  <li><strong>波动率放大：</strong>5月中旬单日跌超9%后市场波动率系统性提升，价格呈现急涨急跌特征</li>\n</ul>\n<blockquote>💡 白银自1月121美元历史高点已回落约38%，当前在72-80美元区间筑底震荡。短线支撑72美元（前低），上方压力80美元整数关口。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（A股周五收盘回顾）</h2>\n<p>A股周五高开低走全线收跌，科创50暴跌5.04%：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。主力资金净流出<strong>831.55亿元</strong>。北向资金成交4734亿元（占两市14.26%）。</p>\n\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。科技板块全面的获利了结和\"高切低\"调仓行为非常清晰。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n\n<p><strong>但积极信号在外盘：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体指数+1%</li>\n  <li><strong>戴尔财报AI服务器营收161亿美元 +757%</strong>，盘后股价飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、美光+3.5%续创新高</li>\n  <li><strong>全球AI资本开支全面上修：</strong>四大云厂商2026年支出7250亿美元(+77%+)</li>\n</ul>\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。下周Computex大会和戴尔财报传导效应有望带动情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔+35%最亮眼</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%创新高、博通+3.2%、英伟达+1.5%、美光+3.5%续创新高。市场对AI算力的需求定价仍在强化。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年AI营收预期至600亿美元——这是全球AI基建投资加速的最强确认信号。Cerebras上市首日+89%。华为推出星河AI数据中心网络方案，NPU与存储直通带宽提升8倍。四大云厂商2026年资本支出合计7250亿美元(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin相关架构。发改委\"人工智能+\"从拓展升级为全面实施。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎，但美股情绪持续升温。关注戴尔财报情绪向下周一A股传导的可能性，AI服务器/算力供应链有望高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品，性能提升超20%。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。闪迪CTO：AI竞赛正在变成\"拼内存\"，HBF成套产品明年推出。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——2026年是<strong>规模化验证关键期</strong>。<strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。Figure 03机器人已开启全天候包裹分拣直播，展现从识别到自主换电的全流程闭环操作。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块的标志性催化剂，带动板块情绪企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产。鸿海CPO全光交换机出货目标从此前1万台上调至2026-2027年超过5万台。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频引发业界关注。光模块龙头短期调整属获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一跌幅最大）</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向，亨通光电全市场第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>对比：</strong>周五AI板块是全市场最大的\"失血\"方向，但隔夜美股反之——AI是全市场最大的\"吸金\"方向。A股和美股对AI的定价出现阶段性背离。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股(600487)</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股(688981)</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨创新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器业务成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通、长芯博创、剑桥、长飞），CPO产业链延伸方向是周五全市场唯一获得集中配置的AI相关方向。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3预计年中亮相，7-8月启动正式量产，首代目标年产能100万台。中国供应链优势企业核心受益：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新进展：</strong>宇树科技6月1日IPO上会是板块最强催化剂。2026年是人形机器人从0到1的<strong>量产兑现阶段</strong>。板块适合<strong>逢低布局</strong>，核心以三花+绿的为主，传感器/电机为卫星仓位。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（周五高切低全线回调，科创50-5.04%）。但隔夜美股AI全线大涨纳指七连涨创新高，AI产业热度持续升温。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026<br>— 英伟达黄仁勋主题演讲（预计）<br>— 可能发布Vera Rubin架构新细节<br>— 微软Copilot+ PC升级 / AMD Zen6<br>— 戴尔AI服务器财报传导效应</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动，A股AI板块有望<strong>高开</strong>。但关键看成交量：若高开后量能放大则有望企稳反弹；若缩量则需警惕继续调整。通信线缆方向（亨通光电）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供支撑，沪银夜盘+0.64%。上方突破80美元需更强催化剂（如美联储鸽派信号或地缘升级）。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力资金连续多日大额净流出。若下周一高开但成交量不足，需警惕\"高开低走\"的走势。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力的传导（周一早盘最需关注）<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO产业链通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-0707", "date": "2026-05-30 07:07", "title": "AI板块早间速报 · 5/29收盘全面回调 白银震荡企稳", "tags": ["早间速报", "收盘复盘", "白银期货", "算力", "机器人", "CPO"], "summary": "上周五A股全面回调，AI科技股领跌，电子板块主力净流出372亿。白银期货震荡企稳至75.58美元。Computex大会下周开幕为关键催化。", "html": "\n<h1>AI板块早间速报</h1>\n<p><strong>时间：</strong>2026-05-30 07:07</p>\n<p class=tagline>📌 <strong>当前状态：</strong>上周五（5月29日）A股已收盘，三大指数全线收跌，科技股全面回调。本报告聚焦盘后消息及本周展望。</p>\n\n<h2>零、COMEX白银期货播报</h2>\n<div class=\"sect-card\">\n<p class=sn><strong>最新价格：</strong>COMEX白银期货主力报 <strong>75.58 美元/盎司</strong>（5月29日收盘）</p>\n<p class=sn><strong>日内涨跌：</strong>-0.43%</p>\n<p class=sn><strong>近期趋势：</strong>白银在5月初一度冲高至81.42美元（5月7日），随后持续回落至73.29美元（5月28日低点），近期在75美元附近出现企稳迹象。本周（5/25-5/29）COMEX白银期货微跌0.73%，5月整体仍录得约2.1%的月涨幅。</p>\n<p class=sn><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元指数：</strong>美元指数维持在99.15附近相对低位运行，对贵金属构成支撑</li>\n  <li><strong>美伊局势：</strong>特朗普称即将就伊朗问题作出\"最终决定\"，霍尔木兹海峡局势不确定性加剧贵金属波动</li>\n  <li><strong>CFTC持仓：</strong>截至5月26日，COMEX白银投机净多头减少1517手至10244手，看涨情绪降温</li>\n  <li><strong>工业需求：</strong>AI算力驱动光伏/电子工业用银需求持续增长，中长期基本面仍偏多</li>\n</ul>\n</div>\n\n<h2>一、AI板块整体市场概览</h2>\n<p>上周五（5月29日）A股AI板块遭遇全面回调。上证指数收报4068.57点（-0.73%），深证成指跌1.81%至15575.13点，创业板指大跌2.11%至4037.95点。科创50指数一度跌超3.7%，科技股全线退潮。半导体、算力、CPO等前期强势板块集体杀跌，主力资金从高位科技品种大幅撤离。AI板块在全市场中处于领跌状态。</p>\n\n<h2>二、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-down\">主力净流出</span></div>\n<p class=sn><strong>资金面：</strong>5月29日AI算力芯片板块跟随大盘大幅回调。电子板块（含半导体/算力）主力资金净流出高达372.05亿元，居所有行业之首。工业富联、中芯国际、兆易创新等成交额均超220亿元，但抛压沉重。</p>\n<p class=sn><strong>政策面：</strong>国家发改委明确\"指导国产大模型加快适配国产算力芯片\"，从顶层设计强化AI产业链自主可控能力。国产AI算力芯片国产替代逻辑获得政策背书。</p>\n<p class=sn><strong>基本面：</strong>戴尔科技发布2027财年Q1财报（截至5月1日）：AI优化服务器营收161亿美元，同比激增757%，全年AI服务器营收预期上调至600亿美元。联想集团2025/26财年业绩同样超预期，AI服务器营收亮眼，5月29日联想集团大涨22.46%。海外云厂商资本支出继续高增（谷歌/微软/Meta/亚马逊合计7250亿美元，+77%），算力景气度坚挺。</p>\n<p class=sn><strong>情绪面：</strong>短期回调更多是获利回吐和技术性调整，而非基本面逆转。Computex大会（6月2-5日）下周召开，有望成为新的情绪催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">主力净流出</span></div>\n<p class=sn><strong>资金面：</strong>当日存储板块跟随电子行业整体承压，兆易创新成交额超220亿元但抛压明显。</p>\n<p class=sn><strong>基本面：</strong><strong>HBM3E现货价格半年暴涨超300%</strong>，美光警告内存短缺将持续至2026年后。三星宣布已向主要客户交付首批12层48GB HBM4E样品，采用第六代10nm级DRAM工艺，性能较HBM4提升超20%，并规划推出8层32GB和16层64GB版本。美光HBM4产能提升速度达到HBM3的两倍。</p>\n<p class=sn><strong>情绪面：</strong>存储赛道基本面持续超预期，但A股存储板块在系统性回调中难以独善其身。中长期来看，HBM供需缺口扩大将是最确定的产业趋势之一。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-down\">主力净流出</span></div>\n<p class=sn><strong>资金面：</strong>5月29日板块跟随大盘调整，前期涨幅较大的个股回调明显。前一交易日（5月27日）人形机器人板块主力资金净流出已高达143.07亿元。</p>\n<p class=sn><strong>基本面：</strong><strong>密集催化：</strong>①宇树科技科创板IPO将于6月1日上会，冲刺A股\"人形机器人第一股\"；②小鹏宣布2026年完成人形机器人量产，新一代IRON即将进入ET2阶段，三季度亮相、年底量产；③4月国内工业机器人出口量突破2.5万台，同比增近90%；④特斯拉Optimus Gen-3已下线投入内部测试，Q2启动量产。</p>\n<p class=sn><strong>情绪面：</strong>产业趋势明确但短期涨幅较大，存在技术性回调需求。宇树科技IPO上会或成为下一轮情绪催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-down\">主力大幅流出</span></div>\n<p class=sn><strong>资金面：</strong>5月29日CPO龙头华工科技主力资金净流出超30亿元。同期电子板块净流出372.05亿元，CPO板块内部也出现明显分化——中际旭创等前期强势股涨跌不一。</p>\n<p class=sn><strong>基本面：</strong><strong>产业链信号极为积极：</strong>英伟达明确2026年Q4启动CPO量产；台积电将光子互连列为未来最重要架构层级，已启动全球首款200Gbps微环调制器量产；Lumentum光通信组件产能已售罄至2028年。100G及以上可插拔光模块市场将从2025年近200亿美元增至2030年超500亿美元，CPO市场有望达100亿美元。多家A股光模块公司一季度净利润同比增长超200%。</p>\n<p class=sn><strong>情绪面：</strong>短期回调不改中期景气向上格局。兴业证券指出，北美算力链龙头比价已回落至年内低位，是值得提升关注的窗口期。</p>\n</div>\n\n<h2>三、主流净流入板块监控</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>主力净流入</th><th>驱动原因</th><th>驱动类型</th></tr>\n  <tr><td><strong>1</strong></td><td>公用事业</td><td><span class=green>+20.32亿</span></td><td>资金避险需求，防御属性突出</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>房地产</td><td><span class=green>+超10亿</span></td><td>低位反弹+政策宽松预期</td><td><span class=\"pill pill-mid\">政策驱动</span></td></tr>\n  <tr><td><strong>3</strong></td><td>食品饮料</td><td><span class=green>+超10亿</span></td><td>贵州茅台等获主力加仓，板块涨3.02%</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>4</strong></td><td>传媒</td><td><span class=green>+超10亿</span></td><td>AI+内容应用，低位轮动</td><td><span class=\"pill pill-mid\">轮动补涨</span></td></tr>\n  <tr><td><strong>5</strong></td><td>商贸零售</td><td><span class=green>+超10亿</span></td><td>消费复苏预期叠加低估值</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>医药生物</td><td><span class=green>+52.74亿</span></td><td>前期滞涨+防御属性</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n<p>5月29日，仅10个申万一级行业获得主力资金净流入，防御性板块（公用事业/食品饮料/医药）成为资金避风港。电子行业净流出高达372亿元，计算机、通信等科技板块同样净流出。整体呈现<strong>\"高低切换\"</strong>特征明显——资金从高位科技板块系统性流出，转向低估值防御性方向。AI板块在全市场资金强度中处于<strong>垫底位置</strong>，反映了短期调整压力。</p>\n\n<h2>四、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>博杰股份</strong> (002975)</td><td><span class=\"pill pill-up\">连续涨停</span></td><td>AI算力布局+业绩反转+绑定英伟达。2025年净利增557%，2026Q1扭亏，AI服务器测试已量产，液冷测试设备小批量发货。5月28日、29日连续涨停。</td></tr>\n  <tr><td><strong>华工科技</strong></td><td><span class=\"pill pill-down\">主力净流出超30亿</span></td><td>CPO概念龙头遭主力大幅抛售，成为5月29日净流出最大的个股之一，反映AI高位股获利了结压力。</td></tr>\n  <tr><td><strong>中际旭创</strong></td><td><span class=\"pill pill-mid\">宽幅震荡</span></td><td>5月28日大涨6.77%成交225亿居A股第一，5月29日随板块回调。公司Q1营收195亿（+192%），净利57亿（+262%），基本面支撑坚实。</td></tr>\n</table>\n\n<h2>五、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2正式启动量产。A股核心受益环节梳理：</p>\n<table>\n  <tr><th>环节</th><th>核心标的</th><th>受益逻辑</th><th>优先级</th><th>当前水位</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控 (002050)</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波 (688017)</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感 (603662)</td><td>力矩传感器，国产替代空间大</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术 (300124)</td><td>工业自动化延伸至机器人关节</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团 (601689)</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器 (603728)</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n</table>\n\n<h2>六、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 短期研判</div><div class=\"iv\" style=\"font-size:14px\">上周五资金全面撤离科技股，高低切换明显。周一（6月1日）关注宇树上会及Computex大会预热对情绪的修复作用</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 关键观察</div><div class=\"iv\" style=\"font-size:14px\">①6月2日Computex大会开幕（AI芯片/服务器/液冷/机器人集中发布）②宇树科技IPO上会 ③北向资金是否回流科技板块</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">①电子板块单日净流出372亿显示资金出逃坚决 ②美伊局势不确定性 ③科技股估值处于相对高位需消化</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 策略建议</div><div class=\"iv\" style=\"font-size:14px\">等待回调企稳信号，逢低布局算力/CPO等基本面确定的细分方向。关注Computex大会催化</div></div>\n</div>\n\n<hr>\n\n<p><strong>A股交易时间提醒：</strong>当前为北京时间2026年5月30日（周六）07:07，A股上周五已收盘。本周一（6月1日）起恢复交易。盘后重点事件：Computex大会6月2日开幕、宇树科技IPO 6月1日上会。</p>\n\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-0807", "date": "2026-05-30 08:07", "title": "AI板块周末早间复盘 · A股休市 白银75美元区间震荡 聚焦下周Computex+宇树IPO", "tags": ["周末复盘", "白银震荡", "戴尔财报", "Computex", "宇树科技", "高切低"], "summary": "A股休市。周五科技高切低科创50暴跌5%，隔夜美股AI全线大涨，戴尔AI营收+757%盘后飙升35%。下周Computex+宇树上会最强催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">休市</div><div class=\"lbs\">A股状态</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔财报后</div></div>\n</div>\n\n<h1>AI板块周末早间复盘 · A股休市 白银区间震荡</h1>\n<p><strong>时间：</strong>2026-05-30 08:07（A股上周五已收盘，周六休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心观点：</strong>当前A股处于周末休市（上周五5/29已收盘）。周五A股上演\"高切低\"全面切换——科技全线退潮，科创50暴跌5.04%。电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔财报AI服务器营收+757%盘后飙升35%</strong>创历史新高，产业基本面强势不改。下周<strong>三重催化：①宇树科技IPO上会(6/1) ②Computex大会(6/2-6/5) ③戴尔财报传导效应</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">日内 -0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>约75美元</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035 元/千克</strong> <span class=\"pill pill-up\">夜盘+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.9 美元/盎司</strong> <span class=\"pill pill-up\">日内+0.83%</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银期货本周（5/26-5/30）走势剧烈震荡——周一报77.27美元，周三深跌至73.29美元（-2.84%），周四强力反弹至76.08美元（+3.81%），周五回落至75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>。周跌0.81%，5月累计仍录得约+2.1%的月涨幅。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数持续回落至99附近低位运行，对贵金属整体形成底部支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，黄金同期收涨+0.83%，白银跟涨但弹性不足</li>\n  <li><strong>美伊关系：</strong>特朗普称即将对伊朗战事做出\"最终决定\"，霍尔木兹海峡局势不确定性加剧贵金属波动</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示截至5月26日COMEX白银投机净多头减少1,517手至10,244手，短线资金看涨情绪降温</li>\n  <li><strong>波动率放大：</strong>5月中旬银价单日暴跌超9%后市场波动率系统性提升，呈现急涨急跌特征</li>\n</ul>\n<blockquote>💡 白银自1月29日创下121美元历史高点后已回落约38%，当前在<strong>72-80美元</strong>区间筑底震荡。短线支撑72美元（前低），上方压力80美元整数关口。沪银夜盘+0.64%显示国内买盘尚可。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（A股5/29周五收盘回顾）</h2>\n<p>A股上周五高开低走全线收跌，科创50暴跌5.04%：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。主力资金净流出<strong>831.55亿元</strong>。<strong>电子行业</strong>主力净流出<strong>372.05亿元</strong>居全行业第一。北向资金成交4734亿元（占两市14.26%）。食品饮料(+3.02%)、煤炭、公用事业领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。昨日\"易中天\"齐创新高的盛况今日彻底反转。两日\"冰火两重天\"说明市场情绪极度敏感。</p>\n\n<p><strong>但积极信号在外盘——隔夜美股AI全线大涨：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>（+0.91%），费城半导体指数+1%创新高</li>\n  <li><strong>戴尔科技</strong> Q1 AI服务器营收161亿美元<strong>同比+757%</strong>，盘后飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创新高、美光+3.5%续创新高、微软+3%</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI板块的调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。下周Computex大会和戴尔财报传导效应有望带动情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔财报引爆</span></div>\n<p class=\"sn\"><strong>资金面：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌。但美股AI全面大涨——戴尔盘后+35%、高通+6%、ARM+5%、博通+3.2%。</p>\n<p class=\"sn\"><strong>基本面（重磅）：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年AI营收预期至<strong>600亿美元</strong>——这是全球AI基建投资加速的最强确认信号。Cerebras上市首日+89%。四大云厂商2026年资本支出合计7250亿美元(+77%+)。华为推出星河AI数据中心网络方案，NPU与存储直通带宽提升8倍。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构细节。发改委\"人工智能+\"从\"深化拓展\"升级为\"全面实施\"。国产AI芯片9款获安全可靠I级认证。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎，但美股AI情绪持续升温。戴尔财报+35%、Cerebras+89%、纳指新高——都是AI产业热度最直接的证明。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品，性能提升超20%。美光警告内存短缺将持续至2026年后。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。闪迪CTO：AI竞赛正在变成\"拼内存\"。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，但成交缩量——抛压在消化中。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——2026年是<strong>规模化验证关键期</strong>。<strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。Figure 03机器人已开启全天候包裹分拣直播。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成机器人板块标志性催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电COUPE封装加速推进，已启动全球首款200Gbps微环调制器量产。Lumentum产能已售罄至2028年。LightCounting预测2030年CPO市场达100亿美元。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP10）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>煤炭</td><td><span class=\"green\">+10.88</span></td><td>中国神华净流入2.83亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一，AI全面失血）</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向——亨通光电全市场第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>对比：</strong>周五AI板块是全市场最大的\"失血\"方向，但隔夜美股反之——AI是全市场最大的\"吸金\"方向。A股和美股对AI的定价出现阶段性背离。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收<strong>161亿美元同比+757%</strong>，上调全年AI预期至600亿美元。AI硬件业绩最强验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股(600487)</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股(688981)</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器业务成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2启动量产，首代目标年产能100万台：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新催化剂：</strong>宇树科技6月1日IPO上会。2026年是人形机器人<strong>从0-1量产兑现阶段</strong>。板块适合<strong>逢低布局</strong>。</p>\n\n<hr>\n\n<h2>七、主力资金增仓TOP10个股（周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通、长芯博创、剑桥、长飞），CPO产业链延伸方向是周五全市场唯一获得集中配置的AI相关方向。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市（周五高切低全线回调，科创50-5.04%）。隔夜美股AI全线大涨纳指七连涨创新高，戴尔+35%创历史新高。AI产业热度仍在升温。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026台北电脑展<br>— 英伟达黄仁勋主题演讲（Vera Rubin架构）<br>— 戴尔财报传导效应<br>— 微软Copilot+ PC / 服务器新品</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动，A股AI板块周一有望<strong>高开</strong>。关键看成交量：若高开后量能放大则有望企稳反弹；若缩量则需警惕继续调整。通信线缆方向（亨通光电）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间宽幅震荡。美元走弱提供支撑，沪银夜盘+0.64%。突破80美元需更强催化剂（美联储鸽派信号或地缘升级）。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力资金连续多日大额净流出。若下周一高开但成交量不足，需警惕\"高开低走\"走势。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导效应<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO产业链通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块走向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-0907", "date": "2026-05-30 09:07", "title": "AI板块周末早间复盘 · A股休市 戴尔AI营收爆表 聚焦Computex催化", "tags": ["周末复盘", "戴尔财报", "白银震荡", "Computex", "宇树科技", "高切低"], "summary": "A股休市。周五科技高切低科创50暴跌5%。隔夜戴尔AI营收+757%飙升35%。下周Computex+宇树上会最强催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.25</div><div class=\"lbs\">伦敦银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">99.02</div><div class=\"lbs\">美元指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">休市</div><div class=\"lbs\">A股状态</div></div>\n</div>\n\n<h1>AI板块周末早间复盘 · A股休市 戴尔AI营收爆表 聚焦Computex催化</h1>\n<p><strong>时间：</strong>2026-05-30 09:07（A股周末休市·上周五5/29已收盘）</p>\n\n<div class=\"tagline\">📌 <strong>当前状态：</strong>A股周末休市。上周五（5/29）A股上演\"高切低\"全面切换——科技全线退潮科创50暴跌5.04%，电力/公用事业/通信线缆逆势吸金。但隔夜<strong>美股AI全线大涨</strong>纳指七连涨创新高，<strong>戴尔AI服务器营收161亿美元+757%盘后飙升35%</strong>。下周两大核心催化：<strong>宇树科技IPO上会(6/1) + Computex大会(6/2-6/5)</strong>。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">日内-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">伦敦银现货</div><div class=\"iv\"><strong>约75.25美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力夜盘</div><div class=\"iv\"><strong>18,035元/千克</strong> <span class=\"pill pill-up\">+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪金主力夜盘</div><div class=\"iv\"><strong>—</strong> <span class=\"pill pill-up\">+1.61%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月累计</div><div class=\"iv\">月涨约+2.1%</div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银5月经历剧烈震荡——自5月初70美元启动，七连涨至89美元（5/13高点），因CPI超预期单日暴跌超9%至73美元（5/18低点），当前在<strong>72-80美元区间宽幅震荡</strong>。本周（5/26-5/30）走势波折：周初77.27→周三73.29(-2.84%)→周四强力反弹76.08(+3.81%)→周五回落75.58(-0.43%)。多空双方在75美元一线激烈博弈。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数回落至99附近，对贵金属整体形成底部支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE同比+3.8%创三年新高，抗通胀资产需求上升</li>\n  <li><strong>美伊局势：</strong>特朗普称即将对伊朗战事做出\"最终决定\"，中东地缘不确定性高位</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示COMEX白银投机净多头持仓周减1517手至10,244手</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心对白银工业需求维持高位，中长期基本面偏多</li>\n  <li><strong>机构观点分化：</strong>美银预测银价Q4触及100美元但\"昙花一现\"，瑞银更谨慎下调2026年预测</li>\n</ul>\n<blockquote>💡 白银自1月121美元历史高点已回落约38%，72-80美元区间筑底震荡。短线支撑72美元，压力80美元。波动剧烈注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘回顾（上周五5/29收盘）</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n  <div class=\"info-item\"><div class=\"il\">涨跌比</div><div class=\"iv\">1565涨 / 3867跌</div></div>\n</div>\n\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。主力资金净流出<strong>831.55亿元</strong>。北向资金成交4734亿元（占两市14.26%）。科技板块获利了结和\"高切低\"调仓非常清晰。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。电子行业主力净流出<strong>372亿元</strong>居全行业第一。</p>\n\n<p><strong>但积极信号在外盘：</strong></p>\n<ul>\n  <li>📈 <strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%</li>\n  <li>📈 <strong>戴尔AI服务器营收161亿美元 +757%</strong>，盘后股价飙升35%创历史新高</li>\n  <li>📈 <strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li>📈 高通+6%、ARM+5%再创历史新高、美光+3.5%续创新高</li>\n  <li>📈 全球云厂商2026年资本支出7250亿美元(+77%+)</li>\n</ul>\n\n<p><strong>核心判断：</strong>A股AI调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。下周Computex+戴尔财报传导效应有望带动情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股戴尔+35%最为亮眼</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业净流出372亿居全行业第一。中芯国际主力净流出31.4亿全市场第一。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%、美光+3.5%续创新高。戴尔财报后飙升35%。市场对AI算力的需求定价持续强化。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>是最重磅信号——这是全球AI基建投资加速的最强确认。Cerebras上市+89%。华为星河AI数据中心网络方案发布。四大云厂商2026年资本支出7250亿美元(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>—英伟达黄仁勋主题演讲预计发布Vera Rubin架构细节。发改委\"人工智能+\"全面实施。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎但美股情绪持续升温。戴尔财报传导效应可能带动周一A股AI服务器/算力供应链高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（同比+260%）创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星交付首批12层48GB HBM4E样品。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺持续至2026年后。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强硬，但短期股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势但成交缩量——抛压消化中。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势加速——<strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"拟募资42.02亿元。4月工业机器人出口2.5万台(同比+90%)。特斯拉Optimus Gen-3 Q2量产，首代目标年产能100万台。小鹏2026年完成人形机器人量产。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成板块标志性催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆异军突起</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化——光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO交换机出货目标上调至5万台+。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五5/29 TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御资金大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+防御配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n\n<p><strong>核心发现：</strong>全市场主力净流出<strong>831.55亿元</strong>。电子行业净流出<strong>372.05亿</strong>居全行业第一。电力+公用事业合计净流入约85亿。通信线缆是AI板块唯一逆势吸金方向。AI相关板块合计净流出超<strong>400亿元</strong>，相对热度降至冰点。</p>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，主力资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创新高后今日大幅回调</td></tr>\n  <tr><td><strong>联想集团</strong></td><td>港股</td><td><span class=\"pill pill-up\">+22.46%</span></td><td>财报超预期，AI服务器成核心增长引擎</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五5/29）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。周五科技全面退潮（科创50-5.04%）。但隔夜美股AI全面大涨，戴尔AI营收爆表+35%，AI产业热度不减。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周核心催化</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：宇树科技IPO上会</strong>（人形机器人第一股）<br><strong>周二-周五(6/2-6/5)：Computex 2026</strong> — 英伟达黄仁勋演讲、Vera Rubin架构、微软AMD新品<br><strong>美国非农数据</strong> — 影响美联储降息预期</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">戴尔财报+35%和美股AI上涨背景下，A股AI板块有望<strong>高开</strong>。关键看成交量：若伴随放量则有望企稳反弹；缩量则需谨慎高开低走。通信线缆方向（亨通光电）可能延续强势。关注戴尔产业链传导效应。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">72-80美元区间震荡。沪银夜盘+0.64%。下方支撑72美元，上方压力80美元。关注下周非农数据和美伊局势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金连续多日大幅净流出。若高开缺乏量能配合，警惕\"高开低走\"。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器的传导（周一最需关注）<br><strong>2)</strong> 逢低布局算力/光模块龙头，等待Computex催化<br><strong>3)</strong> 重点跟踪CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1007", "date": "2026-05-30 10:07", "title": "AI板块周末复盘 · 科技高切低 白银75美元震荡 聚焦下周Computex+宇树IPO", "tags": ["周末复盘", "高切低", "白银", "Computex", "宇树IPO", "CPO通信线缆"], "summary": "A股周六休市。周五科技全线回调科创50跌5%。COMEX白银75.58美元。聚焦下周宇树IPO上会和Computex大会两大催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">休市</div><div class=\"lbs\">A股状态</div></div>\n  <div class=\"metric-box\"><div class=\"num\" style=\"color:#f59e0b\">75.58</div><div class=\"lbs\">COMEX白银</div></div>\n  <div class=\"metric-box\"><div class=\"num\" style=\"color:#ef4444\">-0.43%</div><div class=\"lbs\">白银隔夜</div></div>\n  <div class=\"metric-box\"><div class=\"num\">4569.90</div><div class=\"lbs\">COMEX黄金</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 白银震荡 聚焦下周Computex+宇树IPO大催化</h1>\n<p><strong>时间：</strong>2026-05-30 10:07（周六，A股休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>A股周六休市。周五（5/29）科技板块全面退潮、科创50暴跌5.04%后，市场进入周末复盘模式。本周核心事件——下周一（6/1）宇树科技IPO上会 + 下周二至周五（6/2-6/5）Computex 2026大会召开，构成AI板块双重催化窗口。COMEX白银隔夜收跌0.43%报75.58美元，但5月整体月涨2.1%仍属强势。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">隔夜 -0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">周度表现</div><div class=\"iv\"><span class=\"pill pill-down\">周跌 -0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月月线</div><div class=\"iv\"><span class=\"pill pill-up\">月涨 +2.1%</span> ✅</div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4569.90美元</strong> <span class=\"pill pill-up\">隔夜 +0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.01-99.33</strong> <span class=\"pill pill-down\">持续偏弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银T+D</div><div class=\"iv\"><strong>18,284元/千克</strong> 约16.38元/克</div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>白银5月初从70美元下方启动，一路冲高至近90美元（5月13日高点），随后因美国CPI数据超预期大幅回调至73美元，近期在<strong>72-78美元区间宽幅震荡</strong>。5月月线仍收涨+2.1%，整体多头趋势未破。</p>\n<p><strong>驱动因素：</strong></p>\n<ul>\n  <li><strong>美元偏弱持续支撑：</strong>美元指数在99附近徘徊，较前期高点显著回落，为贵金属提供底部支撑</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE同比+3.8%创三年新高，市场对央行降息预期延后，但抗通胀资产需求升温</li>\n  <li><strong>CFTC持仓变化：</strong>截至5月26日当周，COMEX白银投机性净多头减少1517手至10,244手，投机热情有所降温</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心建设对白银的工业需求仍是最核心的中长期叙事</li>\n  <li><strong>瑞银预测：</strong>2026年全球白银供应缺口预计从原估3亿盎司进一步扩大，供需格局偏紧</li>\n</ul>\n<blockquote>💡 白银当前处于<strong>72-80美元宽幅震荡区间</strong>。短线支撑72美元，上方压力80美元整数关口。5月月线收涨+2.1%说明多头趋势未破，但短期波动剧烈（5月单日曾跌超9%），操作上注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（5/29 周五收盘数据）</h2>\n<p>A股（5/29周五）三大指数高开低走全线收跌，<strong>科创50暴跌5.04%</strong>领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n<p>全市场仅1565只上涨，3867只下跌。主力资金净流出831.55亿元。申万一级行业仅12个上涨——食品饮料(+3.02%)、煤炭/公用事业(+2%+)领涨；电子(-4%+)领跌全场。北向资金成交4734亿元（占两市14.26%）。</p>\n<p><strong>资金特征：</strong>两天\"冰火两重天\"——周三（5/27）创业板首超沪指、科技全面爆发 → 周五（5/29）科创50暴跌5%。主力资金系统性从高位科技品种撤离，全面转向电力/公用事业/消费等防御方向。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览（周末复盘）</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>，人工智能指数(BK0800)收跌<strong>3.06%</strong>，成交额5398亿元。科创人工智能指数(950180)跌3.52%。</p>\n<p>然而，回调主要源于<strong>交易层面的获利回吐和\"高切低\"</strong>，而非产业逻辑破坏。隔夜美股纳指六连涨创新高，费城半导体指数+1%，英伟达/微软/亚马逊上涨——全球AI热度持续。A股的调整更多是国内资金博弈的结果。</p>\n<p><strong>周末复盘核心关注：</strong></p>\n<ul>\n  <li>✅ <strong>美股AI持续走强</strong>：纳指六连涨创历史新高，Cerebras上市首日涨89%市值750亿美元</li>\n  <li>✅ <strong>戴尔AI服务器营收爆表</strong>：161亿美元同比+757%，全年预期上调至600亿美元</li>\n  <li>✅ <strong>联想集团港股暴涨22.46%</strong>：业绩超预期，AI服务器成核心增长引擎</li>\n  <li>⚠️ <strong>A股内资分歧</strong>：主力资金持续大额净流出，\"高切低\"仍在进行中</li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">高位调整</span> <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>周五电子行业主力净流出<strong>372亿元</strong>居全行业第一。中芯国际主力净流出31.4亿居全市场首位。算力ETF全线收跌，创业板人工智能ETF华安(159279)跌2.02%。但需注意这是连续大涨后的获利回吐。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>6/2-6/5 Computex 2026</strong>大会即将召开，以\"AI Together\"为主题，英伟达、AMD、英特尔等全球AI算力巨头将集中发布最新AI芯片方案。这是全球AI供应链最高规格对接平台，有望对板块形成直接催化。工信部五部门发布\"百场万企\"通知聚焦AI机器人/服务器终端。</p>\n<p class=\"sn\"><strong>基本面：</strong>产业面持续向好——Cerebras（晶圆级AI芯片）在美上市首日大涨89%市值达750亿美元。戴尔2027财年Q1 AI优化服务器营收161亿美元同比+757%，上调全年预期至600亿美元。联想集团港股涨22.46%。四大云厂商2026年资本支出合计约7250亿美元(+77%+)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期资金从科技股撤退明显，但美股纳指持续创新高表明AI全球热度未减。A股调整更多是<strong>内部筹码问题</strong>。下周Computex大会有望成为情绪修复的催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">情绪 中性偏谨慎</span></div>\n<p class=\"sn\"><strong>资金面：</strong>周五存储跟随半导体回调。北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但整体方向偏流出。佰维存储盘中逆势上涨0.94%成为存储中少数红盘股。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>HBM景气度历史级别！</strong> HBM3E现货价半年暴涨超300%。全球DRAM营收2026Q1逼近970亿美元（同比+260%），创历史新高。三星率先交付首批12层48GB HBM4E样品。摩根大通指出存储行业迎来多年超级上行周期，2027年总收入将达6160亿美元。HBM供给紧张预计延续至2027年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲，但股价已充分反映了涨价预期。HBM仍是AI产业链中<strong>供需格局最紧张</strong>的环节之一，中长期逻辑不变。短期调整是获利资金兑现。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">关注下周催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>周五板块跟随大市回调，天永智能、奥比中光等前期强势股调整明显。但<strong>下周最大催化剂来临。</strong></p>\n<p class=\"sn\"><strong>基本面：</strong><strong>宇树科技科创板IPO将于6月1日（周一）上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元，估值预计超200亿元。海关总署数据显示4月工业机器人出口量突破2.5万台（同比+90%）。2026年是人形机器人规模化验证关键期，特斯拉Optimus Gen-3 Q2启动量产。</p>\n<p class=\"sn\"><strong>情绪面：</strong>当前调整属于<strong>等待催化剂真空期</strong>的正常行情。若宇树顺利过会，将成为机器人板块重大催化，带动整个产业链情绪修复。板块整体处于\"业绩尚未兑现但趋势确定\"阶段。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化明显。光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿元</strong>居全市场第一，剑桥科技+11.73亿、长飞光纤+10.39亿。通信设备板块净流入13.13亿元。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年机构定义为<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产，鸿海CPO全光交换机提前出货给英伟达，出货目标从此前1万台上调至2026-2027年超过5万台。鸿海预计2026年CPO交换机出货数千台，2027年达数万台。LightCounting预测2030年CPO市场规模达100亿美元。LightCounting最新报告显示2025年400G及以上高速光模块出货超6000万只，2026年接近1亿只。</p>\n<p class=\"sn\"><strong>情绪面：</strong>CPO产业处于\"从0到1\"的认知扩散阶段，英伟达+鸿海的量产时间表提供了确定性指引。资金正在寻找CPO产业链的<strong>\"新面孔\"</strong>——通信线缆方向获得集中配置。但斌转发CPO视频进一步催化产业关注度。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（5/29周五数据）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿元)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>资金从科技向防御方向大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸，亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>电力(细分)</td><td><span class=\"green\">+18.43</span></td><td>防御+夏季需求旺季</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链延伸</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力资金净流出<strong>831.55亿元</strong>，连续多日大额净流出</li>\n  <li><strong>电子行业</strong>主力净流出<strong>372.05亿元</strong>居全行业第一，是今日最大失血板块</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿元，资金全面转向防御方向</li>\n  <li>通信线缆（亨通光电39.76亿全市场第一）是AI板块中<strong>唯一逆势吸金方向</strong></li>\n  <li><strong>AI板块相对热度：极低</strong>——电子+计算机+通信合计净流出超400亿元<br>AI板块在全市场中处于<strong>资金流出最严重的尾部</strong>，但这也意味着<strong>下周催化事件若兑现，修复空间充足</strong></li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸受益。英伟达+鸿海CPO量产时间表确定性提升，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐。周三创历史新高后周五大幅回调。产能满载但高位筹码松动明显。调整是买入机会还是趋势拐点需观察</td></tr>\n  <tr><td><strong>戴尔/联想集团</strong></td><td>海外/HK</td><td><span class=\"pill pill-up\">财报全面超预期</span></td><td>戴尔AI服务器营收161亿美元同比+757%；联想港股暴涨22.46%。全球AI服务器需求持续井喷，验证AI基建投资高景气</td></tr>\n</table>\n\n<hr>\n\n<h2>六、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">周六A股休市。周五科技全面退潮（科创50-5.04%），主力资金持续净流出，市场处于<strong>\"高切低\"消化期</strong>。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🔥 下周最大催化</div><div class=\"iv\" style=\"font-size:14px\"><strong>1) 6/1（周一）宇树科技IPO上会</strong>——冲刺\"人形机器人第一股\"<br><strong>2) 6/2-6/5 Computex 2026</strong>——英伟达/AMD/英特尔发布最新AI芯片方案<br>这两个催化窗口有望直接修复AI板块情绪</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 美股指引</div><div class=\"iv\" style=\"font-size:14px\">隔夜美股三大指数<strong>齐创新高</strong>（纳指六连涨）。费城半导体+1%，英伟达/微软/亚马逊上涨。AI全球热度持续，A股调整更多是<strong>内部资金博弈</strong>，非产业逻辑破坏。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银75.58美元（隔夜-0.43%），5月月线+2.1%整体强势。72-80美元宽幅震荡区间，短线关注72美元支撑。下周关注美国非农数据对降息预期的影响。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">主力资金持续多日大额净流出，若下周Computex大会和宇树IPO催化效果不及预期，AI板块调整时间可能延长。仓位管理是第一要务。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\">周末适合做功课——下周两个重大催化窗口。<strong>逢低关注</strong>算力（中际旭创/中科曙光）、CPO通信线缆（亨通光电/剑桥科技）、机器人（宇树产业链/三花智控）。<strong>逢高减仓</strong>短期炒作过高的泛科技品种。仓位控制在6-7成。</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1107", "date": "2026-05-30 11:07", "title": "AI板块周末复盘 · A股休市 白银75美元 聚焦Computex+宇树最强催化", "tags": ["周末复盘", "白银震荡", "戴尔财报", "Computex", "宇树科技", "高切低", "CPO通信线缆"], "summary": "A股休市。上周五科技全面回调科创50暴跌5%。戴尔AI服务器营收+757%盘后飙35%。下周Computex+宇树IPO双催化。白银75美元区间震荡。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">休市中</div><div class=\"lbs\">A股状态</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%</div><div class=\"lbs\">戴尔盘后</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 白银75美元区间震荡 聚焦下周双催化</h1>\n<p><strong>时间：</strong>2026-05-30 11:07（A股今日休市·周六）</p>\n\n<div class=\"tagline\">📌 <strong>当前状态：</strong>A股处于周末休市。上周五（5/29）上演\"高切低\"全面切换——科技全线退潮，科创50暴跌5.04%，电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨再创新高，<strong>戴尔财报AI服务器营收+757%盘后飙35%创历史新高</strong>，AI产业基本面强劲不改。下周<strong>六重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔美股传导效应</strong>，AI板块有望迎来情绪修复窗口。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-mid\">近期75-78区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月涨跌幅</div><div class=\"iv\"><span class=\"pill pill-up\">月涨+2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">本周涨跌幅</div><div class=\"iv\"><span class=\"pill pill-down\">周跌-0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>约75.25 美元/盎司</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4,569.90 美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\">10,244手 <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银期货本周走势剧烈震荡——周初77.27美元，5月28日下探73.29美元（-2.84%），5月29日强力反弹至76.08美元（+3.81%），最终收于75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>。5月累计上涨约2.1%，但远低于1月121美元的历史高点（已回落约38%）。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元指数持续走弱：</strong>美元指数回落至99.02附近，对贵金属构成底部支撑</li>\n  <li><strong>美伊局势不确定性：</strong>特朗普称即将就伊朗战事做出\"最终决定\"，霍尔木兹海峡问题持续扰动市场</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求升温</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据显示白银投机净多头减少至10,244手，短线看涨情绪有所降温</li>\n  <li><strong>工业需求：</strong>光伏+AI数据中心建设对白银工业需求维持高位，中长期基本面偏多</li>\n</ul>\n<blockquote>💡 白银自1月121美元历史高点回撤约38%，当前在72-80美元区间筑底震荡。短线支撑72美元（前低），上方压力80美元整数关口。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（上周五5/29收盘回顾）</h2>\n<p>上周五A股高开低走全线收跌，呈鲜明\"沪强深弱\"：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n<p>全市场仅<strong>1565只上涨</strong>，3867只下跌。主力资金净流出<strong>831.55亿元</strong>，连续多日净流出。北向资金成交4734亿元（占两市14.26%）。</p>\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。科技板块全面获利回吐，\"高切低\"调仓清晰。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块全面回调，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。但产业基本面未变——调整是<strong>交易层面的筹码消化</strong>。</p>\n\n<p><strong>美股AI积极信号：</strong></p>\n<ul>\n  <li><strong>纳指七连涨创新高</strong>，费城半导体指数+1%，AI交易热潮仍在升温</li>\n  <li><strong>戴尔AI服务器营收161亿美元 +757%</strong>，盘后股价飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创历史新高、美光+3.5%续创新高</li>\n  <li>海外云厂商AI资本开支全面上修，四大云厂商2026年合计7250亿美元（+77%）</li>\n</ul>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔财报最强催化</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿居全市场第一。算力ETF全线下跌，科创人工智能ETF华夏(589010)跌1.63%。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>高通+6%、ARM+5%创新高、博通+3.2%、英伟达+1.5%、美光+3.5%续创新高。市场对AI算力需求定价仍在强化。</p>\n<p class=\"sn\"><strong>基本面（核心催化）：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年预期至600亿美元——这是全球AI基建投资加速的最强信号。Cerebras上市+89%。华为推出星河AI数据中心（NPU与存储直通，带宽提升8倍）。四大云厂商资本支出7250亿美元（+77%）。</p>\n<p class=\"sn\"><strong>政策面：</strong>下周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布关键AI方案。发改委明确\"指导国产大模型加快适配国产算力芯片\"，国产算力自主可控获政策背书。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期情绪谨慎，但美股情绪持续升温。关注戴尔财报向周一A股的传导效应，AI服务器/算力供应链有望高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">供需格局最紧张环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（同比+260%），创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺延续至2026年后。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲，但股价已充分反映涨价预期。中长期来看，HBM是AI产业链确定性最高的环节之一。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">6/1宇树上会最强催化</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续净流出态势，上周三机器人板块已净流出143亿元。但成交缩量——抛压在消化中。</p>\n<p class=\"sn\"><strong>基本面（密集催化）：</strong><strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。小鹏宣布2026年完成人形机器人量产，新一代IRON三季度亮相。4月工业机器人出口量突破2.5万台（同比+90%）。特斯拉Optimus Gen-3已下线投入内部测试，Q2启动量产首代目标100万台/年。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树科技上会结果。如果顺利过会将成板块标志性催化剂，带动情绪企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆异军突起</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化——光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿、中天科技净流入9.35亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达明确Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电将光子互连列为最重要架构层级，已启动全球首款200Gbps微环调制器量产。Lumentum光通信组件产能已售罄至2028年。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获得集中配置。但斌转发CPO视频引发业界关注。光模块龙头短期调整属获利回吐，产业逻辑不变。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（上周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸（新方向）</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>（全行业第一）——AI科技全面失血</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势净流入方向——亨通光电全市场主力净流入第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至近期冰点</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元同比+757%，上修全年AI预期至600亿美元。全球最强AI硬件业绩验证。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股(600487)</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场排名第一</span></td><td>通信线缆龙头，CPO/算力互联概念新方向，获集中资金追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股(688981)</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创历史新高后今日大幅回调</td></tr>\n</table>\n\n<hr>\n\n<h2>六、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2启动正式量产，首代目标年产能100万台。A股核心受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>收益逻辑</th><th>优先级</th><th>估值水位</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人关节</td><td>⭐⭐</td><td><span class=\"pill pill-up\">偏低</span></td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td><td><span class=\"pill pill-mid\">中位</span></td></tr>\n</table>\n<p><strong>最新催化：</strong>宇树科技6月1日IPO上会 + 小鹏年底量产 + 特斯拉Optimus Q2量产。2026年是<strong>人形机器人从0到1的量产兑现阶段</strong>。板块适合<strong>逢低布局</strong>，核心以三花+绿的为主。</p>\n\n<hr>\n\n<h2>七、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。上周五高切低全线回调（科创50-5.04%）。但隔夜美股AI全线大涨纳指七连涨创新高，AI产业热度持续升温。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026<br>— 英伟达黄仁勋主题演讲<br>— 可能发布Vera Rubin架构新细节<br>— 戴尔AI服务器财报向A股传导</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面上涨带动，A股AI板块周一有望<strong>高开</strong>。关键看成交量：若量能放大则有望企稳反弹；若缩量则需警惕\"高开低走\"。通信线缆方向（亨通光电）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供支撑。上方突破80美元需美联储鸽派信号或地缘升级催化。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力资金连续多日大额净流出，若周一高开但成交量不足，需警惕\"高开低走\"。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导效应<br><strong>2)</strong> Computex窗口逢低布局算力/光模块龙头<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260530-1207", "date": "2026-05-30 12:07", "title": "AI板块周末复盘 · A股休市 白银75美元震荡 聚焦Computex+宇树IPO超级催化周", "tags": ["周末复盘", "白银震荡", "戴尔财报+35%", "Computex", "宇树科技", "高切低", "CPO通信线缆"], "summary": "A股休市中。周五科技高切低科创50暴跌5%。隔夜美股AI全线大涨纳指新高，戴尔AI服务器营收+757%飙升35%，Computex+宇树上会下周最强催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">3.32万亿</div><div class=\"lbs\">周五成交</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">周五科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+35%↑</div><div class=\"lbs\">戴尔飙升</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 白银75美元震荡 聚焦Computex+宇树IPO超级催化周</h1>\n<p><strong>时间：</strong>2026-05-30 12:07（A股上周五已收盘，周末休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>A股周末休市中（上周五5/29已收盘）。上周五上演剧烈\\\"高切低\\\"——科技全面退潮，科创50暴跌5.04%，电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔AI服务器营收+757%盘后飙升35%</strong>。下周<strong>三重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔美股传导效应</strong>，有望提振AI板块情绪修复。产业基本面强势未改，上周五调整是<strong>交易面筹码消化</strong>而非产业逻辑破坏。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">上周五-0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银(London)</div><div class=\"iv\"><strong>75.25美元/盎司</strong> <span class=\"pill pill-mid\">周线-0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力(国内)</div><div class=\"iv\"><strong>18,284元/千克</strong> <span class=\"pill pill-mid\">5月+2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金期货</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.93-99.33</strong> <span class=\"pill pill-down\">近期走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势：</strong>白银经历了剧烈波动——年初冲高至121美元历史高点后最大回撤约38%。5月初从70美元启动七连涨至89美元（5月13日），随后因CPI超预期单日暴跌超9%至73美元。本周（5/25-5/29）COMEX白银收75.58美元，周跌0.81%，但5月整体仍录得+2.1%月涨幅。整体处于<strong>72-80美元宽幅震荡</strong>，多空双方在75美元一线激烈博弈。白银5月走势与黄金分化（黄金5月-2.03%），白银表现相对强势。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数报98.93创近期新低，对贵金属整体形成底部支撑。未来若跌破98.5关口，白银有望获得更强提振</li>\n  <li><strong>美伊局势不确定性：</strong>特朗普称即将对伊朗战事做出\\\"最终决定\\\"，霍尔木兹海峡局势紧张，避险情绪支撑贵金属</li>\n  <li><strong>通胀粘性：</strong>美国4月PCE物价同比+3.8%创三年新高，抗通胀资产需求上升。白银作为兼具工业+金融属性的资产受到关注</li>\n  <li><strong>投机情绪降温：</strong>CFTC白银净多头10,
