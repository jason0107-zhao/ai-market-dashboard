rong>70% 的时间估值高于当前</strong>。从历史统计角度看具有明显安全边际。</p>\n\n<hr>\n\n<h2>三、驱动因素</h2>\n<ul>\n  <li><strong>市场周期：</strong>券商估值与日均成交额高度正相关。2024 日均<8000 亿 vs 2025 日均>1.2 万亿</li>\n  <li><strong>行业政策：</strong>\"降费让利\"冲击边际递减；注册制改革深化利好投行</li>\n  <li><strong>自营收益：</strong>权益市场修复是 PE 回升核心推动力</li>\n</ul>\n\n<hr>\n\n<h2>四、估值展望</h2>\n<p>当前已反映大部分不确定性，下行风险有限。若市场活跃度维持，PE 有望向均值 <strong>21.93 倍</strong> 修复，对应约 <strong>31% 上行空间</strong>。</p>\n<p><strong>操作参考：</strong>PE 进入 <strong>15 倍以下</strong> 逐步布局；PE 接近或突破 <strong>22 倍</strong> 时分批兑现。</p>\n\n<blockquote>⚠️ 以上分析仅基于公开数据和历史统计，不构成投资建议。PE 为滞后指标。</blockquote>"}, {"id": "hbm-chain", "title": "国产HBM产业链全景解析", "icon": "🔬", "tags": ["HBM", "长鑫存储", "长电科技", "安集科技"], "desc": "全面梳理国产HBM产业链现状、核心玩家与挑战，从DRAM到先进封装逐环节拆解", "html": "<h1>国产 HBM 产业链全景解析</h1>\n<p><strong>日期：</strong>2026-05-28</p>\n\n<div class=\"tagline\">国产 HBM 产业链目前处于 <strong>\"从 0 到 1，点状突破\"</strong> 的初级阶段。与国际顶尖水平（SK 海力士 HBM3E）存在 2~3 代差距，但代差已从 8 年缩至 4 年。</div>\n\n<h2>一、HBM 存储颗粒</h2>\n<table>\n  <tr><th>公司</th><th>上市</th><th>最新进展</th></tr>\n  <tr><td><strong>长鑫存储 (CXMT)</strong></td><td><span class=\"pill pill-mid\">未上市</span></td><td>HBM2 已于 2025H1 量产，HBM3 样品交付客户，目标 2027 年 HBM3E</td></tr>\n  <tr><td>武汉新芯 (XMC)</td><td><span class=\"pill pill-mid\">未上市</span></td><td>HBM2 开发中，月产能 3000 片 12 英寸工厂</td></tr>\n</table>\n<p>从成熟 DDR5 转向高性能 HBM DRAM，技术跨度大，长鑫的 HBM3 量产验证是关键一战。</p>\n\n<h2>二、先进封装</h2>\n<table>\n  <tr><th>公司</th><th>代码</th><th>技术布局</th><th>推荐</th></tr>\n  <tr><td><strong>长电科技</strong></td><td>600584</td><td>XDFOI 对标 CoWoS，2.5D/3D 封装最强竞争者</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>通富微电</strong></td><td>002156</td><td>绑定 AMD，已与长鑫合作 HBM2 样品</td><td>⭐⭐</td></tr>\n  <tr><td>华天科技</td><td>002185</td><td>TSV/3D 封装布局中</td><td>⭐</td></tr>\n</table>\n\n<h2>三、关键设备</h2>\n<ul>\n  <li><strong>TSV 刻蚀：</strong>北方华创 (002371) / 中微公司 (688012) ✅ 可国产化</li>\n  <li><strong>CMP 设备：</strong>华海清科 (688120) ✅ 国内龙头</li>\n  <li><strong>封装光刻：</strong>上海微电子——已量产出货</li>\n  <li><strong>键合设备：</strong>新益昌追赶中——<strong>最大短板之一</strong></li>\n</ul>\n\n<h2>四、关键材料</h2>\n<table>\n  <tr><th>环节</th><th>公司</th><th>代码</th><th>备注</th></tr>\n  <tr><td><strong>CMP 抛光液</strong></td><td>安集科技</td><td>688019</td><td>⭐⭐⭐ 龙头</td></tr>\n  <tr><td>光刻胶</td><td>南大光电</td><td>300346</td><td>ArF 光刻胶国产化</td></tr>\n  <tr><td>光刻胶</td><td>上海新阳</td><td>300236</td><td>KrF/ArF 光刻胶</td></tr>\n  <tr><td>电子特气</td><td>华特气体</td><td>688268</td><td>高纯气体供应商</td></tr>\n</table>\n\n<h2>五、链主：华为海思</h2>\n<p>华为定义需求 → 长鑫提 DRAM 规格 → 长电/通富开发封装 → 联合设备材料厂攻关 → 昇腾芯片落地验证。华为是整个链条的 <strong>火车头</strong>。</p>\n\n<h2>六、时间线</h2>\n<table>\n  <tr><th>时间</th><th>目标</th><th>意义</th></tr>\n  <tr><td><span class=\"pill pill-up\">2025H1 ✅</span></td><td>HBM2 量产</td><td>比预期提早约 2 年，突破意义重大</td></tr>\n  <tr><td><span class=\"pill pill-mid\">2025H2 🔄</span></td><td>HBM3 量产验证</td><td>与主流代差从 8 年缩至 4 年</td></tr>\n  <tr><td><span class=\"pill pill-mid\">2027E 🎯</span></td><td>HBM3E 量产</td><td>跳过 HBM2E 直接上 3E，追赶策略清晰</td></tr>\n</table>\n\n<blockquote>⚠️ 以上分析基于公开信息整理，不构成投资建议。</blockquote>"}, {"id": "semi-rpt", "title": "半导体投资分析：安集科技 · 源杰科技精选", "icon": "💎", "tags": ["半导体", "安集科技", "源杰科技", "CMP"], "desc": "基于野村亚太科技团队研报，梳理AI倒逼半导体工艺重构逻辑，精选筹码优良标的", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">+33%</div><div class=\"lbs\">安集 Q1 营收</div></div>\n  <div class=\"metric-box\"><div class=\"num\">+321%</div><div class=\"lbs\">源杰 Q1 营收</div></div>\n  <div class=\"metric-box\"><div class=\"num\">77.8%</div><div class=\"lbs\">源杰毛利率</div></div>\n  <div class=\"metric-box\"><div class=\"num\">65.5%</div><div class=\"lbs\">安集机构持有</div></div>\n</div>\n\n<h1>半导体投资分析报告</h1>\n<p><strong>来源：</strong>野村证券亚太科技团队 · Donnie Teng<br><strong>日期：</strong>2026-05-27</p>\n\n<div class=\"tagline\">半导体行业增长逻辑已从\"晶体管密度提升\"转向 <strong>\"3D 晶体管 + 背面供电 + 新材料组合创新\"</strong>。AI 倒逼芯片制造底层工艺重写。</div>\n\n<h2>一、全产业链时间线</h2>\n<table>\n  <tr><th>时间</th><th>关键事件</th><th>投资方向</th></tr>\n  <tr><td><strong>2026 年</strong></td><td>GAA 晶体管、SoIC 混合键合、InP 衬底小批量</td><td>先进封装、化合物半导体</td></ let monFilter = 'all';

function showTab(name, evt) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById('page-' + name).classList.add('show');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

}

function filterMon(f, evt) {
  monFilter = f;
  document.querySelectorAll('#monFilter button').forEach(b => b.classList.remove('active'));
  evt.target.classList.add('active');
  renderMonitors();
}

function renderMonitors() {
  const list = monitors.filter(m => {
    if (monFilter === 'all') return true;
    return m.date.startsWith(monFilter);
  });
  const el = document.getElementById('monList');
  if (!el) return;
  el.innerHTML = list.length === 0
    ? '<div style="text-align:center;padding:40px;color:#64748b">\u{1f4ed} \u6682\u65e0\u76d1\u63a7\u6570\u636e</div>'
    : list.map(m =>
      '<div class="article" onclick="openMonitor(\'' + m.id + '\')">' +
        '<div class="meta"><span class="t mon">\u{1f4e1} \u76d1\u6d4b\u62a5\u544a</span><span>' + m.date + '</span></div>' +
        '<h3>' + m.title + '</h3>' +
        '<p>' + m.summary + '</p>' +
        '<div class="tags">' + m.tags.map(t => '<span>' + t + '</span>').join('') + '</div>' +
      '</div>'
    ).join('');
}

function openMonitor(id) {

(function() {
  if (!monitors || monitors.length===0) return;
  const l=monitors[monitors.length-1];
  const h=l.html;

  // extract info-grid items
  const infoItems={};
  const re=/<div class="il">(.*?)<\/div>\s*<div class="iv">(.*?)<\/div>/gs;
  let m; while((m=re.exec(h))) infoItems[m[1].trim()]=m[2].trim();

  // Market indices
  const idxMap={sh:'上证指数',sz:'深证成指',cy:'创业板指',kc:'科创50'};
  Object.entries(idxMap).forEach(([k,v])=>{
    if(infoItems[v]){
      const raw=infoItems[v];
      const price=(raw.match(/[\d.]+/)||['--'])[0];
      const chg=(raw.match(/[+-]\d+\.?\d*%/)||['--'])[0];
      document.getElementById('v_'+k).textContent=price;
      if(chg!=='--'){
        const up=chg.startsWith('+');
        document.getElementById('sub_'+k).className='sub '+(up?'green':'red');
        document.getElementById('sub_'+k).textContent=chg;
      }
    }
  });

  // Tags -> tagCloud
  const tags=l.tags||[];
  const tagColors=['#3b82f6','#a855f7','#ec4899','#06b6d4','#f59e0b','#22c55e'];
  document.getElementById('tagCloud').innerHTML=tags.slice(0,8).map((t,i)=>
    '<span style="background:'+tagColors[i%6]+'18;color:'+tagColors[i%6]+'">#'+t+'</span>'
  ).join('');

  // Parse net inflow table
  const tables=[...h.matchAll(/<table>(.*?)<\/table>/gs)].map(m=>m[1]);
  let funds=[];
  tables.forEach(tbl=>{
    if(/净流入/.test(tbl)&&(/板块/.test(tbl)||/驱动/.test(tbl))){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=3){
          const name=cells[1].replace(/<[^>]+>/g,'').trim();
          const fv=parseFloat(cells[2].replace(/<[^>]+>/g,'').replace(/[+亿]/g,''));
          if(!isNaN(fv)) funds.push({n:name,v:fv,c:'#3b82f6'});
        }
      }
    }
  });
  if(funds.length===0) funds=tags.slice(0,5).map((t,i)=>({n:t,v:(5-i)*2,c:'#3b82f6'}));
  funds=funds.slice(0,5);
  const maxV=Math.max(...funds.map(f=>f.v));
  document.getElementById('fundList').innerHTML=funds.map(f=>
    '<div class=fund-row><span class=n>'+f.n+'</span><div class=b style="background:'+f.c+'22"><div style="width:'+(f.v/maxV*100)+'%;background:'+f.c+'">'+f.v.toFixed(1)+'亿</div></div></div>'
  ).join('');

  // Parse highlights
  let highlights=[];
  tables.forEach(tbl=>{
    if(/异动/.test(tbl)&&(/个股/.test(tbl)||/逻辑/.test(tbl))){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length&&highlights.length<5;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=2){
          const stock=cells[0].replace(/<[^>]+>/g,'').trim();
          const action=cells.length>=4?cells[cells.length-2].replace(/<[^>]+>/g,'').trim():'';
          highlights.push('• <strong>'+stock+'</strong> — '+action);
        }
      }
    }
  });
  if(highlights.length===0){
    const s=l.summary||'';
    highlights=s.split(/[。.]/).filter(x=>x.trim()).slice(0,3).map(x=>'• '+x.trim()+'。');
  }
  document.getElementById('highlightList').innerHTML=highlights.join('<br>');

  // Parse watchlist
  let wl=[];
  tables.forEach(tbl=>{
    if(/名称/.test(tbl)&&/代码/.test(tbl)&&/现价/.test(tbl)){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=4){
          const name=cells[0].replace(/<[^>]+>/g,'').trim();
          const code=cells[1].replace(/<[^>]+>/g,'').trim();
          const price=cells[2].replace(/<[^>]+>/g,'').trim();
          const chg=cells[3].replace(/<[^>]+>/g,'').trim();
          let ch=null;
          try{ch=parseFloat(chg.replace(/[+%]/g,''));}catch(e){}
          wl.push({n:name,c:code,p:price,ch:ch});
        }
      }
    }
  });
  if(wl.length>0){
    document.getElementById('wlBody').innerHTML=wl.map(s=>{
      if(s.ch!==null&&!isNaN(s.ch)){
        const cls=s.ch>=0?'green':'red';
        const sign=s.ch>=0?'+':'';
        return '<tr><td><strong>'+s.n+'</strong></td><td><span class=code>'+s.c+'</span></td><td>&yen;'+s.p+'</td><td class="'+cls+'">'+sign+s.ch.toFixed(2)+'%</td></tr>';
      }
      return '<tr style="color:#94a3b8;font-size:11px"><td>'+s.n+'</td><td><span class=code>'+s.c+'</span></td><td>--</td><td>--</td></tr>';
    }).join('');
  }

  // Market comment
  document.getElementById('marketComment').innerHTML='<p>'+(l.summary||'暂无数据')+'</p>';
})()

function renderPortfolio() {
  if (!pflData || !pflData.stocks) return;
  const s = pflData.stocks;
  
  // Summary bar
  const rtCount = {B:0,H:0,S:0};
  const upCount = s.filter(x => x.ch >= 0).length;
  s.forEach(x => rtCount[x.rt] = (rtCount[x.rt]||0)+1);
  document.getElementById('pflBar').innerHTML = `
    <div class="ov-card"><div class=lbl>持仓总数</div><div class=val>${s.length}</div><div class=chg style="color:var(--text2)">A股8·港股1·ETF5</div></div>
    <div class="ov-card"><div class=lbl>建议评级</div><div class=val style="font-size:18px"><span style="color:#22c55e">${rtCount.B||0}增</span> · <span style="color:#f59e0b">${rtCount.H||0}观</span> · <span style="color:#ef4444">${rtCount.S||0}减</span></div><div class=chg style="color:var(--text2)">增持&gt;观望&gt;减持</div></div>
    <div class="ov-card"><div class=lbl>今日上涨${upCount}只</div><div class=val style="font-size:16px;font-weight:600">${upCount}/${s.length}</div><div class=chg style="color:var(--text2)">上涨占比 ${Math.round(upCount/s.length*100)}%</div></div>
    <div class="ov-card"><div class=lbl>今日最强</div><div class=val style="font-size:15px;font-weight:600">${s.sort((a,b)=>b.ch-a.ch)[0].n}</div><div class="chg profit">${s.sort((a,b)=>b.ch-a.ch)[0].ch>0?'+':''}${s.sort((a,b)=>b.ch-a.ch)[0].ch}%</div></div>
    <div class="ov-card"><div class=lbl>今日最弱</div><div class=val style="font-size:15px;font-weight:600">${s.sort((a,b)=>a.ch-b.ch)[0].n}</div><div class="chg loss">${s.sort((a,b)=>a.ch-b.ch)[0].ch>0?'+':''}${s.sort((a,b)=>a.ch-b.ch)[0].ch}%</div></div>
  `;
  
  document.getElementById('pflTime').textContent = '更新于 ' + (pflData.time || '2026-05-29 21:45 CST');
  
  // Market flow grid
  document.getElementById('pflMF').innerHTML = `
    <div class="card"><div class=lbl style=margin-bottom:8px>🏦 银行/金融 3只</div><div style="font-size:12px;line-height:1.8">中信 +5.05% <span class="profit">↑</span><br>招商 +2.40% <span class="profit">↑</span><br>农业 +1.77% <span class="profit">↑</span><br><span style="color:var(--text3)">全线强势，防御品种</span></div></div>
    <div class="card"><div class=lbl style=margin-bottom:8px>🤖 科技/AI 5只</div><div style="font-size:12px;line-height:1.8">阿里巴巴 -0.74% <span class="loss">↓</span><br>科创半导体-6.06% <span class="loss">↓↓</span><br>中韩半导体 -1.50% <span class="loss">↓</span><br>人工智能ETF -3.80% <span class="loss">↓</span><br>蓝色光标 +3.34% <span class="profit">↑</span></div></div>
    <div class="card"><div class=lbl style=margin-bottom:8px>🥇 资源/周期 4只</div><div style="font-size:12px;line-height:1.8">黄金ETF +2.89% <span class="profit">↑</span><br>湖南白银 -2.69% <span class="loss">↓</span><br>江西铜业 +0.07% <span class="profit">↑</span><br>上纬新材 -3.15% <span class="loss">↓</span><br>上海电力 +0.94% <span class="profit">↑</span></div></div>
  `;
  
  // Stock cards
  const g = document.getElementById('pflGrid');
  g.innerHTML = s.map(st => {
    const rt = st.rt;
    const rc = rt === 'B' ? 'pfl-rtg-B' : rt === 'H' ? 'pfl-rtg-H' : 'pfl-rtg-S';
    const rtLabels = {B:'增持',H:'观望',S:'减持'};
    const cc = rt === 'B' ? '#22c55e' : rt === 'H' ? '#f59e0b' : '#ef4444';
    const mkCl = st.md.s.includes('多头') ? 'ts-b' : 'ts-r';
    const rsCl = st.rs.includes('超卖') || st.rs.includes('偏强') ? 'ts-b' : st.rs.includes('偏弱') ? 'ts-r' : 'ts-n';
    const mn = Math.min(...st.kl), mx = Math.max(...st.kl), rg = mx - mn || 1;
    const w = 200, hh = 30;
    const pts = st.kl.map((v,i) => `${(i/(st.kl.length-1))*w},${hh-((v-mn)/rg)*hh}`).join(' ');
    const svg = `<svg viewBox="0 0 ${w} ${hh}"><defs><linearGradient id="g-${st.c.replace(/[.#]/g,'')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cc}" stop-opacity="0.2"/><stop offset="100%" stop-color="${cc}" stop-opacity="0.01"/></linearGradient></defs><path d="M${pts}" fill="none" stroke="${cc}" stroke-width="1.3" stroke-linecap="round"/><path d="M0,${hh} L${pts} L${pts.split(' ').pop().split(',')[0]},${hh}Z" fill="url(#g-${st.c.replace(/[.#]/g,'')})" opacity="0.25"/></svg>`;
    return `
      <div class="pfl-card">
        <span class="pfl-rtg ${rc}">${rtLabels[rt]}</span>
        <div class="pfl-hd">
          <span class="pfl-exg ${st.ec}">${st.e}</span>
          <div class="pfl-sn"><h2>${st.n}</h2><span class="cd">${st.c}</span></div>
        </div>
        <div class="pfl-pr"><span class="p">${st.cur}${st.pr.toFixed(2)}</span><span class="cp ${st.ch>=0?'profit':'loss'}">${st.ch>0?'+':''}${st.ch}%</span></div>
        <div class="pfl-pl ${st.ch>=0?'pb':'lb'}">${st.ch>=0?'📈 今日上涨':'📉 今日下跌'}</div>
        <div class="pfl-tech">
          <div class="pfl-tb"><div class="tl">MACD</div><div class="tv">${st.md.v.toFixed(2)}</div><div class="ts ${mkCl}">${st.md.s}</div></div>
          <div class="pfl-tb"><div class="tl">KDJ</div><div class="tv" style="font-size:10px">${st.kd}</div></div>
          <div class="pfl-tb"><div class="tl">RSI6</div><div class="tv">${st.r6.toFixed(1)}</div><div class="ts ${rsCl}">${st.rs}</div></div>
        </div>
        <div class="pfl-chart">${svg}</div>
        <div class="pfl-mf">
          <div class="pfl-mfi"><div class="ml">主力</div><div class="mv ${st.mf[0]>=0?'profit':'loss'}">${st.mf[0]>=0?'+':''}${st.mf[0].toFixed(2)}</div></div>
          <div class="pfl-mfi"><div class="ml">超大单</div><div class="mv ${st.mf[1]>=0?'profit':'loss'}">${st.mf[1].toFixed(2)}</div></div>
          <div class="pfl-mfi"><div class="ml">大单</div><div class="mv ${st.mf[2]>=0?'profit':'loss'}">${st.mf[2].toFixed(2)}</div></div>
          <div class="pfl-mfi"><div class="ml">中小单</div><div class="mv ${st.mf[3]>=0?'profit':'loss'}">${st.mf[3].toFixed(2)}</div></div>
        </div>
        <div class="pfl-tag">${st.tg.map(t => `<span class="pfl-ct">${t}</span>`).join('')}</div>
      </div>`;
  }).join('');
}
