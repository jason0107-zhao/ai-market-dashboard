l>\n  <li>⭐ <strong>纳指七连涨创新高</strong>（+0.91%），费城半导体+1%也创新高</li>\n  <li>⭐ <strong>戴尔AI服务器营收161亿美元 +757%</strong>，盘后飙升35%创历史新高</li>\n  <li>⭐ <strong>Anthropic 9650亿美元估值</strong>，超越OpenAI成全球最贵AI公司</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创新高、美光+3.5%续创新高、微软+3%</li>\n</ul>\n\n<p><strong>核心判断——A股和美股的阶段性背离：</strong>美国AI资本市场（戴尔/Cerebras/Anthropic）不断释放超预期利好，而A股却在高位兑现。这并非产业逻辑破坏，而是<strong>交易层面的筹码消化</strong>——前期涨幅过大后的获利回吐。本周Computex大会有望成为A股AI板块<strong>情绪修复催化剂</strong>。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股再创新高</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业主力净流出372亿元居全行业第一，中芯国际净流出31.4亿居个股第一。中际旭创成交225亿A股第一但方向偏流出。算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%再创新高、博通+3.2%逼近历史新高、美光+3.5%续创新高、微软+3%。<strong>戴尔盘后飙升35%创历史新高</strong>——AI服务器营收161亿美元+757%，全年预期上调至600亿美元。</p>\n<p class=\"sn\"><strong>基本面：</strong>①戴尔AI服务器营收+757%是最强确认信号 ②Cerebras上市+89%市值750亿美元 ③Anthropic融资650亿美元估值9650亿美元反超OpenAI ④四大云厂商2026年资本支出7250亿美元(+77%+) ⑤华为推出星河AI数据中心网络，带宽提升8倍</p>\n<p class=\"sn\"><strong>政策面：</strong>发改委\"人工智能+\"从\"深化拓展\"升级为\"全面实施\"。市场监管总局&发改委联合发布《人工智能计量体系建设指引(2026版)》。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期A股谨慎（获利回吐），但美股AI+戴尔财报持续超预期强化产业趋势判断。本周Computex大会是扭转A股AI情绪的关键催化。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">AI供需最紧张环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向资金在存储龙头上交投活跃但方向偏流出。澜起科技沪股通成交42亿，兆易创新33.86亿。佰维存储逆势涨0.94%成为板块中少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>①<strong>HBM3E现货价半年暴涨超300%</strong>，单价飙至数万美元 ②全球DRAM营收Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%）创历史新高 ③三星率先交付首批12层48GB HBM4E样品，性能较HBM4提升超20% ④HBM在AI芯片成本占比从52%升至63% ⑤集邦预测2026年HBM需求再增70%+ ⑥美光警告内存短缺持续至2026年后</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲但股价已充分反映涨价预期，获利资金同样兑现。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极高。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树IPO上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续此前净流出态势。5月27日人形机器人板块净流出143亿元，周五继续承压。奥比中光在科创AI指数中相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>①<strong>宇树科技科创板IPO 6/1上会</strong>——冲刺A股\"人形机器人第一股\"，拟募资42亿元 ②4月工业机器人出口2.5万台同比+90% ③特斯拉Optimus Gen-3下线测试，Q2启动量产，首代目标年产能100万台 ④Figure 03机器人全天候包裹分拣直播，全流程闭环 ⑤小鹏IRON人形机器人三季度亮相年底量产</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树科技上会结果。若顺利过会将成为机器人板块标志性催化剂，带动板块企稳回升。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势吸金</span></div>\n<p class=\"sn\"><strong>资金面：</strong>内部分化——光模块龙头中际旭创高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产，鸿海CPO全光交换机出货目标上调至5万台。台积电启动全球首款200Gbps微环调制器量产。Lumentum光通信产能售罄至2028年。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。但斌转发CPO视频引发业界关注。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联延伸新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+防御配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n\n<p><strong>资金流向核心结论：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>（连续多日净流出）</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>居全行业第一——AI科技方向全面失血</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御方向</li>\n  <li><strong>通信线缆</strong>是AI板块中唯一逆势吸金方向——亨通光电全市场主力净流入第一(39.76亿)</li>\n  <li>AI相关板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>反差：</strong>A股AI是最大失血方向，但美股AI是最大吸金方向——阶段性背离</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">盘后+35%创历史新高</span></td><td>AI服务器营收161亿美元+757%，上调全年至600亿美元——全球最强AI硬件业绩验证</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向延伸，资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创历史新高后今日大幅回调拖累板块</td></tr>\n  <tr><td><strong>Anthropic</strong></td><td>一级市场</td><td><span class=\"pill pill-up\">估值9650亿美元<br>超越OpenAI</span></td><td>H轮融资650亿美元，红杉/黑石/三星等参与，AI资本泡沫还是价值重估？</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（5/29）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块归属</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通光电/长芯博创/剑桥科技/长飞光纤），合计净流入约<strong>75亿元</strong>。这是周五全市场唯一获得集中配置的AI相关产业链方向，也是CPO概念从光模块向通信线缆延伸的明显信号。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线内部测试，Q2启动量产，首代目标年产能100万台。中国供应链优势企业核心受益：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入验证环节</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机独家，用于V3灵巧手，高功率密度</td><td>⭐⭐</td></tr>\n  <tr><td><strong>伺服电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服系统+控制器+空心杯电机+V3运动控制方案</td><td>⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>线性和旋转执行器，单机价值量约1.5万元</td><td>⭐⭐</td></tr>\n  <tr><td><strong>轴承/丝杠</strong></td><td>五洲新春</td><td>603667</td><td>行星滚柱丝杠核心，V3单机34根</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新催化剂：</strong>宇树科技6/1 IPO上会是板块最劲催化剂。图03机器人已全天候直播筛检作业。中国整机出货占全球84.71%。2026年是<strong>从0到1量产兑现阶段</strong>，板块适合<strong>逢低布局</strong>。核心仓位以三花+绿的为主。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。周五\"高切低\"全面切换（科创50-5.04%）。但隔夜美股AI戴尔+35%/Anthropic9650亿美元/Cerebras+89%/纳指七连涨——产业热度仍在升温。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 本周关键事件（超级催化周）</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一 6/1：</strong>宇树科技IPO上会 ｜ 戴尔财报传导效应<br><strong>周二-周五 6/2-6/5：</strong>Computex 2026<br>— 英伟达黄仁勋主题演讲（可能发布Vera Rubin细节）<br>— AMD/英特尔AI新品<br>— 微软Copilot+ PC升级<br>— AI服务器/液冷/机器人最新展示</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受<strong>戴尔财报+35%</strong>和美股AI全面大涨带动，A股AI板块有望<strong>高开</strong>。核心看成交量——若放量则有望企稳反弹；若缩量需警惕\"高开低走\"。通信线缆方向可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间宽幅震荡，短线支撑72美元、压力80美元。沪银夜盘收涨+0.64%提供短线支撑。关注本周非农数据及美联储表态。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">①A股主力连续多日大额净流出 ②若周一高开但成交不足，警惕高开低走 ③美伊局势若恶化将冲击全球风险偏好 ④AI板块估值处于相对高位需时间消化</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器的传导效应（周一早盘）<br><strong>2)</strong> Computex窗口逢低布局算力/光模块/PCB龙头<br><strong>3)</strong> 关注CPO产业链通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向<br><strong>5)</strong> 白银区间操作：72附近低吸，80附近高抛</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>"}, {"id": "mon-20260531-0807", "date": "2026-05-31 08:07", "title": "AI板块周末复盘 · A股休市 白银75美元震荡 聚焦本周Computex+宇树IPO催化", "tags": ["周末复盘", "白银震荡", "戴尔财报", "Computex", "宇树科技", "高切低", "CPO通信线缆"], "summary": "A股休市。周五科技高切低科创50暴跌5%。美股AI全线大涨纳指新高，戴尔AI营收+757%飙升35%。聚焦本周Computex+宇树IPO催化。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证(周五)</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.73%</div><div class=\"lbs\">周五涨跌</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n</div>\n\n<h1>AI板块周末复盘 · A股休市 白银75美元震荡 聚焦下周Computex催化</h1>\n<p><strong>时间：</strong>2026-05-31 08:07（周日·A股周五已收盘·非交易时段）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>当前A股处于周末休市状态。上周五（5/29）A股上演\"高切低\"全面切换，科技全线退潮，科创50暴跌5.04%，电力/公用事业/消费逆势吸金。但隔夜美股AI全线大涨纳指创新高，<strong>戴尔财报AI服务器营收+757%盘后飙升35%</strong>，AI产业基本面强势不改。本周<strong>三大核心催化：6/1宇树科技IPO上会 + 6/2-6/5 Computex大会 + 戴尔财报A股传导效应</strong>。COMEX白银期货在75美元附近区间震荡筑底。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58 美元/盎司</strong> <span class=\"pill pill-down\">日内 -0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银(伦敦)</div><div class=\"iv\"><strong>约75.20 美元/盎司</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>约18,280 元/千克</strong> <span class=\"pill pill-up\">夜盘+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4,527-4,591 美元/盎司</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\">10,244手 <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n\n<p><strong>近期趋势判断：</strong>COMEX白银本周（5/26-5/30）走势剧烈震荡——周初77.27美元，周三下探至73.29美元（5/28-2.84%），周四大反弹至76.08美元（+3.81%），周五回落至75.58美元（-0.43%）。整体处于<strong>72-80美元宽幅震荡区间</strong>。沪银主力报18,280元/千克附近，沪金主力夜盘收涨+1.61%。</p>\n\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱提供支撑：</strong>美元指数回落至99附近，对贵金属整体形成底部支撑</li>\n  <li><strong>通胀粘性超预期：</strong>美国4月PCE物价同比+3.8%创三年新高，CPI同比+3.2%高于预期，抗通胀资产需求上升</li>\n  <li><strong>美伊地缘风险：</strong>特朗普称即将就伊朗战事做出最终决定，地缘不确定性维持高位</li>\n  <li><strong>投机情绪降温：</strong>CFTC数据截至5/26 COMEX白银投机净多头减至10,244手，短线看涨情绪降温</li>\n  <li><strong>工业需求逻辑持续：</strong>光伏+AI数据中心建设对白银工业需求维持高位</li>\n  <li><strong>波动率放大：</strong>5月中旬单日跌超9%后市场波动率系统性提升，呈现急涨急跌特征</li>\n</ul>\n<blockquote>💡 白银自1月29日121美元历史高点最大回撤约40%，当前72-80美元区间筑底。短线支撑72美元（前低），上方压力80美元整数关口。波动剧烈，注意仓位管理。</blockquote>\n\n<hr>\n\n<h2>一、大盘解读（周五5/29收盘回顾）</h2>\n<p>A股周五高开低走全线收跌，<strong>科创50暴跌5.04%</strong>领跌全场：</p>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n</div>\n\n<p>全市场仅<strong>1,565只上涨</strong>，3,867只下跌，涨跌比约3:7。主力资金净流出<strong>831.55亿元</strong>。北向资金成交4,734亿元（占两市14.26%）。</p>\n\n<p><strong>盘面特征：</strong>食品饮料(+3.02%)、煤炭(+2.13%)、公用事业(+2%+)领涨；综合(-5.39%)、国防军工(-4.23%)、电子(-4%+)领跌。科技板块全面获利了结，风格\"高切低\"非常清晰。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>周五AI板块<strong>全面回调，集体退潮</strong>。人工智能指数收跌<strong>3.06%</strong>，成交额5,398亿元。</p>\n<p><strong>但外盘信号积极：</strong></p>\n<ul>\n  <li><strong>美股纳指七连涨创新高</strong>（+0.91%），费城半导体+1%创新高</li>\n  <li><strong>戴尔Q1 AI服务器营收161亿美元 +757%</strong>，盘后股价飙升35%创历史新高</li>\n  <li><strong>Cerebras</strong>上市首日暴涨89%，市值达750亿美元</li>\n  <li><strong>高通+6%</strong>、<strong>ARM+5%</strong>再创新高、美光+3.5%续创新高</li>\n  <li><strong>全球AI资本开支全面上修：</strong>四大云厂商2026年资本支出7,250亿美元（+77%+）</li>\n</ul>\n<p><strong>核心判断：</strong>A股AI板块调整是<strong>交易层面的筹码消化</strong>（前期涨幅过大后的获利回吐），而非产业逻辑破坏。本周Computex大会+戴尔财报传导效应有望带动情绪修复。</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔财报催化</span></div>\n<p class=\"sn\"><strong>资金面（A股回调）：</strong>电子行业主力净流出372亿居全行业第一。中芯国际主力净流出31.4亿居全市场第一。AI算力ETF全线下跌。</p>\n<p class=\"sn\"><strong>资金面（美股强势）：</strong>高通+6%、ARM+5%创新高、博通+3.2%逼近新高、美光+3.5%续创历史新高。AI算力需求定价仍在强化。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>戴尔Q1 AI服务器营收161亿美元+757%</strong>，上调全年AI预期至600亿美元——全球最强AI硬件业绩验证。Cerebras上市首日+89%。华为星河AI数据中心网络方案（NPU与存储直通带宽提升8倍）。四大云厂商资本支出7,250亿(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong>本周<strong>Computex 2026（6/2-6/5）</strong>以\"AI Together\"为主题，英伟达黄仁勋主题演讲预计发布Vera Rubin架构细节。发改委\"人工智能+\"从拓展升级为全面实施。工信部\"模数共振\"行动推进中。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎但美股情绪持续升温。关注戴尔财报情绪向下周一A股传导——AI服务器/算力供应链有望高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">产业景气最强环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿），但方向偏流出。佰维存储逆势上涨0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收2026Q1逼近<strong>970亿美元</strong>（环比+80%，同比+260%）创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星率先交付首批12层48GB HBM4E样品。HBM在AI芯片成本占比已从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺将持续至2026年后。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为亮眼但短期股价已充分反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节，中长期确定性极强。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树科技上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续抛压但成交缩量——筹码在消化中。奥比中光相对抗跌(+0.84%)。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>规模化验证关键期</strong>。<strong>宇树科技科创板IPO将于6月1日上会</strong>，冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。4月工业机器人出口2.5万台（同比+90%）。特斯拉Optimus Gen-3 Q2启动量产，首代目标年产能100万台。Figure 03开启全天候包裹分拣直播。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成为机器人板块标志性催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆逆势走强</span></div>\n<p class=\"sn\"><strong>资金面：</strong>光模块龙头高位震荡，但<strong>通信线缆及配套</strong>板块逆势净流入<strong>39.83亿元</strong>。亨通光电主力净流入<strong>39.76亿</strong>居全市场第一，剑桥科技净流入11.73亿、长飞光纤净流入10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年是<strong>CPO产业化元年</strong>。英伟达Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台以上。台积电COUPE封装加速推进。LightCounting预测2030年CPO市场达100亿美元。中际旭创Q1营收195亿(+192%)，净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金正寻找CPO产业链\"新面孔\"——通信线缆方向获集中配置。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联新方向</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台主力净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出<strong>372.05亿</strong>全行业第一（跌幅最大）</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿，资金全面转向防御</li>\n  <li><strong>通信线缆</strong>是AI板块唯一逆势吸金方向——亨通光电全市场第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>对比：</strong>周五AI板块是全市场最大\"失血\"方向，但隔夜美股反之——AI是全市场最大\"吸金\"方向。A股和美股对AI的定价出现阶段性背离。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE:DELL</td><td><span class=\"pill pill-up\">盘后飙升+35%<br>创历史新高</span></td><td>Q1 AI服务器营收161亿美元同比+757%，上调全年AI预期至600亿美元。全球最强AI硬件业绩验证，为A股AI板块周一提供重要催化。</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联新方向，资金集中追捧，成为全市场唯一逆势吸金的AI相关标的。</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头创历史新高后大幅回调，获利盘集中兑现，拖累AI板块整体情绪。</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占TOP10中<strong>4席</strong>（亨通光电、长芯博创、剑桥科技、长飞光纤），CPO产业链延伸方向是周五全市场唯一获得集中配置的AI方向。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2启动量产，首代目标年产能100万台。2026年是人形机器人<strong>规模化验证关键期</strong>。A股核心受益标的：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商，已进入特斯拉验证环节</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头，机器人关节核心零部件</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商，国产替代空间大</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机/驱动系统龙头，延伸至机器人</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件，平台型扩张</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机，灵巧手核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>核心催化：</strong>今天（6月1日）宇树科技IPO上会，若顺利过会将为板块注入强心剂。整体策略<strong>逢低布局</strong>。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。周五科技高切低全线回调，科创50暴跌5.04%。但隔夜美股AI全线大涨纳指创新高，戴尔+35%。AI产业热度仍在。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 本周关键日历</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：宇树科技IPO上会</strong>（人形机器人第一股）<br><strong>周二-周五(6/2-6/5)：Computex 2026</strong><br>— 英伟达黄仁勋主题演讲<br>— 可能发布Vera Rubin架构新细节<br>— 戴尔AI服务器财报A股传导</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受戴尔+35%和美股AI上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量——放量则企稳反弹，缩量则警惕高开低走。通信线缆（亨通/长飞）可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱和工业需求提供支撑。上方突破80美元需更强催化剂。沪银夜盘+0.64%收涨。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">①A股主力持续大额净流出 ②美伊局势不确定性（特朗普对伊朗最后决定）③科技股估值偏高需消化</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力的传导<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> CPO通信线缆产业链值得重点跟踪<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260531-0907", "date": "2026-05-31 09:07", "title": "AI板块周末复盘 · 科技高切低 戴尔AI营收+757%飙升35% 聚焦下周Computex", "tags": ["周末复盘", "高切低", "戴尔财报", "白银震荡", "Computex", "宇树科技", "CPO通信线缆"], "summary": "A股已收盘。周五科创50暴跌5%高切低。隔夜美股AI大涨戴尔AI营收+757%飙升35%。白银75.58美元震荡。", "html": "\n<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">4068.57</div><div class=\"lbs\">上证指数</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-5.04%</div><div class=\"lbs\">科创50</div></div>\n  <div class=\"metric-box\"><div class=\"num\">3.32万亿</div><div class=\"lbs\">成交额</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX银($)</div></div>\n</div>\n\n<h1>AI板块周末复盘 · 科技高切低 戴尔AI营收+757% 聚焦下周Computex</h1>\n<p><strong>时间：</strong>2026-05-31 09:07（A股周五已收盘·周日休市）</p>\n\n<div class=\"tagline\">📌 <strong>核心基调：</strong>上周五A股上演\"高切低\"全面切换——科技全线退潮，科创50暴跌5.04%。电力/消费/通信线缆逆势吸金。但隔夜美股AI全线大涨纳指七连涨创新高，<strong>戴尔AI服务器营收161亿美元同比+757%财报后飙升35%</strong>。下周<strong>六重催化：宇树IPO上会(6/1) + Computex大会(6/2-6/5) + 戴尔美股传导</strong>，AI板块有望迎来情绪修复。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-mid\">周跌0.81%，月涨2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">现货白银</div><div class=\"iv\"><strong>75美元附近</strong> <span class=\"pill pill-mid\">区间震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,035-18,358元/千克</strong> <span class=\"pill pill-up\">夜盘+0.64%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>99.02-99.33</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">COMEX黄金</div><div class=\"iv\"><strong>4,569.9美元/盎司</strong> <span class=\"pill pill-up\">+0.83%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">CFTC白银净多</div><div class=\"iv\"><strong>10,244手</strong> <span class=\"pill pill-down\">周减1,517手</span></div></div>\n</div>\n<p><strong>近期趋势：</strong>白银5月初从70美元启动七连涨至89美元，随后因CPI超预期单日暴跌超9%至73美元，月末企稳75美元。整体处于<strong>72-80美元宽幅震荡区间</strong>。</p>\n<p><strong>驱动因素：</strong>美元走弱(美元指数99)提供支撑 | 美国4月PCE同比+3.8%创三年新高 | 特朗普称将对伊朗做最终决定 | CFTC净多头减少反映短线情绪降温 | 光伏+AI对银工业需求维持高位</p>\n\n<hr>\n\n<h2>一、大盘解读（上周五回顾）</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">上证指数</div><div class=\"iv\">4068.57 <span class=\"pill pill-down\">-0.73%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">深证成指</div><div class=\"iv\">15575.13 <span class=\"pill pill-down\">-1.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">创业板指</div><div class=\"iv\">4037.95 <span class=\"pill pill-down\">-2.11%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">科创50</div><div class=\"iv\">1751.32 <span class=\"pill pill-down\">-5.04% 💥</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">两市成交</div><div class=\"iv\"><strong>3.32万亿元</strong>（放量下跌）</div></div>\n  <div class=\"info-item\"><div class=\"il\">主力净流出</div><div class=\"iv\" style=\"color:#ef4444\"><strong>-831.55亿元</strong></div></div>\n</div>\n<p>全市场仅1565只上涨，3867只下跌。食品饮料(+3.02%)、煤炭、公用事业领涨；综合(-5.39%)、国防军工、电子(-4%+)领跌。北向资金成交4734亿元(占两市14.26%)。</p>\n\n<hr>\n\n<h2>二、AI板块整体市场概览</h2>\n<p>上周五AI板块<strong>全面回调</strong>，人工智能指数收跌<strong>3.06%</strong>，成交额5398亿元。</p>\n<p><strong>核心特征：</strong>周四创业板首超沪指、\"易中天\"齐创新高，周五全面退潮——<strong>两日冰火两重天</strong>！主力资金从科技抱团品种系统性撤离转向防御方向。但产业基本面未变——调整是<strong>筹码消化</strong>而非逻辑破坏。</p>\n<p><strong>积极信号在外盘：</strong>纳指七连涨创新高 | 戴尔AI服务器+757%飙升35% | Cerebras上市暴涨89% | 高通+6%、ARM+5%创新高 | 费城半导体+1%</p>\n\n<hr>\n\n<h2>三、细分领域动态</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">A股回调 · 美股强势 · 戴尔最亮眼</span></div>\n<p class=\"sn\"><strong>资金面（A股）：</strong>电子行业净流出372亿全行业第一。中芯国际净流出31.4亿居全市场第一。</p>\n<p class=\"sn\"><strong>资金面（美股）：</strong>隔夜美股AI全面大涨——高通+6%、ARM+5%、美光+3.5%续创新高。戴尔财报后飙升35%。</p>\n<p class=\"sn\"><strong>基本面（最强信号！）：</strong><strong>戴尔Q1 AI服务器营收161亿美元同比+757%</strong>，上调全年预期至600亿美元。Cerebras上市首日+89%。四大云厂商2026年资本支出7250亿美元(+77%)。</p>\n<p class=\"sn\"><strong>政策面：</strong><strong>Computex 2026（6/2-6/5）</strong>—英伟达黄仁勋演讲预计发布Vera Rubin架构细节。发改委\"人工智能+\"升级全面实施。</p>\n<p class=\"sn\"><strong>情绪面：</strong>A股短期谨慎，美股持续升温。关注戴尔传导效应下周一AI服务器方向有望高开。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-up\">供需最紧张环节</span></div>\n<p class=\"sn\"><strong>资金面：</strong>北向在澜起科技(42亿)、兆易创新(33.86亿)上成交活跃但方向偏流出。佰维存储逆势+0.94%。</p>\n<p class=\"sn\"><strong>基本面（全线超预期）：</strong>全球DRAM营收Q1达<strong>970亿美元</strong>(+260%)创历史新高。<strong>HBM3E现货价半年暴涨超300%</strong>。三星交付首批12层48GB HBM4E样品。HBM在AI芯片成本占比从52%升至63%。集邦预测2026年HBM需求再增70%+。美光警告内存短缺至2026后。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据强劲但股价已反映涨价预期。HBM是AI产业链中<strong>供需格局最紧张</strong>的环节。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">等待6/1宇树上会</span></div>\n<p class=\"sn\"><strong>资金面：</strong>延续抛压，板块成交缩量——抛压在消化中。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>宇树科技科创板IPO 6月1日上会</strong>，冲刺\"人形机器人第一股\"拟募资42亿元。4月工业机器人出口2.5万台(+90%)。特斯拉Optimus Gen-3 Q2启动量产。</p>\n<p class=\"sn\"><strong>情绪面：</strong>市场静待宇树上会结果。若顺利过会将成机器人板块标志性催化剂。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-up\">通信线缆异军突起</span></div>\n<p class=\"sn\"><strong>资金面：</strong>板块内部分化——中际旭创高位震荡，但<strong>通信线缆</strong>逆势净流入<strong>39.83亿元</strong>。亨通光电净流入<strong>39.76亿</strong>全市场第一，剑桥科技11.73亿、长飞光纤10.39亿。</p>\n<p class=\"sn\"><strong>基本面：</strong><strong>2026年CPO产业化元年</strong>！英伟达Q4启动CPO量产。鸿海CPO全光交换机出货目标上调至5万台+。中际旭创Q1营收195亿(+192%)净利57亿(+262%)。</p>\n<p class=\"sn\"><strong>情绪面：</strong>资金寻找CPO\"新面孔\"——通信线缆获集中配置。光模块龙头短期调整属获利回吐。</p>\n</div>\n\n<hr>\n\n<h2>四、主流净流入板块监控（周五TOP8）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入(亿)</th><th>驱动</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御+夏季用电高峰</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>科技→防御大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td><strong>CPO/算力互联新方向</strong></td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红低估</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒</td><td><span class=\"green\">+18.43</span></td><td>茅台净流入9.19亿</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n</table>\n<p><strong>资金流向核心发现：</strong></p>\n<ul>\n  <li>全市场主力净流出<strong>831.55亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业净流出372亿</strong>全行业第一——AI科技方向全面失血</li>\n  <li>电力+公用事业合计净流入约85亿，资金全面转向防御</li>\n  <li><strong>通信线缆是AI唯一逆势吸金方向</strong>——亨通光电全市场第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超<strong>400亿元</strong>，相对热度降至冰点</li>\n  <li><strong>关键对比：</strong>周五A股AI是全市场最大失血方向；但隔夜美股AI全线大涨纳指七连涨创新高。A股与美股出现<strong>阶段性定价背离</strong>。</li>\n</ul>\n\n<hr>\n\n<h2>五、关键异动个股</h2>\n<table>\n  <tr><th>个股</th><th>市场</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>戴尔科技</strong></td><td>NYSE</td><td><span class=\"pill pill-up\">财报后飙升+35%</span></td><td>AI服务器营收161亿美元同比+757%，全年预期上调至600亿美元</td></tr>\n  <tr><td><strong>亨通光电</strong></td><td>A股 600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿</span></td><td>通信线缆龙头，CPO/算力互联新方向获资金集中追捧</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>A股 688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿</span></td><td>半导体龙头获利回吐，拖累AI板块</td></tr>\n</table>\n\n<hr>\n\n<h2>六、主力资金增仓TOP10个股（周五）</h2>\n<table>\n  <tr><th>#</th><th>个股</th><th>净流入(亿元)</th><th>板块</th></tr>\n  <tr><td><strong>1</strong></td><td>亨通光电</td><td><span class=\"green\">39.76</span></td><td>通信线缆/CPO</td></tr>\n  <tr><td><strong>2</strong></td><td>长芯博创</td><td><span class=\"green\">13.31</span></td><td>光通信</td></tr>\n  <tr><td><strong>3</strong></td><td>兴森科技</td><td><span class=\"green\">12.46</span></td><td>PCB/AI服务器</td></tr>\n  <tr><td><strong>4</strong></td><td>剑桥科技</td><td><span class=\"green\">11.73</span></td><td>光模块/通信</td></tr>\n  <tr><td><strong>5</strong></td><td>宁德时代</td><td><span class=\"green\">10.48</span></td><td>新能源</td></tr>\n  <tr><td><strong>6</strong></td><td>长飞光纤</td><td><span class=\"green\">10.39</span></td><td>光纤光缆/CPO</td></tr>\n  <tr><td><strong>7</strong></td><td>中国中免</td><td><span class=\"green\">9.87</span></td><td>消费旅游</td></tr>\n  <tr><td><strong>8</strong></td><td>中天科技</td><td><span class=\"green\">9.35</span></td><td>通信线缆</td></tr>\n  <tr><td><strong>9</strong></td><td>贵州茅台</td><td><span class=\"green\">9.19</span></td><td>白酒</td></tr>\n  <tr><td><strong>10</strong></td><td>华能蒙电</td><td><span class=\"green\">8.42</span></td><td>电力</td></tr>\n</table>\n<p><strong>观察：</strong>通信线缆/光通信方向占据TOP10中的<strong>4席</strong>（亨通光电、长芯博创、剑桥科技、长飞光纤），CPO产业链延伸方向是周五全市场唯一获集中配置的AI相关方向。</p>\n\n<hr>\n\n<h2>七、特斯拉机器人概念股解析</h2>\n<p>特斯拉Optimus Gen-3已下线投入内部测试，Q2启动量产，首代目标年产能100万台。2026年是<strong>从0到1量产兑现阶段</strong>。</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器</strong></td><td>三花智控</td><td>002050</td><td>线性/旋转执行器核心供应商</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器国产龙头</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>传感器</strong></td><td>柯力传感</td><td>603662</td><td>力矩传感器潜在供应商</td><td>⭐⭐</td></tr>\n  <tr><td><strong>电机</strong></td><td>汇川技术</td><td>300124</td><td>伺服电机驱动系统延伸</td><td>⭐⭐</td></tr>\n  <tr><td><strong>结构件</strong></td><td>拓普集团</td><td>601689</td><td>一体化压铸+机器人结构件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>灵巧手</strong></td><td>鸣志电器</td><td>603728</td><td>空心杯电机核心驱动</td><td>⭐⭐</td></tr>\n</table>\n<p><strong>最新催化：</strong>宇树科技6/1 IPO上会 + Optimum Gen-3下线 + Figure 03包裹分拣直播。板块适合<strong>逢低布局</strong>，核心以三花+绿的为主。</p>\n\n<hr>\n\n<h2>八、总结与展望</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">📌 当前状态</div><div class=\"iv\" style=\"font-size:14px\">A股周末休市。周五高切低全线回调（科创50-5.04%），但隔夜美股AI全线大涨戴尔+35%，AI热度持续升温。</div></div>\n  <div class=\"info-item\"><div class=\"il\">👀 下周关键事件</div><div class=\"iv\" style=\"font-size:14px\"><strong>周一(6/1)：</strong>宇树科技IPO上会（人形机器人第一股）<br><strong>周二-周五(6/2-6/5)：</strong>Computex 2026台北电脑展<br>— 英伟达黄仁勋主题演讲<br>— 可能发布Vera Rubin架构新细节<br>— 戴尔AI服务器财报传导效应</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 周一推演</div><div class=\"iv\" style=\"font-size:14px\">受戴尔财报+35%和美股AI全面上涨带动，A股AI板块有望<strong>高开</strong>。关键看成交量——放量则企稳反弹，缩量需警惕高开低走。<strong>通信线缆方向（亨通光电）</strong>可能延续强势。</div></div>\n  <div class=\"info-item\"><div class=\"il\">💡 白银展望</div><div class=\"iv\" style=\"font-size:14px\">COMEX白银72-80美元区间震荡。美元走弱提供支撑，沪银夜盘+0.64%。上方突破80美元需更强催化剂。</div></div>\n  <div class=\"info-item\"><div class=\"il\">⚠️ 风险提示</div><div class=\"iv\" style=\"font-size:14px;color:#f59e0b\">A股主力资金连续多日大额净流出。若下周一高开但成交量不足，需警惕\"高开低走\"。仓位管理第一。</div></div>\n  <div class=\"info-item\"><div class=\"il\">🧭 策略建议</div><div class=\"iv\" style=\"font-size:14px\"><strong>1)</strong> 关注戴尔财报对A股AI服务器/算力产业链的传导效应<br><strong>2)</strong> 逢低布局算力/光模块/PCB龙头，等待Computex催化<br><strong>3)</strong> 重点关注CPO通信线缆新方向（亨通/长飞/剑桥）<br><strong>4)</strong> 宇树上会结果决定机器人板块方向</div></div>\n</div>\n\n<blockquote>⚠️ 以上分析基于公开数据整理，不构成投资建议。股市有风险，投资需谨慎。</blockquote>\n"}, {"id": "mon-20260531-1007", "date": "2026-05-31 10:07", "title": "AI板块周末市场观察 · 聚焦下周Computex大会与宇树IPO 白银75.58美元震荡", "tags": ["周末复盘", "Computex", "宇树IPO", "高切低", "白银", "CPO通信线缆"], "summary": "A股周末休市。上周五科技全线退潮科创50暴跌5%。COMEX白银75.58美元。聚焦下周一宇树IPO+Computex大会。", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">周末休市</div><div class=\"lbs\">A股状态</div></div>\n  <div class=\"metric-box\"><div class=\"num\">75.58</div><div class=\"lbs\">COMEX白银</div></div>\n  <div class=\"metric-box\"><div class=\"num\">-0.43%</div><div class=\"lbs\">白银周线</div></div>\n  <div class=\"metric-box\"><div class=\"num\">待催化</div><div class=\"lbs\">下周焦点</div></div>\n</div>\n\n<h1>AI板块周末市场观察 · 聚焦下周Computex大会与宇树IPO</h1>\n<p><strong>时间：</strong>2026-05-31 10:07（A股周末休市，以下为盘后及周末市场信息汇总）</p>\n\n<div class=\"tagline\">📌 <strong>市场状态：</strong>今日为周日，A股周末休市。上周五（5/29）A股上演\"高切低\"全面切换——科创50暴跌5.04%，科技板块全面退潮，电力/公用事业等防御板块逆势吸金。COMEX白银上周五收报75.58美元/盎司（周跌0.81%，月涨2.1%）。下周两大超级催化即将登场：<strong>6/1宇树科技IPO上会 + 6/2-6/5 Computex 2026大会</strong>。</div>\n\n<hr>\n\n<h2>📊 零、COMEX白银期货播报</h2>\n<div class=\"info-grid\">\n  <div class=\"info-item\"><div class=\"il\">COMEX白银期货</div><div class=\"iv\"><strong>75.58美元/盎司</strong> <span class=\"pill pill-down\">上周五 -0.43%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">周涨跌幅</div><div class=\"iv\"><span class=\"pill pill-down\">周跌 0.81%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">5月涨跌幅</div><div class=\"iv\"><span class=\"pill pill-up\">月涨 2.1%</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">沪银主力</div><div class=\"iv\"><strong>18,280元/千克</strong> <span class=\"pill pill-mid\">窄幅震荡</span></div></div>\n  <div class=\"info-item\"><div class=\"il\">伦敦现货</div><div class=\"iv\"><strong>75.2美元/盎司</strong></div></div>\n  <div class=\"info-item\"><div class=\"il\">美元指数</div><div class=\"iv\"><strong>98.96-99.10</strong> <span class=\"pill pill-down\">持续走弱</span></div></div>\n</div>\n<p><strong>近期趋势判断：</strong>白银目前处于<strong>72-80美元宽幅震荡区间</strong>，较1月29日创下的历史高点121美元已接近腰斩。近期在75美元附近企稳，但反弹力度有限。周线来看白银连续两周在75美元上下窄幅震荡，多空力量暂时均衡。</p>\n<p><strong>驱动因素简析：</strong></p>\n<ul>\n  <li><strong>美元走弱支撑：</strong>美元指数持续在99附近低位运行，对贵金属形成底部支撑</li>\n  <li><strong>机构观点分化：</strong>美银看高Q4冲击100美元但认为\"昙花一现\"；瑞银将Q2末目标从100下调至85美元、年底至80美元</li>\n  <li><strong>供需基本面：</strong>全球白银连续第6年供应短缺，2026年缺口预计扩大至4630万盎司，库存处于低位</li>\n  <li><strong>印度加税压制：</strong>印度将白银进口关税从6%大幅提高至15%，可能减少来自印度的进口需求</li>\n  <li><strong>工业需求：</strong>光伏+AI硬件（GPU/服务器）对白银需求维持高位，但高价也在侵蚀部分工业消费</li>\n  <li><strong>CFTC持仓：</strong>截至5月26日当周，COMEX白银投机者净多头减少1517手至10,244手，看涨情绪降温</li>\n  <li><strong>下周关注：</strong>美国5月非农就业数据（6月5日公布）将决定美联储降息预期走向，直接影响白银短期方向</li>\n</ul>\n<blockquote>💡 白银当前处于\"下有支撑（72美元）、上有压力（80美元）\"的窄幅震荡格局。短线方向需等待下周非农数据指引。中长期看，全球供应短缺+工业需求增长+央行购金外溢效应构成多头逻辑，但短期受强势美元预期和高价抑制需求影响承压。</blockquote>\n\n<hr>\n\n<h2>一、AI板块整体市场概览（周末复盘）</h2>\n<p>A股上周五（5月29日）三大指数高开低走全线收跌，科技板块全面退潮，科创50暴跌5.04%领跌全场。主力资金单日净流出超1073亿元，连续多日呈现净流出格局。电力、公用事业、食品饮料等防御板块逆势吸金。</p>\n<p>但从<strong>周线/月线</strong>维度看——5月A股整体走出结构性牛市行情，科创50全月累计涨幅突破11%，算力、存储芯片、AI、国产半导体等科技赛道<strong>持续领跑全市场</strong>，月末最后两日的回调属于<strong>高位获利了结</strong>性质，并非产业逻辑破坏。</p>\n<p><strong>周末核心消息催化：</strong></p>\n<ul>\n  <li><strong>DeepSeek首轮融资获国家大基金领投：</strong>5月29日消息，DeepSeek首轮融资由国家大基金领投，融资前估值450亿美元，融资规模达700亿元人民币。国家大基金<strong>首次跨界投资纯大模型公司</strong>，标志AI产业进入国家队引领阶段</li>\n  <li><strong>Anthropic完成H轮650亿美元融资：</strong>投后估值9650亿美元（约6.5万亿元），反超OpenAI的8520亿美元</li>\n  <li><strong>MiniMax启动A股上市辅导：</strong>冲刺\"A+H\"双上市平台，港股已较发行价上涨超400%</li>\n  <li><strong>\"韬定律\"发布：</strong>5月25日发布的半导体\"韬定律\"提出\"时间缩微\"替代\"几何缩微\"，为国产AI算力芯片提供不依赖EUV的性能提升路径</li>\n  <li><strong>2026全球AI算力报告发布：</strong>算力产业迈入\"智算驱动、体系重构\"新阶段</li>\n</ul>\n\n<hr>\n\n<h2>二、细分领域动态（周末信息汇总）</h2>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 算力板块 <span class=\"pill pill-mid\">周末无交易</span> <span class=\"pill pill-up\">产业催化密集</span></div>\n<p class=\"sn\"><strong>资金面：</strong>上周五（5/29）AI算力芯片板块主力净流出显著，但周一至周四累计仍是净流入格局。5月整月北向资金、公募基金持续加大对科创板块布局力度，算力硬件、国产芯片细分领域获资金持续流入。</p>\n<p class=\"sn\"><strong>政策面：</strong></p>\n<ul>\n  <li>下周（6/2-6/5）<strong>Computex 2026大会</strong>即将召开，以\"AI Together\"为主题，英伟达、AMD、Intel等巨头将集中发布AI芯片、服务器、液冷、AI PC等最新方案——这是全球AI供应链<strong>年度最强催化窗口</strong></li>\n  <li>国家发改委5月22日释放信号：加快人工智能落地配套文件、推动央国企开放AI应用场景、指导国产大模型适配国产算力芯片</li>\n  <li>国家数据局启动六大行动推进高质量数据集建设</li>\n</ul>\n<p class=\"sn\"><strong>基本面：</strong>产业趋势向上明确——谷歌/微软/Meta/亚马逊2026年合计资本支出7250亿美元(+77%+)创历史新高。国产算力芯片产能利用率持续爬升，\"韬定律\"提供新技术路径。Cerebras纳斯达克上市首日大涨89%市值750亿美元，验证AI算力赛道高景气。</p>\n<p class=\"sn\"><strong>情绪面：</strong>短期获利了结压力释放后，市场等待Computex催化。美股纳指六连涨创新高显示AI热度不减，A股调整更多是内部资金博弈问题。下周Computex若发布超预期产品，将直接催化算力板块反弹。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 存储板块 <span class=\"pill pill-mid\">周末无交易</span> <span class=\"pill pill-up\">HBM景气持续</span></div>\n<p class=\"sn\"><strong>资金面：</strong>上周五存储跟随半导体回调，但北向资金在存储龙头上交投活跃（澜起科技沪股通成交42亿、兆易创新33.86亿）。佰维存储盘中逆势上涨0.94%成为存储中少有的红盘股。</p>\n<p class=\"sn\"><strong>基本面：</strong>存储行业景气持续上行——HBM3E现货价半年暴涨超300%，三星率先交付首批12层48GB HBM4E样品，SK海力士已构建HBM4量产体系。全球DRAM营收2026年Q1逼近970亿美元（环比+80%，同比+260%）创历史新高。HBM在AI芯片成本占比从52%升至63%，东北证券预计HBM涨价至少持续到2027年。集邦预测2026年HBM需求再增70%+。HBM是AI产业链中<strong>供需格局最为紧张</strong>的环节之一。</p>\n<p class=\"sn\"><strong>政策面：</strong>国盛证券指出HBM已成DRAM市场增长主要驱动力，Yole预计HBM全球市场规模从2024年的170亿美元增至2030年的980亿美元（CAGR 33%）。</p>\n<p class=\"sn\"><strong>情绪面：</strong>产业数据极为强劲，但股价已充分反映涨价预期。中长期来看，HBM仍是AI产业链确定性最强的环节，逢调整可积极关注先进封装和封测方向。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 机器人板块 <span class=\"pill pill-mid\">周末无交易</span> <span class=\"pill pill-up\">重大催化在即</span></div>\n<p class=\"sn\"><strong>资金面：</strong>上周机器人板块先抑后扬——周一至周四活跃后，周五随大市回调。5月27日板块曾净流出143亿元，但近一个月整体呈资金净流入格局。</p>\n<p class=\"sn\"><strong>基本面：</strong></p>\n<ul>\n  <li><strong>宇树科技科创板IPO将于6月1日（明日）上会，</strong>冲刺A股\"人形机器人第一股\"，拟募资42.02亿元。这是下周最重要的市场事件之一</li>\n  <li>特斯拉Optimus V3预计2026年7-8月启动量产，弗里蒙特产线已开始改造，长期目标年产100万台</li>\n  <li>海关总署数据：2026年4月工业机器人出口量突破2.5万台（同比+90%），一季度出口额113.2亿元</li>\n  <li>全球格局：中国凭借供应链优势主导量产，2025年中国整机出货量占全球84.71%</li>\n  <li>国家电网2026年具身智能投资规模预计突破100亿</li>\n</ul>\n<p class=\"sn\"><strong>政策面：</strong>工信部启动《人形机器人安全分级技术规范》行业标准编制。发改委明确\"加快推进具身智能训练基础设施建设\"，上海\"十五五\"规划推动10万台机器人进工厂。</p>\n<p class=\"sn\"><strong>情绪面：</strong>下周宇树科技IPO上会结果将直接影响板块情绪。若顺利过会，将成为中国人形机器人<strong>产业化和资本化的里程碑</strong>，有望带动板块迎来新一轮行情。当前板块调整是\"黎明前的寂静\"。</p>\n</div>\n\n<div class=\"sect-card\">\n<div class=\"sh\">🔷 CPO板块 <span class=\"pill pill-mid\">周末无交易</span> <span class=\"pill pill-up\">产业落地元年</span></div>\n<p class=\"sn\"><strong>资金面：</strong>上周五CPO板块呈现鲜明分化——光模块龙头获利回吐，但<strong>通信线缆</strong>逆势大额净流入39.83亿元。亨通光电主力净流入39.76亿元居全市场第一，剑桥科技净流入11.73亿元，长飞光纤净流入10.39亿元。资金在CPO产业链中寻找\"新面孔\"。</p>\n<p class=\"sn\"><strong>基本面：</strong>2026年机构定义为<strong>CPO产业化元年</strong>。英伟达明确2026年Q4启动CPO量产。台积电COUPE硅光整合平台预计2026年量产。鸿海集团CPO全光交换机出货目标从此前1万台大幅上调。LightCounting预测2030年CPO市场规模达100亿美元。1.6T光模块进入规模化量产元年，2026年需求预计实现10倍以上同比增长。</p>\n<p class=\"sn\"><strong>政策面：</strong>\"韬定律\"在ISCAS 2026发布，强调系统互连效率将持续提升，竞争维度从\"芯片制程\"转向\"互连密度与信号时延\"，与CPO/光互联的技术路线形成共鸣。</p>\n<p class=\"sn\"><strong>情绪面：</strong>CPO产业趋势确定性极高。通信线缆方向本周获资金集中追捧，说明市场在寻找CPO产业链的细分增量方向。但斌转发CPO视频引发产业关注度提升。下周Computex大会上英伟达/台积电的CPO相关更新值得重点关注。</p>\n</div>\n\n<hr>\n\n<h2>三、主流净流入板块监控（上周五5/29）</h2>\n<table>\n  <tr><th>#</th><th>板块</th><th>净流入（亿元）</th><th>驱动原因</th><th>类型</th></tr>\n  <tr><td><strong>1</strong></td><td>电力</td><td><span class=\"green\">+43.08</span></td><td>防御属性+夏季用电高峰预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>2</strong></td><td>公用事业</td><td><span class=\"green\">+41.74</span></td><td>资金从科技向防御方向大迁徙</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>3</strong></td><td>通信线缆及配套</td><td><span class=\"green\">+39.83</span></td><td>CPO/算力互联概念延伸，亨通光电领涨</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n  <tr><td><strong>4</strong></td><td>印制电路板</td><td><span class=\"green\">+28.51</span></td><td>AI服务器PCB需求持续放量</td><td><span class=\"pill pill-up\">业绩驱动</span></td></tr>\n  <tr><td><strong>5</strong></td><td>火力发电</td><td><span class=\"green\">+24.79</span></td><td>防御+高分红，估值洼地</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>6</strong></td><td>食品饮料</td><td><span class=\"green\">+21.60</span></td><td>消费复苏+618大促预期</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>7</strong></td><td>商贸零售</td><td><span class=\"green\">+20.22</span></td><td>端午消费旺季预期</td><td><span class=\"pill pill-mid\">事件驱动</span></td></tr>\n  <tr><td><strong>8</strong></td><td>白酒Ⅲ</td><td><span class=\"green\">+18.43</span></td><td>贵州茅台净流入9.19亿+消费配置</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>9</strong></td><td>白酒Ⅱ</td><td><span class=\"green\">+18.43</span></td><td>消费板块资金集中涌入</td><td><span class=\"pill pill-mid\">防御配置</span></td></tr>\n  <tr><td><strong>10</strong></td><td>通信设备</td><td><span class=\"green\">+13.13</span></td><td>CPO/5G/光通信产业链</td><td><span class=\"pill pill-up\">产业驱动</span></td></tr>\n</table>\n<p><strong>资金流向核心发现（上周五）：</strong></p>\n<ul>\n  <li>全市场主力资金净流出<strong>1073亿元</strong>，连续多日净流出</li>\n  <li><strong>电子行业</strong>净流出372亿元居全行业第一——前期涨幅过大的科技股获利了结是核心原因</li>\n  <li><strong>电力+公用事业</strong>合计净流入约85亿元，防御属性成为资金首选</li>\n  <li><strong>通信线缆</strong>是AI板块中<strong>唯一的逆势吸金方向</strong>——亨通光电全市场净流入第一</li>\n  <li>AI板块（电子+计算机+通信）合计净流出超400亿元，相对热度降至冰点</li>\n  <li>但需注意：这是<strong>月末/周末的集中调仓行为</strong>，而非趋势逆转。资金从科技高位撤退后并未离场，而是在消费/电力等防御方向寻找承接，等待下周新催化</li>\n</ul>\n\n<hr>\n\n<h2>四、关键异动个股（上周五及周末）</h2>\n<table>\n  <tr><th>个股</th><th>代码</th><th>异动</th><th>逻辑</th></tr>\n  <tr><td><strong>亨通光电</strong></td><td>600487</td><td><span class=\"pill pill-up\">主力净流入39.76亿<br>全市场第一</span></td><td>通信线缆龙头，CPO/算力互联概念延伸，获主力资金集中追捧</td></tr>\n  <tr><td><strong>DeepSeek</strong></td><td>未上市</td><td><span class=\"pill pill-up\">国家大基金领投<br>投前估值450亿美元</span></td><td>首轮融资700亿元，国家队首次跨界投资纯大模型公司，标志AI产业进入国家引领阶段</td></tr>\n  <tr><td><strong>中芯国际</strong></td><td>688981</td><td><span class=\"pill pill-down\">主力净流出31.4亿<br>全市场第一</span></td><td>半导体龙头获利回吐，昨日创历史新高后今日大幅回调，拖累板块</td></tr>\n</table>\n\n<hr>\n\n<h2>五、特斯拉机器人概念股解析</h2>\n<p>随着特斯拉Optimus V3量产在即（2026年7-8月启动），A股供应链核心标的梳理：</p>\n<table>\n  <tr><th>环节</th><th>核心公司</th><th>代码</th><th>受益逻辑</th><th>优先级</th></tr>\n  <tr><td><strong>执行器总成</strong></td><td>拓普集团</td><td>601689</td><td>Optimus V3线性执行器独家（腿/腰大关节），单机约1.5万元，已签40亿+订单</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>旋转关节</strong></td><td>三花智控</td><td>002050</td><td>旋转关节总成独家（14个上肢关节）+ 全套液冷，单机约3万元，锁定54亿订单</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>谐波减速器</strong></td><td>绿的谐波</td><td>688017</td><td>谐波减速器龙头，V3单台用14-20个，唯一规模化进入T链</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>滚柱丝杠</strong></td><td>五洲新春</td><td>603667</td><td>行星滚柱丝杠核心，V3单机34根，腿部关键传动（上周五跌停后需关注）</td><td>⭐⭐</td></tr>\n  <tr><td><strong>滚柱丝杠</strong></td><td>恒立液压</td><td>601100</td><td>滚柱丝杠供应商，V3线性关节核心部件</td><td>⭐⭐</td></tr>\n  <tr><td><strong>空心杯电机< const reports = [{"id": "citic-pe", "title": "中信证券(600030) 近三年PE-TTM走势分析", "icon": "📈", "tags": ["中信证券", "PE-TTM", "估值分析"], "desc": "基于自建数据库对中信证券近三年PE-TTM走势的深度复盘与当前估值定位分析", "html": "<div class=\"metric-row\">\n  <div class=\"metric-box\"><div class=\"num\">16.72x</div><div class=\"lbs\">当前 PE-TTM</div></div>\n  <div class=\"metric-box\"><div class=\"num\">21.93x</div><div class=\"lbs\">近 3 年均值</div></div>\n  <div class=\"metric-box\"><div class=\"num\">13.33x</div><div class=\"lbs\">近 3 年最低</div></div>\n  <div class=\"metric-box\"><div class=\"num\">35.26x</div><div class=\"lbs\">近 3 年最高</div></div>\n</div>\n\n<h1>中信证券(600030) 近三年 PE-TTM 走势分析</h1>\n\n<div class=\"tagline\">📌 <strong>核心结论：</strong>当前 PE-TTM 16.72 倍，处于近三年偏低分位（约 30% 分位），较均值 21.93 倍折价约 23.7%。对于中长期投资者，具备较高安全边际。</div>\n\n<h2>一、PE-TTM 走势全景回顾</h2>\n<p>PE-TTM（滚动市盈率）= 股价 ÷ 最近 12 个月的实际每股收益。相比静态市盈率，它使用<strong>最新四个季度财务数据</strong>，更真实反映公司当前估值水平。</p>\n\n<h3>走势三阶段</h3>\n<p><strong>第一阶段：估值收缩期（2024 年）</strong><br>受证券行业\"降费让利\"政策预期影响，市场对券商盈利前景产生担忧。叠加成交量萎缩、自营承压，PE 从年初 20 倍区间持续下滑至年末 <strong>14.7 倍</strong>附近，全年估值中枢下移约 26%。</p>\n\n<p><strong>第二阶段：底部震荡期（2025 年初至年中）</strong><br>PE 在 <strong>13.33 ~ 15.5 倍</strong> 区间窄幅波动。市场对券商板块关注度降至低点。期间中信证券多次回购稳定投资者信心。<strong>13.33 倍</strong> 成为本轮调整的估值铁底。</p>\n\n<p><strong>第三阶段：估值修复期（2025 年下半年至今）</strong><br>市场活跃度回升 + 权益市场回暖，券商自营及经纪业务环比改善。PE 从历史底部区域反弹至 16~18 倍区间。当前 16.72 倍较底部反弹约 25.4%，但距均值仍有空间。</p>\n\n<hr>\n\n<h2>二、关键区间分析</h2>\n<table>\n  <tr><th>指标</th><th>数值</th><th>含义</th></tr>\n  <tr><td><strong>最低 PE</strong></td><td>13.33x</td><td>2025 年 7 月——近三年绝对底部，也是压力测试的极限值</td></tr>\n  <tr><td><strong>最高 PE</strong></td><td>35.26x</td><td>2024 年初\"中特估\"行情驱动</td></tr>\n  <tr><td><strong>均值 PE</strong></td><td>21.93x</td><td>近三年估值中枢</td></tr>\n  <tr><td><strong>中位数 PE</strong></td><td>18.77x</td><td>半数时间在此以下</td></tr>\n  <tr><td><strong>当前 PE</strong></td><td>16.72x</td><td>低于均值和中位数，折价约 23.7%</td></tr>\n</table>\n<p><strong>分位数：</strong>当前 16.72 倍处于近三年 PE 序列约 <strong>30% 分位</strong>——即过去三年中约 <strong>70% 的时间估值高于当前</strong>。从历史统计角度看具有明显安全边际。</p>\n\n<hr>\n\n<h2>三、驱动因素</h2>\n<ul>\n  <li><strong>市场周期：</strong>券商估值与日均成交额高度正相关。2024 日均<8000 亿 vs 2025 日均>1.2 万亿</li>\n  <li><strong>行业政策：</strong>\"降费让利\"冲击边际递减；注册制改革深化利好投行</li>\n  <li><strong>自营收益：</strong>权益市场修复是 PE 回升核心推动力</li>\n</ul>\n\n<hr>\n\n<h2>四、估值展望</h2>\n<p>当前已反映大部分不确定性，下行风险有限。若市场活跃度维持，PE 有望向均值 <strong>21.93 倍</strong> 修复，对应约 <strong>31% 上行空间</strong>。</p>\n<p><strong>操作参考：</strong>PE 进入 <strong>15 倍以下</strong> 逐步布局；PE 接近或突破 <strong>22 倍</strong> 时分批兑现。</p>\n\n<blockquote>⚠️ 以上分析仅基于公开数据和历史统计，不构成投资建议。PE 为滞后指标。</blockquote>"}, {"id": "hbm-chain", "title": "国产HBM产业链全景解析", "icon": "🔬", "tags": ["HBM", "长鑫存储", "长电科技", "安集科技"], "desc": "全面梳理国产HBM产业链现状、核心玩家与挑战，从DRAM到先进封装逐环节拆解", "html": "<h1>国产 HBM 产业链全景解析</h1>\n<p><strong>日期：</strong>2026-05-28</p>\n\n<div class=\"tagline\">国产 HBM 产业链目前处于 <strong>\"从 0 到 1，点状突破\"</strong> 的初级阶段。与国际顶尖水平（SK 海力士 HBM3E）存在 2~3 代差距，但代差已从 8 年缩至 4 年。</div>\n\n<h2>一、HBM 存储颗粒</h2>\n<table>\n  <tr><th>公司</th><th>上市</th><th>最新进展</th></tr>\n  <tr><td><strong>长鑫存储 (CXMT)</strong></td><td><span class=\"pill pill-mid\">未上市</span></td><td>HBM2 已于 2025H1 量产，HBM3 样品交付客户，目标 2027 年 HBM3E</td></tr>\n  <tr><td>武汉新芯 (XMC)</td><td><span class=\"pill pill-mid\">未上市</span></td><td>HBM2 开发中，月产能 3000 片 12 英寸工厂</td></tr>\n</table>\n<p>从成熟 DDR5 转向高性能 HBM DRAM，技术跨度大，长鑫的 HBM3 量产验证是关键一战。</p>\n\n<h2>二、先进封装</h2>\n<table>\n  <tr><th>公司</th><th>代码</th><th>技术布局</th><th>推荐</th></tr>\n  <tr><td><strong>长电科技</strong></td><td>600584</td><td>XDFOI 对标 CoWoS，2.5D/3D 封装最强竞争者</td><td>⭐⭐⭐</td></tr>\n  <tr><td><strong>通富微电</strong></td><td>002156</td><td>绑定 AMD，已与长鑫合作 HBM2 样品</td><td>⭐⭐</td></tr>\n  <tr><td>华天科技</td><td>002185</td><td>TSV/3D 封装布局中</td><td>⭐</td></tr>\n</table>\n\n<h2>三、关键设备</h2>\n<ul>\n  <li><strong>TSV 刻蚀：</strong>北方华创 (002371) / 中微公司 (688012) ✅ 可国产化</li>\n  <li><strong>CMP 设备：</strong>华海清科 (688120) ✅ 国内龙头</li>\n  <li><strong>封装光刻：</strong>上海微电子——已量产出货</li>\n  <li><strong>键合设备：</strong>新益昌追赶中——<strong>最大短板之一</st // --- Tab & Filter Functions -----------------
let monFilter = 'all';

function showTab(name, evt) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById('page-' + name).classList.add('show');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  evt.target.classList.add('active');
}

function filterMon(f, evt) {
  monFilter = f;
  document.querySelectorAll('#monFilter button').forEach(b => b.classList.remove('active'));
  evt.target.classList.add('active');
  renderMonitors();
}

function renderMonitors() {
  const list = monitors.filter(m => {
    if (monFilter === 'all') return true;
    return m.date.startsWith(monFilter);
  });
  const el = document.getElementById('monList');
  if (!el) return;
  el.innerHTML = list.length === 0
    ? '<div style="text-align:center;padding:40px;color:#64748b">\u{1f4ed} \u6682\u65e0\u76d1\u63a7\u6570\u636e</div>'
    : list.map(m =>
      '<div class="article" onclick="openMonitor(\'' + m.id + '\')">' +
        '<div class="meta"><span class="t mon">\u{1f4e1} \u76d1\u6d4b\u62a5\u544a</span><span>' + m.date + '</span></div>' +
        '<h3>' + m.title + '</h3>' +
        '<p>' + m.summary + '</p>' +
        '<div class="tags">' + m.tags.map(t => '<span>' + t + '</span>').join('') + '</div>' +
      '</div>'
    ).join('');
}

function openMonitor(id) {
  const m = monitors.find(x => x.id === id);
  if (!m) return;
  document.getElementById('mTitle').textContent = m.title;
  document.getElementById('mBody').innerHTML = m.html;
  document.getElementById('modal').classList.add('show');
  document.getElementById('ov').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('ov').classList.remove('show');
  document.body.style.overflow = '';
}

function openReport(id) {

(function() {
  if (!monitors || monitors.length===0) return;
  const l=monitors[monitors.length-1];
  const h=l.html;

  // extract info-grid items
  const infoItems={};
  const re=/<div class="il">(.*?)<\/div>\s*<div class="iv">(.*?)<\/div>/gs;
  let m; while((m=re.exec(h))) infoItems[m[1].trim()]=m[2].trim();

  // Market indices
  const idxMap={sh:'上证指数',sz:'深证成指',cy:'创业板指',kc:'科创50'};
  Object.entries(idxMap).forEach(([k,v])=>{
    if(infoItems[v]){
      const raw=infoItems[v];
      const price=(raw.match(/[\d.]+/)||['--'])[0];
      const chg=(raw.match(/[+-]\d+\.?\d*%/)||['--'])[0];
      document.getElementById('v_'+k).textContent=price;
      if(chg!=='--'){
        const up=chg.startsWith('+');
        document.getElementById('sub_'+k).className='sub '+(up?'green':'red');
        document.getElementById('sub_'+k).textContent=chg;
      }
    }
  });

  // Tags -> tagCloud
  const tags=l.tags||[];
  const tagColors=['#3b82f6','#a855f7','#ec4899','#06b6d4','#f59e0b','#22c55e'];
  document.getElementById('tagCloud').innerHTML=tags.slice(0,8).map((t,i)=>
    '<span style="background:'+tagColors[i%6]+'18;color:'+tagColors[i%6]+'">#'+t+'</span>'
  ).join('');

  // Parse net inflow table
  const tables=[...h.matchAll(/<table>(.*?)<\/table>/gs)].map(m=>m[1]);
  let funds=[];
  tables.forEach(tbl=>{
    if(/净流入/.test(tbl)&&(/板块/.test(tbl)||/驱动/.test(tbl))){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=3){
          const name=cells[1].replace(/<[^>]+>/g,'').trim();
          const fv=parseFloat(cells[2].replace(/<[^>]+>/g,'').replace(/[+亿]/g,''));
          if(!isNaN(fv)) funds.push({n:name,v:fv,c:'#3b82f6'});
        }
      }
    }
  });
  if(funds.length===0) funds=tags.slice(0,5).map((t,i)=>({n:t,v:(5-i)*2,c:'#3b82f6'}));
  funds=funds.slice(0,5);
  const maxV=Math.max(...funds.map(f=>f.v));
  document.getElementById('fundList').innerHTML=funds.map(f=>
    '<div class=fund-row><span class=n>'+f.n+'</span><div class=b style="background:'+f.c+'22"><div style="width:'+(f.v/maxV*100)+'%;background:'+f.c+'">'+f.v.toFixed(1)+'亿</div></div></div>'
  ).join('');

  // Parse highlights
  let highlights=[];
  tables.forEach(tbl=>{
    if(/异动/.test(tbl)&&(/个股/.test(tbl)||/逻辑/.test(tbl))){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length&&highlights.length<5;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=2){
          const stock=cells[0].replace(/<[^>]+>/g,'').trim();
          const action=cells.length>=4?cells[cells.length-2].replace(/<[^>]+>/g,'').trim():'';
          highlights.push('• <strong>'+stock+'</strong> — '+action);
        }
      }
    }
  });
  if(highlights.length===0){
    const s=l.summary||'';
    highlights=s.split(/[。.]/).filter(x=>x.trim()).slice(0,3).map(x=>'• '+x.trim()+'。');
  }
  document.getElementById('highlightList').innerHTML=highlights.join('<br>');

  // Parse watchlist
  let wl=[];
  tables.forEach(tbl=>{
    if(/名称/.test(tbl)&&/代码/.test(tbl)&&/现价/.test(tbl)){
      const rows=[...tbl.matchAll(/<tr>(.*?)<\/tr>/gs)].map(m=>m[1]);
      for(let i=1;i<rows.length;i++){
        const cells=[...rows[i].matchAll(/<t[dh][^>]*>(.*?)<\/t[dh]>/gs)].map(m=>m[1]);
        if(cells.length>=4){
          const name=cells[0].replace(/<[^>]+>/g,'').trim();
          const code=cells[1].replace(/<[^>]+>/g,'').trim();
          const price=cells[2].replace(/<[^>]+>/g,'').trim();
          const chg=cells[3].replace(/<[^>]+>/g,'').trim();
          let ch=null;
          try{ch=parseFloat(chg.replace(/[+%]/g,''));}catch(e){}
          wl.push({n:name,c:code,p:price,ch:ch});
        }
      }
    }
  });
  if(wl.length>0){
    document.getElementById('wlBody').innerHTML=wl.map(s=>{
      if(s.ch!==null&&!isNaN(s.ch)){
        const cls=s.ch>=0?'green':'red';
        const sign=s.ch>=0?'+':'';
        return '<tr><td><strong>'+s.n+'</strong></td><td><span class=code>'+s.c+'</span></td><td>&yen;'+s.p+'</td><td class="'+cls+'">'+sign+s.ch.toFixed(2)+'%</td></tr>';
      }
      return '<tr style="color:#94a3b8;font-size:11px"><td>'+s.n+'</td><td><span class=code>'+s.c+'</span></td><td>--</td><td>--</td></tr>';
    }).join('');
  }

  // Market comment
  document.getElementById('marketComment').innerHTML='<p>'+(l.summary||'暂无数据')+'</p>';
})()

    const w = 200, hh = 30;
    const pts = st.kl.map((v,i) => `${(i/(st.kl.length-1))*w},${hh-((v-mn)/rg)*hh}`).join(' ');
    const svg = `<svg viewBox="0 0 ${w} ${hh}"><defs><linearGradient id="g-${st.c.replace(/[.#]/g,'')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cc}" stop-opacity="0.2"/><stop offset="100%" stop-color="${cc}" stop-opacity="0.01"/></linearGradient></defs><path d="M${pts}" fill="none" stroke="${cc}" stroke-width="1.3" stroke-linecap="round"/><path d="M0,${hh} L${pts} L${pts.split(' ').pop().split(',')[0]},${hh}Z" fill="url(#g-${st.c.replace(/[.#]/g,'')})" opacity="0.25"/></svg>`;
    return `
      <div class="pfl-card">
        <span class="pfl-rtg ${rc}">${rtLabels[rt]}</span>
        <div class="pfl-hd">
          <span class="pfl-exg ${st.ec}">${st.e}</span>
          <div class="pfl-sn"><h2>${st.n}</h2><span class="cd">${st.c}</span></div>
        </div>
        <div class="pfl-pr"><span class="p">${st.cur}${st.pr.toFixed(2)}</span><span class="cp ${st.ch>=0?'profit':'loss'}">${st.ch>0?'+':''}${st.ch}%</span></div>
        <div class="pfl-pl ${st.ch>=0?'pb':'lb'}">${st.ch>=0?'📈 今日上涨':'📉 今日下跌'}</div>
        <div class="pfl-tech">
          <div class="pfl-tb"><div class="tl">MACD</div><div class="tv">${st.md.v.toFixed(2)}</div><div class="ts ${mkCl}">${st.md.s}</div></div>
          <div class="pfl-tb"><div class="tl">KDJ</div><div class="tv" style="font-size:10px">${st.kd}</div></div>
          <div class="pfl-tb"><div class="tl">RSI6</div><div class="tv">${st.r6.toFixed(1)}</div><div class="ts ${rsCl}">${st.rs}</div></div>
        </div>
        <div class="pfl-chart">${svg}</div>
        <div class="pfl-mf">
          <div class="pfl-mfi"><div class="ml">主力</div><div class="mv ${st.mf[0]>=0?'profit':'loss'}">${st.mf[0]>=0?'+':''}${st.mf[0].toFixed(2)}</div></div>
          <div class="pfl-mfi"><div class="ml">超大单</div><div class="mv ${st.mf[1]>=0?'profit':'loss'}">${st.mf[1].toFixed(2)}</div></div>
          <div class="pfl-mfi"><div class="ml">大单</div><div class="mv ${st.mf[2]>=0?'profit':'loss'}">${st.mf[2].toFixed(2)}</div></div>
          <div class="pfl-mfi"><div class="ml">中小单</div><div class="mv ${st.mf[3]>=0?'profit':'loss'}">${st.mf[3].toFixed(2)}</div></div>
        </div>
        <div class="pfl-tag">${st.tg.map(t => `<span class="pfl-ct">${t}</span>`).join('')}</div>
      </div>`;
  }).join('');
}

// Load portfolio on page ready
loadPortfolio();

// Init
renderMonitors();
renderReports();
</script>
</body>
